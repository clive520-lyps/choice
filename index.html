<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberNode 智慧測驗終端</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050b14] text-[#e2e8f0] font-sans antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="module">
        import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        window.FirebaseModules = {
            initializeApp, getApps, getApp,
            getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch,
            getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut
        };
        window.dispatchEvent(new Event('FIREBASE_LOADED'));
    </script>

    <script type="text/babel">
        const startApp = () => {
            const { 
                initializeApp, getApps, getApp, 
                getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch,
                getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
            } = window.FirebaseModules;
            
            const { useState, useEffect, useMemo, createContext, useContext } = React;

            const injectStyles = () => {
                if (document.getElementById('cyber-styles')) return;
                const style = document.createElement('style');
                style.id = 'cyber-styles';
                style.innerHTML = `
                    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
                    body {
                        background-image: 
                            linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
                        background-size: 30px 30px;
                    }
                    .font-cyber { font-family: 'Orbitron', sans-serif; }
                    .glass-panel {
                        background: rgba(15, 23, 42, 0.6);
                        backdrop-filter: blur(12px);
                        -webkit-backdrop-filter: blur(12px);
                        border: 1px solid rgba(0, 240, 255, 0.2);
                        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                    }
                    .neon-border {
                        border: 1px solid rgba(0, 240, 255, 0.5);
                        box-shadow: 0 0 10px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.1);
                    }
                    .neon-border:hover {
                        box-shadow: 0 0 20px rgba(0, 240, 255, 0.6), inset 0 0 15px rgba(0, 240, 255, 0.3);
                        border-color: rgba(0, 240, 255, 0.8);
                    }
                    .neon-border-green {
                        border: 1px solid rgba(57, 255, 20, 0.5);
                        box-shadow: 0 0 10px rgba(57, 255, 20, 0.2), inset 0 0 10px rgba(57, 255, 20, 0.1);
                    }
                    .scanline {
                        width: 100%; height: 100px;
                        background: linear-gradient(0deg, rgba(0,240,255,0) 0%, rgba(0,240,255,0.2) 50%, rgba(0,240,255,0) 100%);
                        opacity: 0.1; position: absolute; bottom: 100%;
                        animation: scanline 6s linear infinite; pointer-events: none;
                    }
                    @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }
                    .text-glow { text-shadow: 0 0 10px currentColor; }
                    .text-gradient { background: linear-gradient(to right, #00f0ff, #b5179e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
                    @keyframes pulse-ring {
                        0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
                        70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(0, 240, 255, 0); }
                        100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
                    }
                    .animate-pulse-ring { animation: pulse-ring 2s infinite; }
                    ::-webkit-scrollbar { width: 6px; }
                    ::-webkit-scrollbar-track { background: #0f172a; }
                    ::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 4px; }
                `;
                document.head.appendChild(style);
            };

            const AppContext = createContext();
            const getPath = (colName) => colName;

            const extractConfig = (text) => {
                const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
                const config = {};
                let valid = true;
                keys.forEach(key => {
                    const regex = new RegExp(`${key}\\s*:\\s*["'\`]([^"'\`]+)["'\`]`);
                    const match = text.match(regex);
                    if (match && match[1]) config[key] = match[1];
                    else valid = false;
                });
                return valid ? config : null;
            };

            // ==========================================
            // 核心 App
            // ==========================================
            function App() {
                const [dbConfig, setDbConfig] = useState(null);
                const [firebaseInstances, setFirebaseInstances] = useState(null);
                const [user, setUser] = useState(null);
                const [systemState, setSystemState] = useState('BOOTING');
                const [errorMsg, setErrorMsg] = useState('');

                useEffect(() => {
                    injectStyles();
                    
                    const params = new URLSearchParams(window.location.search);
                    const encodedConfig = params.get('config');
                    let savedConfig = localStorage.getItem('cybernode_config');

                    if (encodedConfig) {
                        try {
                            savedConfig = decodeURIComponent(atob(encodedConfig));
                            localStorage.setItem('cybernode_config', savedConfig);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        } catch (e) {
                            console.error("URL 解碼失敗", e);
                        }
                    }

                    if (savedConfig) {
                        initFirebase(savedConfig);
                    } else {
                        setSystemState('SETUP');
                    }
                }, []);

                const initFirebase = async (configStr) => {
                    setSystemState('BOOTING');
                    try {
                        const configObj = JSON.parse(configStr);
                        const app = getApps().length === 0 ? initializeApp(configObj) : getApp();
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        
                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            setFirebaseInstances({ app, auth, db });
                            setDbConfig(configObj);
                            setSystemState('READY');
                        });
                    } catch (err) {
                        console.error("Firebase Init Error:", err);
                        setErrorMsg(err.message);
                        setSystemState('ERROR');
                        localStorage.removeItem('cybernode_config');
                    }
                };

                const handleSetupSubmit = (configStr) => {
                    localStorage.setItem('cybernode_config', configStr);
                    initFirebase(configStr);
                };

                const resetSystem = () => {
                    localStorage.removeItem('cybernode_config');
                    window.location.reload();
                };

                return (
                    <div className="min-h-screen w-full relative">
                        <div className="scanline"></div>
                        
                        {systemState === 'BOOTING' && (
                            <div className="flex items-center justify-center h-screen flex-col gap-4">
                                <div className="w-16 h-16 rounded-full border-4 border-cyan-500 border-t-transparent animate-spin"></div>
                                <div className="text-cyan-400 font-cyber text-xl animate-pulse">SYSTEM INITIALIZING...</div>
                            </div>
                        )}

                        {systemState === 'ERROR' && (
                            <div className="flex items-center justify-center h-screen p-4">
                                <div className="glass-panel neon-border p-8 rounded-2xl max-w-lg text-center border-red-500/50">
                                    <div className="text-red-500 text-6xl mb-4">⚠️</div>
                                    <h2 className="text-2xl font-bold text-red-400 mb-2 font-cyber">CONNECTION FAILED</h2>
                                    <p className="text-slate-300 mb-6">{errorMsg}</p>
                                    <button onClick={resetSystem} className="px-6 py-2 bg-red-900/50 hover:bg-red-800 text-red-200 rounded border border-red-500 transition">重新設定系統</button>
                                </div>
                            </div>
                        )}

                        {systemState === 'SETUP' && <SetupWizard onConfigSubmit={handleSetupSubmit} />}

                        {systemState === 'READY' && (
                            <AppContext.Provider value={{ ...firebaseInstances, user, dbConfig, resetSystem }}>
                                <MainTerminal />
                            </AppContext.Provider>
                        )}
                    </div>
                );
            }

            // ==========================================
            // 設定精靈
            // ==========================================
            function SetupWizard({ onConfigSubmit }) {
                const [inputText, setInputText] = useState('');
                const [error, setError] = useState('');

                const handleParse = () => {
                    const config = extractConfig(inputText);
                    if (config) {
                        onConfigSubmit(JSON.stringify(config));
                    } else {
                        setError('無法解析 Config，請確保包含 apiKey, projectId 等欄位。');
                    }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-panel p-8 md:p-12 rounded-3xl max-w-3xl w-full relative overflow-hidden shadow-[0_0_50px_rgba(0,240,255,0.1)]">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-purple-600"></div>
                            
                            <h1 className="text-3xl md:text-4xl font-cyber font-bold text-glow mb-2">
                                <span className="text-cyan-400">CYBER</span><span className="text-purple-500">NODE</span>
                                <span className="text-slate-400 text-xl ml-4 tracking-widest">// SETUP</span>
                            </h1>
                            <p className="text-slate-400 mb-8 font-mono text-sm">請注入您的 Firebase 資料庫核心金鑰以啟動終端。</p>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <h3 className="text-cyan-400 font-bold mb-4 flex items-center gap-2">
                                        <span className="bg-cyan-900/50 text-cyan-300 px-2 py-1 rounded text-xs font-mono">STEP 1</span>
                                        取得憑證教學
                                    </h3>
                                    <ol className="text-slate-300 text-sm space-y-3 font-mono leading-relaxed list-decimal list-inside">
                                        <li>前往 <a href="https://console.firebase.google.com/" target="_blank" className="text-cyan-400 hover:underline">Firebase Console</a> 新增專案。</li>
                                        <li>左側選單進入 <b>Firestore Database</b>，建立資料庫並選擇「測試模式 (Test Mode)」。</li>
                                        <li>左側選單進入 <b>Authentication</b>，<span className="text-red-400 font-bold">必須啟用「匿名登入」與「電子郵件/密碼」</span>兩種登入方式。</li>
                                        <li>前往「專案設定 &gt; 您的應用程式」，新增一個網頁應用程式 <code>&lt;/&gt;</code>。</li>
                                        <li>複製出現的 <code>const firebaseConfig = &#123; ... &#125;</code> 程式碼區塊。</li>
                                    </ol>
                                </div>
                                
                                <div className="flex flex-col">
                                    <h3 className="text-cyan-400 font-bold mb-4 flex items-center gap-2">
                                        <span className="bg-cyan-900/50 text-cyan-300 px-2 py-1 rounded text-xs font-mono">STEP 2</span>
                                        金鑰注入區
                                    </h3>
                                    <textarea 
                                        className="flex-1 w-full bg-slate-900/80 border border-slate-700 text-green-400 font-mono text-xs p-4 rounded-xl focus:outline-none focus:border-cyan-500 transition resize-none neon-border"
                                        placeholder="貼上 firebaseConfig 程式碼..."
                                        value={inputText}
                                        onChange={(e) => { setInputText(e.target.value); setError(''); }}
                                    ></textarea>
                                    {error && <div className="text-red-400 text-xs mt-2 font-mono">{error}</div>}
                                    
                                    <button 
                                        onClick={handleParse}
                                        className="mt-4 w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-cyber font-bold rounded-xl shadow-[0_0_15px_rgba(0,240,255,0.4)] transition transform hover:scale-[1.02] active:scale-95"
                                    >
                                        [ INIT_DATABASE ]
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 主終端機路由
            // ==========================================
            function MainTerminal() {
                const { user, auth, resetSystem } = useContext(AppContext);
                const [view, setView] = useState('role-select');
                const [studentProfile, setStudentProfile] = useState(null);

                const handleLogout = async () => {
                    if (user) await signOut(auth);
                    setStudentProfile(null);
                    setView('role-select');
                };

                return (
                    <div className="min-h-screen flex flex-col">
                        <header className="glass-panel border-b border-slate-700 p-4 sticky top-0 z-50">
                            <div className="container mx-auto flex justify-between items-center">
                                <div className="font-cyber font-bold text-xl cursor-pointer" onClick={() => setView('role-select')}>
                                    <span className="text-cyan-400 text-glow">CYBER</span>
                                    <span className="text-white">NODE</span>
                                </div>
                                <div className="flex items-center gap-4">
                                    {user && !user.isAnonymous && (
                                        <div className="hidden md:flex items-center gap-2 bg-purple-900/50 px-3 py-1 rounded-full border border-purple-500">
                                            <div className="w-2 h-2 rounded-full bg-purple-400 animate-pulse"></div>
                                            <span className="text-xs font-mono text-purple-200">CMDR_AUTH: ACTIVE</span>
                                        </div>
                                    )}
                                    {studentProfile && (
                                        <div className="hidden md:flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-600">
                                            <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                                            <span className="text-xs font-mono text-slate-300">ID: {studentProfile.classRoom}-{studentProfile.seatNo} [{studentProfile.name}]</span>
                                        </div>
                                    )}
                                    {user && (
                                        <button onClick={handleLogout} className="text-xs font-mono text-slate-400 hover:text-red-400 transition">
                                            [ LOGOUT ]
                                        </button>
                                    )}
                                    <button onClick={resetSystem} className="text-xs font-mono text-slate-600 hover:text-red-500 transition ml-2 border-l border-slate-700 pl-4">
                                        [ UNLINK_DB ]
                                    </button>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 container mx-auto p-4 md:p-6 overflow-hidden">
                            {view === 'role-select' && <RoleSelect setView={setView} />}
                            {view === 'teacher-login' && <TeacherAuth setView={setView} />}
                            {view === 'teacher-dashboard' && <TeacherDashboard setView={setView} />}
                            {view === 'student-login' && <StudentLogin setView={setView} onLogin={setStudentProfile} />}
                            {view === 'student-dashboard' && <StudentDashboard setView={setView} profile={studentProfile} />}
                        </main>
                    </div>
                );
            }

            function RoleSelect({ setView }) {
                const { user, auth } = useContext(AppContext);

                const handleStudentMode = async () => {
                    if (!user) {
                        try {
                            await signInAnonymously(auth);
                        } catch (e) {
                            if (e.code === 'auth/operation-not-allowed') {
                                alert("⛔ 系統阻擋：操作不允許\n\n系統偵測到您的 Firebase 尚未開啟「匿名登入」權限。\n\n請老師前往 Firebase 後台：\n1. 點擊左側 Authentication (驗證)\n2. 進入 Sign-in method (登入方式) 頁籤\n3. 找到「匿名 (Anonymous)」並啟用它！");
                            } else {
                                alert("學生登入失敗: " + e.message);
                            }
                            return;
                        }
                    }
                    setView('student-login');
                };

                const handleTeacherMode = () => {
                    if (user && !user.isAnonymous) {
                        setView('teacher-dashboard');
                    } else {
                        setView('teacher-login');
                    }
                };

                return (
                    <div className="h-full flex flex-col items-center justify-center pt-10 pb-20">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-5xl font-cyber font-bold mb-4 text-gradient">SELECT YOUR ROLE</h2>
                            <p className="text-slate-400 font-mono">請選擇登入身分以取得對應權限</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
                            <button onClick={handleStudentMode} className="glass-panel neon-border p-10 rounded-3xl flex flex-col items-center group transition transform hover:-translate-y-2 relative overflow-hidden">
                                <div className="absolute inset-0 bg-cyan-500/5 group-hover:bg-cyan-500/10 transition"></div>
                                <div className="text-7xl mb-6 group-hover:scale-110 transition duration-300 drop-shadow-[0_0_15px_rgba(0,240,255,0.8)]">🧑‍🚀</div>
                                <h3 className="text-2xl font-cyber font-bold text-cyan-400 mb-2">[ STUDENT ]</h3>
                                <p className="text-slate-400 text-sm">進入測驗模擬器 (匿名登入)</p>
                            </button>
                            <button onClick={handleTeacherMode} className="glass-panel neon-border-green p-10 rounded-3xl flex flex-col items-center group transition transform hover:-translate-y-2 relative overflow-hidden">
                                <div className="absolute inset-0 bg-green-500/5 group-hover:bg-green-500/10 transition"></div>
                                <div className="text-7xl mb-6 group-hover:scale-110 transition duration-300 drop-shadow-[0_0_15px_rgba(57,255,20,0.8)]">👩‍💻</div>
                                <h3 className="text-2xl font-cyber font-bold text-green-400 mb-2">[ COMMANDER ]</h3>
                                <p className="text-slate-400 text-sm">指揮官儀表板 (需帳號密碼)</p>
                            </button>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 教師驗證模組 (Commander Auth)
            // ==========================================
            function TeacherAuth({ setView }) {
                const { auth } = useContext(AppContext);
                const [isRegister, setIsRegister] = useState(false);
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const [error, setError] = useState('');

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    setError('');
                    try {
                        if (isRegister) {
                            await createUserWithEmailAndPassword(auth, email, password);
                            alert("指揮官註冊成功！系統授權完畢。");
                        } else {
                            await signInWithEmailAndPassword(auth, email, password);
                        }
                        setView('teacher-dashboard');
                    } catch (err) {
                        console.error(err);
                        if (err.code === 'auth/email-already-in-use') {
                            setError('此信箱已被註冊。');
                        } else if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
                            setError('⛔ 登入失敗：帳號或密碼錯誤。');
                        } else if (err.code === 'auth/operation-not-allowed') {
                            setError('⛔ 系統阻擋：請至 Firebase 後台 -> Authentication -> Sign-in method 啟用「電子郵件/密碼」功能！(此功能預設為關閉)');
                        } else {
                            setError(`錯誤 (${err.code}): ${err.message}`);
                        }
                    }
                };

                return (
                    <div className="flex items-center justify-center min-h-[80vh]">
                        <div className="glass-panel border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.2)] p-8 md:p-12 rounded-3xl w-full max-w-md relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-pink-500"></div>
                            
                            <div className="text-center mb-8">
                                <h2 className="text-3xl font-cyber text-purple-400 mb-2">CMDR AUTH</h2>
                                <p className="text-slate-400 font-mono text-sm">{isRegister ? '建立新的指揮官權限' : '請輸入指揮官憑證'}</p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <label className="block font-mono text-purple-400 text-xs mb-2">EMAIL (電子郵件)</label>
                                    <input 
                                        type="email" required
                                        className="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-lg focus:outline-none focus:border-purple-500 font-mono"
                                        value={email} onChange={e => setEmail(e.target.value)}
                                    />
                                </div>
                                <div>
                                    <label className="block font-mono text-purple-400 text-xs mb-2">PASSWORD (密碼)</label>
                                    <input 
                                        type="password" required minLength="6"
                                        className="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-lg focus:outline-none focus:border-purple-500 font-mono"
                                        value={password} onChange={e => setPassword(e.target.value)}
                                    />
                                </div>

                                {error && <div className="text-red-400 text-xs mt-2 font-mono bg-red-900/30 p-3 rounded border border-red-500/50 whitespace-pre-line">{error}</div>}

                                <button type="submit" className="w-full py-4 rounded-xl font-cyber font-bold text-lg transition shadow-lg mt-6 bg-purple-600 hover:bg-purple-500 text-white shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                                    [ {isRegister ? 'REGISTER & ENTER' : 'AUTHORIZE LOGIN'} ]
                                </button>
                                
                                <div className="text-center mt-4">
                                    <button type="button" onClick={() => { setIsRegister(!isRegister); setError(''); }} className="text-sm text-slate-400 hover:text-white font-mono transition">
                                        {isRegister ? '已有帳號？點此登入' : '沒有帳號？點此註冊'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 教師儀表板 (Commander Dashboard)
            // ==========================================
            function TeacherDashboard({ setView }) {
                const { db, dbConfig } = useContext(AppContext);
                const [activeTab, setActiveTab] = useState('exams'); // 切換預設標籤測試用
                const [scores, setScores] = useState([]);
                
                useEffect(() => {
                    if (!db) return;
                    const q = query(collection(db, getPath('quiz_records')));
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                        setScores(data);
                    }, (err) => console.error("成績監聽失敗:", err));
                    return () => unsubscribe();
                }, [db]);

                const tabs = [
                    { id: 'radar', label: 'LIVE RADAR (即時成績)' },
                    { id: 'students', label: 'PERSONNEL DB (學生管理)' },
                    { id: 'exams', label: 'MISSION DB (試卷建置)' },
                    { id: 'link', label: 'SYSTEM (系統派發)' }
                ];

                return (
                    <div className="max-w-6xl mx-auto animate-fade-in pb-10">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b border-slate-700 pb-4 gap-4">
                            <div>
                                <h2 className="text-3xl font-cyber font-bold text-green-400 text-glow">COMMAND CENTER</h2>
                                <p className="text-slate-400 font-mono text-sm mt-1">Authorized Access Granted.</p>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {tabs.map(t => (
                                    <button 
                                        key={t.id} onClick={() => setActiveTab(t.id)} 
                                        className={`px-3 py-2 font-mono text-xs md:text-sm border rounded-t-lg transition ${activeTab === t.id ? 'bg-green-900/40 border-green-500 text-green-400' : 'border-transparent text-slate-500 hover:text-slate-300'}`}
                                    >
                                        {t.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {activeTab === 'radar' && <TabRadar scores={scores} />}
                        {activeTab === 'students' && <TabStudents />}
                        {activeTab === 'exams' && <TabExams />}
                        {activeTab === 'link' && <TabSystem dbConfig={dbConfig} db={db} />}
                    </div>
                );
            }

            // 標籤 1: 即時成績
            function TabRadar({ scores }) {
                return (
                    <div className="glass-panel rounded-2xl p-6 border-green-500/30">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-cyber text-xl flex items-center gap-3">
                                <span className="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
                                即時遙測數據
                            </h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left font-mono text-sm">
                                <thead className="bg-slate-800/50 text-slate-400 border-b border-slate-700">
                                    <tr>
                                        <th className="p-4">時間</th>
                                        <th className="p-4">學生姓名 (ID)</th>
                                        <th className="p-4">任務名稱</th>
                                        <th className="p-4">分數</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800">
                                    {scores.length === 0 ? (
                                        <tr><td colSpan="4" className="p-8 text-center text-slate-500">尚無遙測數據...</td></tr>
                                    ) : (
                                        scores.map((s) => (
                                            <tr key={s.id} className="hover:bg-slate-800/30 transition">
                                                <td className="p-4 text-slate-400">{s.timestamp?.toDate().toLocaleTimeString() || '剛剛'}</td>
                                                <td className="p-4 font-bold text-cyan-400">{s.name} ({s.studentId})</td>
                                                <td className="p-4">{s.examId}</td>
                                                <td className="p-4 text-green-400 font-bold text-lg">{s.score}</td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            // 標籤 2: 學生管理
            function TabStudents() {
                const { db } = useContext(AppContext);
                const [students, setStudents] = useState([]);
                const [newClass, setNewClass] = useState('');
                const [newSeat, setNewSeat] = useState('');
                const [newName, setNewName] = useState('');
                const [isBatchMode, setIsBatchMode] = useState(false);
                const [batchData, setBatchData] = useState('');
                const [editingId, setEditingId] = useState(null);
                const [editData, setEditData] = useState({ classRoom: '', seatNo: '', name: '' });

                useEffect(() => {
                    if (!db) return;
                    const q = query(collection(db, getPath('students')));
                    const unsub = onSnapshot(q, (snapshot) => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        list.sort((a,b) => {
                            if (a.classRoom !== b.classRoom) return String(a.classRoom).localeCompare(String(b.classRoom));
                            return parseInt(a.seatNo) - parseInt(b.seatNo);
                        });
                        setStudents(list);
                    });
                    return () => unsub();
                }, [db]);

                const handleAdd = async (e) => {
                    e.preventDefault();
                    if (!newClass || !newSeat || !newName) return;
                    try {
                        await addDoc(collection(db, getPath('students')), {
                            classRoom: String(newClass).trim(),
                            seatNo: String(newSeat).trim(),
                            name: String(newName).trim()
                        });
                        setNewSeat(''); setNewName('');
                    } catch(err) { alert('新增失敗: ' + err.message); }
                };

                const handleBatchImport = async (e) => {
                    e.preventDefault();
                    if (!batchData.trim()) return;
                    
                    try {
                        const batch = writeBatch(db);
                        const lines = batchData.trim().split('\n');
                        let count = 0;
                        
                        for (let line of lines) {
                            const parts = line.split(/\t|,/).map(s => s.trim()).filter(s => s !== '');
                            if (parts.length >= 3) {
                                const docRef = doc(collection(db, getPath('students')));
                                batch.set(docRef, {
                                    classRoom: String(parts[0]),
                                    seatNo: String(parts[1]),
                                    name: String(parts[2])
                                });
                                count++;
                            }
                        }
                        
                        if (count > 0) {
                            await batch.commit();
                            alert(`✅ 成功匯入 ${count} 筆學生資料！`);
                            setBatchData(''); setIsBatchMode(false);
                        } else {
                            alert('找不到有效的資料格式。');
                        }
                    } catch (err) { alert('匯入失敗: ' + err.message); }
                };

                const handleDelete = async (id, name) => {
                    if (!confirm(`確定要刪除學生 [${name}] 嗎？`)) return;
                    try { await deleteDoc(doc(db, getPath('students'), id)); } catch(err) { alert('刪除失敗'); }
                };

                const startEdit = (student) => {
                    setEditingId(student.id);
                    setEditData({ classRoom: student.classRoom, seatNo: student.seatNo, name: student.name });
                };

                const saveEdit = async (id) => {
                    try {
                        await updateDoc(doc(db, getPath('students'), id), {
                            classRoom: String(editData.classRoom).trim(),
                            seatNo: String(editData.seatNo).trim(),
                            name: String(editData.name).trim()
                        });
                        setEditingId(null);
                    } catch (err) { alert('更新失敗'); }
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="glass-panel p-6 rounded-2xl lg:col-span-1 border-cyan-500/30 h-fit">
                            <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-4">
                                <h3 className="text-lg font-cyber text-cyan-400">{isBatchMode ? '批次匯入' : '新增人員'}</h3>
                                <button onClick={() => setIsBatchMode(!isBatchMode)} className="text-xs px-3 py-1.5 bg-slate-800 text-cyan-300 hover:text-white rounded font-mono border border-slate-600">切換模式</button>
                            </div>
                            {!isBatchMode ? (
                                <form onSubmit={handleAdd} className="space-y-4 animate-fade-in">
                                    <div><label className="text-xs text-slate-400 font-mono">班級</label><input type="text" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white font-mono mt-1" value={newClass} onChange={e=>setNewClass(e.target.value)} required /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="text-xs text-slate-400 font-mono">座號</label><input type="number" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white font-mono mt-1" value={newSeat} onChange={e=>setNewSeat(e.target.value)} required /></div>
                                        <div><label className="text-xs text-slate-400 font-mono">姓名</label><input type="text" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white font-mono mt-1" value={newName} onChange={e=>setNewName(e.target.value)} required /></div>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-cyan-900/50 text-white rounded font-cyber transition">[ ADD DATA ]</button>
                                </form>
                            ) : (
                                <form onSubmit={handleBatchImport} className="space-y-4 animate-fade-in">
                                    <div><textarea placeholder="格式：班級 座號 姓名&#10;(支援 Tab 或逗號分隔)" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white font-mono mt-1 h-48 text-sm" value={batchData} onChange={e=>setBatchData(e.target.value)} required /></div>
                                    <button type="submit" className="w-full py-3 bg-purple-900/50 text-white rounded font-cyber transition">[ BATCH IMPORT ]</button>
                                </form>
                            )}
                        </div>
                        <div className="glass-panel p-6 rounded-2xl lg:col-span-2 border-slate-700">
                            <h3 className="text-lg font-cyber text-white mb-4 border-b border-slate-700 pb-2">人員資料庫 ({students.length})</h3>
                            <div className="max-h-[60vh] overflow-y-auto pr-2">
                                <table className="w-full text-left font-mono text-sm">
                                    <thead className="bg-slate-800 text-slate-400 sticky top-0 z-10"><tr><th className="p-3 w-1/4">班級</th><th className="p-3 w-1/4">座號</th><th className="p-3 w-1/4">姓名</th><th className="p-3 w-1/4 text-right">操作</th></tr></thead>
                                    <tbody className="divide-y divide-slate-800">
                                        {students.map(s => {
                                            const isEditing = editingId === s.id;
                                            return (
                                                <tr key={s.id} className="hover:bg-slate-800/50 transition">
                                                    {isEditing ? (
                                                        <>
                                                            <td className="p-2"><input type="text" className="w-full bg-slate-950 border border-cyan-500 text-cyan-400 px-2 py-1 rounded outline-none" value={editData.classRoom} onChange={e=>setEditData({...editData, classRoom: e.target.value})} /></td>
                                                            <td className="p-2"><input type="text" className="w-full bg-slate-950 border border-cyan-500 text-white px-2 py-1 rounded outline-none" value={editData.seatNo} onChange={e=>setEditData({...editData, seatNo: e.target.value})} /></td>
                                                            <td className="p-2"><input type="text" className="w-full bg-slate-950 border border-cyan-500 text-white px-2 py-1 rounded outline-none" value={editData.name} onChange={e=>setEditData({...editData, name: e.target.value})} /></td>
                                                            <td className="p-2 text-right whitespace-nowrap"><button onClick={() => saveEdit(s.id)} className="px-3 py-1.5 bg-green-600 text-white rounded transition text-xs mr-2 font-bold">SAVE</button><button onClick={() => setEditingId(null)} className="px-3 py-1.5 bg-slate-700 text-slate-300 hover:text-white rounded transition text-xs">X</button></td>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <td className="p-3 text-cyan-400">{s.classRoom}</td><td className="p-3">{s.seatNo}</td><td className="p-3 text-white">{s.name}</td>
                                                            <td className="p-3 text-right whitespace-nowrap"><button onClick={() => startEdit(s)} className="px-3 py-1 bg-blue-900/40 text-blue-400 hover:bg-blue-600 hover:text-white rounded transition text-xs mr-2">EDIT</button><button onClick={() => handleDelete(s.id, s.name)} className="px-3 py-1 bg-red-900/40 text-red-400 hover:bg-red-600 hover:text-white rounded transition text-xs">DEL</button></td>
                                                        </>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            // 標籤 3: 試卷管理 (強化版：批次匯入題目)
            function TabExams() {
                const { db } = useContext(AppContext);
                const [exams, setExams] = useState([]);
                const [title, setTitle] = useState('');
                const [currentQuestions, setCurrentQuestions] = useState([]);
                
                // 單題新增狀態
                const [qText, setQText] = useState('');
                const [correct, setCorrect] = useState('');
                const [w1, setW1] = useState('');
                const [w2, setW2] = useState('');
                const [w3, setW3] = useState('');

                // 批次匯入狀態
                const [isBatchMode, setIsBatchMode] = useState(false);
                const [batchData, setBatchData] = useState('');

                useEffect(() => {
                    if (!db) return;
                    const unsub = onSnapshot(collection(db, getPath('exams')), (snap) => {
                        setExams(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                    return () => unsub();
                }, [db]);

                // 單題新增
                const addTempQuestion = (e) => {
                    e.preventDefault();
                    if(!qText || !correct || !w1 || !w2 || !w3) return alert('請填滿所有題目與選項！');
                    setCurrentQuestions([...currentQuestions, {
                        id: Date.now(),
                        question: qText.trim(),
                        correct: correct.trim(),
                        options: [correct.trim(), w1.trim(), w2.trim(), w3.trim()]
                    }]);
                    setQText(''); setCorrect(''); setW1(''); setW2(''); setW3('');
                };

                // 批次匯入題目
                const handleBatchImport = (e) => {
                    e.preventDefault();
                    if (!batchData.trim()) return;

                    const lines = batchData.trim().split('\n');
                    let count = 0;
                    const newQuestions = [];

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        const parts = line.split(/\t|,/).map(s => s.trim()).filter(s => s !== '');
                        
                        // 確保至少有 5 個欄位：題目、正確答案、錯誤1、錯誤2、錯誤3
                        if (parts.length >= 5) {
                            newQuestions.push({
                                id: Date.now() + i, // 避免 ID 衝突
                                question: parts[0],
                                correct: parts[1],
                                options: [parts[1], parts[2], parts[3], parts[4]]
                            });
                            count++;
                        }
                    }

                    if (count > 0) {
                        setCurrentQuestions(prev => [...prev, ...newQuestions]);
                        alert(`✅ 成功解析 ${count} 題！請點擊下方 [ DEPLOY MISSION ] 儲存發布任務。`);
                        setBatchData('');
                        setIsBatchMode(false);
                    } else {
                        alert('找不到有效的題目格式。\n請確保每行格式為「題目 正確答案 錯誤1 錯誤2 錯誤3」並以 Tab 或逗號分隔。');
                    }
                };

                const saveExam = async () => {
                    if (!title) return alert('請輸入任務名稱！');
                    if (currentQuestions.length === 0) return alert('請至少加入一題！');
                    try {
                        await addDoc(collection(db, getPath('exams')), {
                            title: title.trim(),
                            isActive: true,
                            questions: currentQuestions
                        });
                        setTitle(''); setCurrentQuestions([]);
                        alert('任務部署成功！');
                    } catch(err) { alert('部署失敗: '+err.message); }
                };

                const deleteExam = async (id, examTitle) => {
                    if(!confirm(`確定要刪除任務 [${examTitle}]？這將無法復原。`)) return;
                    try { await deleteDoc(doc(db, getPath('exams'), id)); }
                    catch(err) { alert('刪除失敗'); }
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass-panel p-6 rounded-2xl border-yellow-500/30">
                            <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-4">
                                <h3 className="text-lg font-cyber text-yellow-400">任務建置引擎 (New Mission)</h3>
                                <button 
                                    onClick={() => setIsBatchMode(!isBatchMode)} 
                                    className="text-xs px-3 py-1.5 bg-slate-800 text-yellow-500 hover:text-white rounded font-mono border border-slate-600 hover:bg-slate-700 transition"
                                >
                                    切換為{isBatchMode ? '單題新增' : '批次匯入'}
                                </button>
                            </div>

                            <div className="mb-4">
                                <label className="text-xs text-slate-400 font-mono">任務/試卷名稱 (必須填寫)</label>
                                <input type="text" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white font-mono focus:border-yellow-500 outline-none mt-1" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：期中防禦測試" />
                            </div>
                            
                            {!isBatchMode ? (
                                <form onSubmit={addTempQuestion} className="bg-slate-900/50 p-4 rounded-lg border border-slate-700 mb-4 space-y-3 animate-fade-in">
                                    <h4 className="text-sm font-bold text-slate-300">新增單題</h4>
                                    <div><input type="text" placeholder="題目內容" className="w-full bg-black border border-slate-700 rounded p-2 text-white text-sm" value={qText} onChange={e=>setQText(e.target.value)} required /></div>
                                    <div><input type="text" placeholder="正確答案 (Correct)" className="w-full bg-green-900/20 border border-green-700/50 rounded p-2 text-green-300 text-sm" value={correct} onChange={e=>setCorrect(e.target.value)} required /></div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <input type="text" placeholder="錯誤選項 1" className="w-full bg-black border border-slate-700 rounded p-2 text-slate-300 text-sm" value={w1} onChange={e=>setW1(e.target.value)} required />
                                        <input type="text" placeholder="錯誤選項 2" className="w-full bg-black border border-slate-700 rounded p-2 text-slate-300 text-sm" value={w2} onChange={e=>setW2(e.target.value)} required />
                                        <input type="text" placeholder="錯誤選項 3" className="w-full bg-black border border-slate-700 rounded p-2 text-slate-300 text-sm" value={w3} onChange={e=>setW3(e.target.value)} required />
                                    </div>
                                    <button type="submit" className="w-full py-1.5 bg-slate-700 hover:bg-slate-600 text-white rounded text-xs font-mono">+ 加入暫存區</button>
                                </form>
                            ) : (
                                <form onSubmit={handleBatchImport} className="bg-slate-900/50 p-4 rounded-lg border border-slate-700 mb-4 space-y-3 animate-fade-in">
                                    <h4 className="text-sm font-bold text-slate-300">從 Excel/試算表貼上題庫</h4>
                                    <textarea 
                                        placeholder="請貼上資料，格式需為五欄：&#10;題目	正確答案	錯選1	錯選2	錯選3&#10;(支援 Tab 或逗號分隔)" 
                                        className="w-full bg-black border border-slate-700 rounded p-2 text-white font-mono h-40 text-xs resize-none focus:border-yellow-500 outline-none" 
                                        value={batchData} 
                                        onChange={e=>setBatchData(e.target.value)} 
                                        required 
                                    />
                                    <p className="text-[10px] text-slate-500 font-mono">💡 請在 Excel 中依序排好 5 個欄位，然後直接複製貼上到這裡。</p>
                                    <button type="submit" className="w-full py-2 bg-yellow-900/50 border border-yellow-500 text-yellow-400 hover:bg-yellow-600 hover:text-white rounded text-xs font-mono transition">解析並加入暫存區</button>
                                </form>
                            )}

                            <div className="mb-4 flex justify-between items-center bg-slate-800/50 p-3 rounded">
                                <span className="text-sm text-slate-400 font-mono">暫存區題目數:</span>
                                <span className="text-yellow-400 font-bold text-xl">{currentQuestions.length}</span>
                            </div>

                            <button onClick={saveExam} className="w-full py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-cyber font-bold rounded-lg transition shadow-[0_0_15px_rgba(234,179,8,0.2)]">
                                [ DEPLOY MISSION ]
                            </button>
                        </div>

                        <div className="glass-panel p-6 rounded-2xl border-slate-700">
                            <h3 className="text-lg font-cyber text-white mb-4 border-b border-slate-700 pb-2">現行任務清單 ({exams.length})</h3>
                            <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
                                {exams.length === 0 ? <div className="text-slate-500 text-center py-6">目前無任何任務</div> : 
                                 exams.map(ex => (
                                    <div key={ex.id} className="bg-slate-800/50 p-4 rounded-lg flex justify-between items-center border border-slate-700 hover:border-slate-500 transition">
                                        <div>
                                            <div className="text-white font-bold">{ex.title}</div>
                                            <div className="text-xs text-slate-400 font-mono mt-1 flex gap-3">
                                                <span>題數: <span className="text-cyan-400">{ex.questions?.length || 0}</span></span>
                                                <span>狀態: <span className="text-green-400">ACTIVE</span></span>
                                            </div>
                                        </div>
                                        <button onClick={()=>deleteExam(ex.id, ex.title)} className="px-3 py-1 bg-red-900/50 text-red-400 hover:bg-red-600 hover:text-white rounded transition text-xs font-mono">DELETE</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // 標籤 4: 系統設定與派發
            function TabSystem({ dbConfig, db }) {
                const studentLink = useMemo(() => {
                    if (!dbConfig) return '';
                    const base64Config = btoa(encodeURIComponent(JSON.stringify(dbConfig)));
                    return `${window.location.origin}${window.location.pathname}?config=${base64Config}`;
                }, [dbConfig]);

                const copyLink = () => {
                    try {
                        const el = document.createElement('textarea');
                        el.value = studentLink; el.setAttribute('readonly', '');
                        el.style.position = 'absolute'; el.style.left = '-9999px';
                        document.body.appendChild(el); el.select();
                        document.execCommand('copy'); document.body.removeChild(el);
                        alert('網址已複製！請將此網址轉換為 QR Code 讓學生掃描。');
                    } catch (err) { alert('自動複製失敗，請手動選取並複製網址。'); }
                };

                const deployMockData = async () => {
                    if (!confirm('將注入測試用學生與試卷資料，確定嗎？')) return;
                    try {
                        const studentsCol = collection(db, getPath('students'));
                        await addDoc(studentsCol, { classRoom: '101', seatNo: '1', name: '王小明' });
                        await addDoc(studentsCol, { classRoom: '101', seatNo: '2', name: '陳小美' });
                        await addDoc(studentsCol, { classRoom: '102', seatNo: '5', name: '張大華' });
                        const examsCol = collection(db, getPath('exams'));
                        await addDoc(examsCol, {
                            title: '網路安全基礎特訓',
                            isActive: true,
                            questions: [
                                { id: 1, question: '「躊躇」的意思是什麼？', correct: '猶豫不決', options: ['猶豫不決', '非常快樂', '走路很快', '大聲說話'] },
                                { id: 2, question: '為了防止帳號被盜，下列何者是最佳的密碼設定策略？', correct: '使用長度超過12字元且包含大小寫與符號的隨機組合', options: ['使用生日或電話號碼', '所有網站使用同一組密碼', '使用長度超過12字元且包含大小寫與符號的隨機組合', '將密碼寫在螢幕旁邊的便利貼上'] }
                            ]
                        });
                        alert('✅ 測試數據注入完畢！請至各面板查看。');
                    } catch (e) { alert('❌ 注入失敗'); }
                };

                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="glass-panel p-8 rounded-2xl neon-border">
                            <h3 className="text-xl font-cyber text-cyan-400 mb-4">生成學生終端入口</h3>
                            <p className="text-slate-400 font-mono text-sm mb-6 leading-relaxed">您的 Firebase 金鑰已封裝入以下網址。請複製網址並轉換為 QR Code，展示於大螢幕讓學生掃描進入系統。</p>
                            <div className="bg-slate-900 border border-slate-700 p-4 rounded-lg flex items-center gap-4 mb-4">
                                <code className="text-xs text-green-400 break-all overflow-hidden max-h-20">{studentLink}</code>
                            </div>
                            <button onClick={copyLink} className="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition font-cyber">[ COPY LINK ]</button>
                        </div>
                        <div className="glass-panel p-8 rounded-2xl border-purple-500/30">
                            <h3 className="text-xl font-cyber text-purple-400 mb-4">系統重置與除錯</h3>
                            <p className="text-slate-400 font-mono text-sm mb-6">點擊下方按鈕將為您的資料庫注入一組示範用的學生與考卷資料。建議僅在初期測試時使用。</p>
                            <button onClick={deployMockData} className="w-full py-3 border border-purple-500 text-purple-400 hover:bg-purple-900/30 font-bold rounded-lg transition font-cyber">[ INJECT DEMO DATA ]</button>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 學生面板與測驗
            // ==========================================
            function StudentLogin({ setView, onLogin }) {
                const { db, user } = useContext(AppContext);
                const [students, setStudents] = useState([]);
                const [loading, setLoading] = useState(true);
                const [selectedClass, setSelectedClass] = useState('');
                const [selectedSeat, setSelectedSeat] = useState('');

                useEffect(() => {
                    if (!db || !user) return;
                    const fetchStudents = async () => {
                        const q = query(collection(db, getPath('students')));
                        onSnapshot(q, (snapshot) => {
                            const list = snapshot.docs.map(doc => doc.data());
                            setStudents(list);
                            setLoading(false);
                        }, (err) => {
                            console.error("名單載入失敗", err);
                            setLoading(false);
                        });
                    };
                    fetchStudents();
                }, [db, user]);

                const classes = [...new Set(students.map(s => s.classRoom))].sort();
                const seats = students.filter(s => s.classRoom === selectedClass).map(s => s.seatNo).sort((a,b)=>parseInt(a)-parseInt(b));
                const targetStudent = students.find(s => s.classRoom === selectedClass && s.seatNo === selectedSeat);

                const handleLogin = (e) => {
                    e.preventDefault();
                    if (targetStudent) {
                        onLogin(targetStudent);
                        setView('student-dashboard');
                    }
                };

                return (
                    <div className="flex items-center justify-center min-h-[80vh]">
                        <div className="glass-panel neon-border p-8 md:p-12 rounded-3xl w-full max-w-md">
                            <div className="text-center mb-8">
                                <h2 className="text-3xl font-cyber text-cyan-400 mb-2">IDENTIFICATION</h2>
                                <p className="text-slate-400 font-mono text-sm">請選擇身分識別碼</p>
                            </div>

                            {loading ? (
                                <div className="text-center py-10 text-cyan-500 font-mono animate-pulse">Connecting to DB...</div>
                            ) : (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <div>
                                        <label className="block font-mono text-cyan-500 text-xs mb-2 uppercase">Class Sector (班級)</label>
                                        <select 
                                            className="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-lg focus:outline-none focus:border-cyan-500 font-mono"
                                            value={selectedClass} onChange={e => { setSelectedClass(e.target.value); setSelectedSeat(''); }}
                                        >
                                            <option value="">-- 選擇班級 --</option>
                                            {classes.map(c => <option key={c} value={c}>{c} 班</option>)}
                                        </select>
                                    </div>

                                    {selectedClass && (
                                        <div className="animate-fade-in">
                                            <label className="block font-mono text-cyan-500 text-xs mb-2 uppercase">Seat Number (座號)</label>
                                            <select 
                                                className="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-lg focus:outline-none focus:border-cyan-500 font-mono"
                                                value={selectedSeat} onChange={e => setSelectedSeat(e.target.value)}
                                            >
                                                <option value="">-- 選擇座號 --</option>
                                                {seats.map(s => <option key={s} value={s}>{s} 號</option>)}
                                            </select>
                                        </div>
                                    )}

                                    {targetStudent && (
                                        <div className="bg-cyan-900/30 border border-cyan-500/50 p-4 rounded-lg text-center animate-fade-in mt-4">
                                            <p className="text-cyan-300 font-mono mb-1">USER MATCHED</p>
                                            <p className="text-white font-bold text-xl">{targetStudent.name}</p>
                                        </div>
                                    )}

                                    <button 
                                        type="submit" 
                                        disabled={!targetStudent}
                                        className={`w-full py-4 rounded-xl font-cyber font-bold text-lg transition shadow-lg mt-6
                                            ${!targetStudent ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700' : 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-[0_0_15px_rgba(0,240,255,0.4)]'}`}
                                    >
                                        [ ENTER SIMULATION ]
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            function StudentDashboard({ setView, profile }) {
                const { db, user } = useContext(AppContext);
                const [exams, setExams] = useState([]);
                const [loading, setLoading] = useState(true);
                const [selectedExam, setSelectedExam] = useState(null);

                useEffect(() => {
                    if (!db || !user) return;
                    const q = query(collection(db, getPath('exams')));
                    onSnapshot(q, (snapshot) => {
                        setExams(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, (err) => {
                        console.error(err);
                        setLoading(false);
                    });
                }, [db, user]);

                if (selectedExam) {
                    return <QuizEngine exam={selectedExam} profile={profile} onBack={() => setSelectedExam(null)} />;
                }

                return (
                    <div className="max-w-4xl mx-auto pt-8">
                        <h2 className="text-3xl font-cyber font-bold text-cyan-400 mb-8 border-l-4 border-cyan-500 pl-4">AVAILABLE MISSIONS</h2>
                        
                        {loading ? (
                            <div className="text-center py-20 text-cyan-500 font-mono animate-pulse">Scanning available missions...</div>
                        ) : exams.length === 0 ? (
                            <div className="glass-panel p-10 text-center rounded-2xl text-slate-400 border border-dashed border-slate-600">
                                目前沒有開放的任務
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {exams.map(exam => (
                                    <div key={exam.id} className="glass-panel neon-border p-6 rounded-2xl flex flex-col justify-between group">
                                        <div>
                                            <h3 className="text-xl font-bold text-white mb-2">{exam.title}</h3>
                                            <p className="text-slate-400 text-sm font-mono mb-4">Total Questions: {exam.questions?.length || 0}</p>
                                        </div>
                                        <button onClick={() => setSelectedExam(exam)} className="self-end px-6 py-2 bg-cyan-900/40 text-cyan-400 border border-cyan-500 rounded font-cyber text-sm group-hover:bg-cyan-600 group-hover:text-white transition">
                                            START MISSION 🚀
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            function QuizEngine({ exam, profile, onBack }) {
                const { db } = useContext(AppContext);
                const [stage, setStage] = useState('playing');
                const [questions, setQuestions] = useState([]);
                const [currentIndex, setCurrentIndex] = useState(0);
                
                const [timeLeft, setTimeLeft] = useState(30);
                const [score, setScore] = useState(0);
                const [combo, setCombo] = useState(0);
                const [wrongAnswers, setWrongAnswers] = useState([]);
                const [feedback, setFeedback] = useState(null);
                
                const [lockoutTime, setLockoutTime] = useState(0);
                const [consecutiveErrors, setConsecutiveErrors] = useState(0);
                const [isPaused, setIsPaused] = useState(false);

                useEffect(() => {
                    if (!exam || !exam.questions) return;
                    const shuffledQ = [...exam.questions].sort(() => Math.random() - 0.5).map(q => ({
                        ...q,
                        shuffledOptions: [...q.options].sort(() => Math.random() - 0.5)
                    }));
                    setQuestions(shuffledQ);
                }, [exam]);

                useEffect(() => {
                    if (lockoutTime > 0) {
                        const timer = setTimeout(() => setLockoutTime(prev => prev - 1), 1000);
                        return () => clearTimeout(timer);
                    }

                    if (isPaused || stage !== 'playing' || questions.length === 0) return;

                    const timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                handleAnswer(null);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }, [currentIndex, isPaused, lockoutTime, stage, questions]);

                const handleAnswer = (selectedOpt) => {
                    setIsPaused(true);
                    const currentQ = questions[currentIndex];
                    const isFastAnswer = timeLeft >= 25;
                    
                    let isMatch = false;
                    if (selectedOpt === currentQ.correct || selectedOpt === currentQ.options[parseInt(currentQ.correct)-1]) {
                        isMatch = true;
                    }

                    let earnedPoints = 0;
                    if (isMatch) {
                        const newCombo = combo + 1;
                        setCombo(newCombo);
                        let base = Math.round((timeLeft / 30) * 1000);
                        const multiplier = Math.min(2.0, 1 + (newCombo - 1) * 0.1);
                        earnedPoints = Math.round(base * multiplier);
                        
                        setFeedback('correct');
                        setConsecutiveErrors(0);
                    } else {
                        setCombo(0);
                        setFeedback('incorrect');
                        setWrongAnswers(p => [...p, { ...currentQ, selected: selectedOpt || 'TIMEOUT' }]);
                        
                        const nextErrors = isFastAnswer ? consecutiveErrors + 1 : 0;
                        setConsecutiveErrors(nextErrors);
                        if (nextErrors >= 3) {
                            setLockoutTime(5);
                            setConsecutiveErrors(0);
                        }
                    }

                    setScore(p => p + earnedPoints);

                    setTimeout(() => {
                        setFeedback(null);
                        if (currentIndex < questions.length - 1) {
                            setCurrentIndex(p => p + 1);
                            setTimeLeft(30);
                            setIsPaused(false);
                        } else {
                            finishQuiz(score + earnedPoints, isMatch ? wrongAnswers : [...wrongAnswers, { ...currentQ, selected: selectedOpt || 'TIMEOUT' }]);
                        }
                    }, 1500);
                };

                const finishQuiz = async (finalScore, finalWrongs) => {
                    setStage('saving');
                    try {
                        const recordId = `${profile.classRoom}_${profile.seatNo}`;
                        
                        await addDoc(collection(db, getPath('quiz_records')), {
                            examId: exam.title,
                            studentId: recordId,
                            name: profile.name,
                            score: finalScore,
                            timestamp: serverTimestamp()
                        });

                        if (finalWrongs.length > 0) {
                            const mistakesCol = collection(db, getPath('mistake_logs'));
                            for (const w of finalWrongs) {
                                await addDoc(mistakesCol, {
                                    examId: exam.title,
                                    studentId: recordId,
                                    question: w.question,
                                    correct: w.correct,
                                    selected: w.selected,
                                    timestamp: serverTimestamp()
                                });
                            }
                        }
                        setStage('completed');
                    } catch (e) {
                        console.error("寫入成績失敗", e);
                        alert("成績上傳失敗，請聯絡教官！");
                        onBack();
                    }
                };

                if (questions.length === 0) return null;

                if (stage === 'saving') return (
                    <div className="flex flex-col items-center justify-center h-[80vh]">
                        <div className="w-16 h-16 rounded-full border-4 border-purple-500 border-t-transparent animate-spin mb-4"></div>
                        <h2 className="text-2xl font-cyber text-purple-400 animate-pulse">UPLOADING DATA...</h2>
                    </div>
                );

                if (stage === 'completed') return (
                    <div className="max-w-2xl mx-auto pt-10 text-center animate-fade-in">
                        <div className="glass-panel neon-border p-12 rounded-3xl mb-8 border-t-4 border-cyan-500">
                            <h2 className="text-4xl font-cyber text-white mb-6">MISSION ACCOMPLISHED</h2>
                            <p className="text-slate-400 font-mono mb-2">FINAL SCORE</p>
                            <div className="text-7xl font-bold text-cyan-400 text-glow font-mono tracking-tighter mb-8">
                                {score}
                            </div>
                            
                            {wrongAnswers.length > 0 ? (
                                <div className="bg-red-900/20 border border-red-500/30 p-4 rounded-lg text-left">
                                    <h4 className="text-red-400 font-bold mb-2 flex items-center gap-2">⚠️ 需要複習的單元 ({wrongAnswers.length})</h4>
                                    <ul className="text-slate-300 text-sm space-y-2 list-disc pl-5">
                                        {wrongAnswers.slice(0,3).map((w, i) => <li key={i}>{w.question}</li>)}
                                        {wrongAnswers.length > 3 && <li>...等其他 {wrongAnswers.length - 3} 題</li>}
                                    </ul>
                                </div>
                            ) : (
                                <div className="bg-green-900/20 border border-green-500/30 p-4 rounded-lg text-green-400 font-bold text-xl">
                                    PERFECT CLEAR! 全對通關！
                                </div>
                            )}
                        </div>
                        <button onClick={onBack} className="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-cyber transition">
                            RETURN TO LOBBY
                        </button>
                    </div>
                );

                const currentQ = questions[currentIndex];
                const isReading = timeLeft >= 29;
                const isOptionsDisabled = isPaused || isReading || lockoutTime > 0;

                return (
                    <div className="max-w-5xl mx-auto h-[80vh] flex flex-col relative">
                        
                        {lockoutTime > 0 && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-red-950/90 backdrop-blur-md rounded-3xl">
                                <div className="text-center">
                                    <div className="text-7xl mb-4 animate-pulse">⚠️</div>
                                    <h2 className="text-3xl font-cyber text-red-500 font-bold mb-2 text-glow">SYSTEM LOCKED</h2>
                                    <p className="text-red-300 font-mono mb-6">偵測到異常作答頻率，冷卻中...</p>
                                    <div className="text-8xl font-mono text-white">{lockoutTime}</div>
                                </div>
                            </div>
                        )}

                        {feedback && (
                            <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm rounded-3xl">
                                <div className={`p-10 rounded-3xl flex flex-col items-center gap-4 animate-pulse-ring ${feedback === 'correct' ? 'text-green-400 shadow-[0_0_50px_rgba(57,255,20,0.5)]' : 'text-red-500 shadow-[0_0_50px_rgba(255,0,0,0.5)]'}`}>
                                    <span className="text-6xl">{feedback === 'correct' ? '⭕' : '❌'}</span>
                                    <span className="text-4xl font-cyber font-bold">{feedback === 'correct' ? 'MATCH' : 'ERROR'}</span>
                                    {feedback === 'correct' && combo >= 2 && (
                                        <div className="text-yellow-400 font-cyber font-bold text-2xl mt-2 animate-bounce">
                                            COMBO x{combo} !!
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-end mb-4 px-2">
                            <div>
                                <span className="text-cyan-500 font-cyber text-lg">Q.{currentIndex + 1} <span className="text-slate-500 text-sm">/ {questions.length}</span></span>
                                {combo >= 2 && <span className="ml-4 text-yellow-400 font-cyber text-sm bg-yellow-900/30 px-2 py-1 rounded border border-yellow-500/50">COMBO {combo}</span>}
                            </div>
                            <div className="text-right">
                                <span className="text-xs text-slate-500 font-mono block">SCORE</span>
                                <span className="text-3xl font-cyber font-bold text-cyan-400">{score}</span>
                            </div>
                        </div>

                        <div className="w-full h-2 bg-slate-800 rounded-full mb-6 overflow-hidden">
                            <div 
                                className={`h-full transition-all duration-1000 linear shadow-[0_0_10px_currentColor] ${timeLeft < 10 ? 'bg-red-500 text-red-500' : 'bg-cyan-400 text-cyan-400'}`} 
                                style={{ width: `${(timeLeft / 30) * 100}%` }}
                            ></div>
                        </div>

                        <div className="flex-[3] flex items-center justify-center glass-panel rounded-3xl p-8 mb-6 relative">
                            <h2 className="text-2xl md:text-4xl font-bold text-white leading-relaxed text-center">
                                {currentQ.question}
                            </h2>
                            {isReading && (
                                <div className="absolute top-4 left-4 flex items-center gap-2 bg-red-900/50 border border-red-500 text-red-400 px-3 py-1 rounded-full text-xs font-mono">
                                    <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                    資料解析中...
                                </div>
                            )}
                        </div>

                        <div className="flex-[4] grid grid-cols-2 gap-4">
                            {currentQ.shuffledOptions.map((opt, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => !isOptionsDisabled && handleAnswer(opt)}
                                    disabled={isOptionsDisabled}
                                    className={`glass-panel border-t-2 rounded-2xl flex items-center justify-center p-6 text-xl md:text-2xl font-bold transition duration-200 break-words h-full
                                        ${isOptionsDisabled && !isReading ? 'opacity-50 cursor-not-allowed' : 'hover:-translate-y-1 active:scale-95'}
                                        ${isReading ? 'border-slate-600 text-slate-500' : 'border-cyan-500 text-white hover:bg-cyan-900/30 hover:shadow-[0_0_20px_rgba(0,240,255,0.3)]'}
                                    `}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        if (window.FirebaseModules) {
            startApp();
        } else {
            window.addEventListener('FIREBASE_LOADED', startApp);
        }
    </script>
</body>
</html>
