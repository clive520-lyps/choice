<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧測驗與即時回饋系統</title>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            theme: {
                                bg: 'rgb(var(--bg-main) / <alpha-value>)',
                                panel: 'rgb(var(--bg-panel) / <alpha-value>)',
                                input: 'rgb(var(--bg-input) / <alpha-value>)',
                                text: 'rgb(var(--text-main) / <alpha-value>)',
                                muted: 'rgb(var(--text-muted) / <alpha-value>)',
                                border: 'rgb(var(--border-main) / <alpha-value>)',
                                primary: 'rgb(var(--color-primary) / <alpha-value>)',
                                secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
                                success: 'rgb(var(--color-success) / <alpha-value>)',
                                danger: 'rgb(var(--color-danger) / <alpha-value>)',
                                warning: 'rgb(var(--color-warning) / <alpha-value>)'
                            }
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-theme-bg text-theme-text font-sans antialiased overflow-x-hidden transition-colors duration-300">
    <div id="root"></div>

    <script type="module">
        import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        window.FirebaseModules = {
            initializeApp, getApps, getApp,
            getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch,
            getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut
        };
        window.dispatchEvent(new Event('FIREBASE_LOADED'));
    </script>

    <script type="text/babel">
        const startApp = () => {
            const { 
                initializeApp, getApps, getApp, 
                getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, doc, updateDoc, writeBatch,
                getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
            } = window.FirebaseModules;
            
            const { useState, useEffect, useMemo, createContext, useContext } = React;

            // --- 升級版 CSS 變數：徹底分離賽博龐克與傳統深淺色的陰影效果 ---
            const injectStyles = () => {
                if (document.getElementById('cyber-styles')) return;
                const style = document.createElement('style');
                style.id = 'cyber-styles';
                style.innerHTML = `
                    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
                    
                    :root, [data-theme="cyber"] {
                        --bg-main: 5 11 20;
                        --bg-panel: 15 23 42;
                        --bg-input: 10 15 30;
                        --text-main: 226 232 240;
                        --text-muted: 148 163 184;
                        --border-main: 0 240 255; 
                        --border-opacity: 0.3;
                        --color-primary: 0 240 255;
                        --color-secondary: 181 23 158;
                        --color-success: 57 255 20;
                        --color-danger: 255 0 60;
                        --color-warning: 234 179 8;
                        --glass-blur: blur(12px);
                        --bg-pattern: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
                        --shadow-panel: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                        --shadow-neon: 0 0 10px rgba(var(--color-primary), 0.2), inset 0 0 10px rgba(var(--color-primary), 0.1);
                        --shadow-neon-hover: 0 0 20px rgba(var(--color-primary), 0.6), inset 0 0 15px rgba(var(--color-primary), 0.3);
                        --shadow-green: 0 0 10px rgba(var(--color-success), 0.2), inset 0 0 10px rgba(var(--color-success), 0.1);
                        --shadow-green-hover: 0 0 20px rgba(var(--color-success), 0.6), inset 0 0 15px rgba(var(--color-success), 0.3);
                        --text-glow-css: 0 0 10px rgba(var(--color-primary), 0.5);
                    }
                    
                    [data-theme="light"] {
                        --bg-main: 243 244 246; 
                        --bg-panel: 255 255 255;
                        --bg-input: 255 255 255;
                        --text-main: 31 41 55;
                        --text-muted: 107 114 128;
                        --border-main: 209 213 219;
                        --border-opacity: 1;
                        --color-primary: 37 99 235;
                        --color-secondary: 124 58 237;
                        --color-success: 22 163 74;
                        --color-danger: 220 38 38;
                        --color-warning: 217 119 6;
                        --glass-blur: none;
                        --bg-pattern: none;
                        --shadow-panel: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                        --shadow-neon: none;
                        --shadow-neon-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
                        --shadow-green: none;
                        --shadow-green-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                        --text-glow-css: none;
                    }

                    [data-theme="dark"] {
                        --bg-main: 17 24 39; 
                        --bg-panel: 31 41 55; 
                        --bg-input: 55 65 81; 
                        --text-main: 243 244 246;
                        --text-muted: 156 163 175;
                        --border-main: 75 85 99;
                        --border-opacity: 1;
                        --color-primary: 96 165 250;
                        --color-secondary: 167 139 250;
                        --color-success: 52 211 153;
                        --color-danger: 248 113 113;
                        --color-warning: 251 191 36;
                        --glass-blur: none;
                        --bg-pattern: none;
                        --shadow-panel: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
                        --shadow-neon: none;
                        --shadow-neon-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
                        --shadow-green: none;
                        --shadow-green-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
                        --text-glow-css: none;
                    }

                    body {
                        background-image: var(--bg-pattern);
                        background-size: 30px 30px;
                    }

                    .font-cyber { font-family: 'Orbitron', 'Noto Sans TC', sans-serif; }
                    
                    .glass-panel {
                        background: rgba(var(--bg-panel), 0.95);
                        backdrop-filter: var(--glass-blur);
                        -webkit-backdrop-filter: var(--glass-blur);
                        border: 1px solid rgba(var(--border-main), var(--border-opacity));
                        box-shadow: var(--shadow-panel);
                    }
                    
                    .neon-border {
                        border: 1px solid rgba(var(--color-primary), var(--border-opacity));
                        box-shadow: var(--shadow-neon);
                    }
                    .neon-border:hover {
                        box-shadow: var(--shadow-neon-hover);
                        border-color: rgba(var(--color-primary), 1);
                    }

                    .neon-border-green {
                        border: 1px solid rgba(var(--color-success), var(--border-opacity));
                        box-shadow: var(--shadow-green);
                    }
                    .neon-border-green:hover {
                        box-shadow: var(--shadow-green-hover);
                        border-color: rgba(var(--color-success), 1);
                    }

                    .scanline {
                        width: 100%; height: 100px;
                        background: linear-gradient(0deg, rgba(var(--color-primary),0) 0%, rgba(var(--color-primary),0.15) 50%, rgba(var(--color-primary),0) 100%);
                        opacity: 0.1; position: absolute; bottom: 100%;
                        animation: scanline 6s linear infinite; pointer-events: none;
                    }
                    @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }
                    
                    .text-glow { text-shadow: var(--text-glow-css); }
                    .text-gradient { background: linear-gradient(to right, rgb(var(--color-primary)), rgb(var(--color-secondary))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
                    
                    @keyframes pulse-ring {
                        0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(var(--color-primary), 0.7); }
                        70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(var(--color-primary), 0); }
                        100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(var(--color-primary), 0); }
                    }
                    .animate-pulse-ring { animation: pulse-ring 2s infinite; }
                    
                    ::-webkit-scrollbar { width: 6px; }
                    ::-webkit-scrollbar-track { background: rgb(var(--bg-main)); }
                    ::-webkit-scrollbar-thumb { background: rgb(var(--color-primary)); border-radius: 4px; }
                `;
                document.head.appendChild(style);
            };

            const AppContext = createContext();
            const getPath = (colName) => colName;

            const extractConfig = (text) => {
                const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
                const config = {};
                let valid = true;
                keys.forEach(key => {
                    const regex = new RegExp(`${key}\\s*:\\s*["'\`]([^"'\`]+)["'\`]`);
                    const match = text.match(regex);
                    if (match && match[1]) config[key] = match[1];
                    else valid = false;
                });
                return valid ? config : null;
            };

            // ==========================================
            // 核心 App
            // ==========================================
            function App() {
                const [dbConfig, setDbConfig] = useState(null);
                const [firebaseInstances, setFirebaseInstances] = useState(null);
                const [user, setUser] = useState(null);
                const [systemState, setSystemState] = useState('BOOTING');
                const [errorMsg, setErrorMsg] = useState('');
                const [theme, setTheme] = useState(localStorage.getItem('cybernode_theme') || 'cyber');

                useEffect(() => {
                    injectStyles();
                    
                    const params = new URLSearchParams(window.location.search);
                    const encodedConfig = params.get('config');
                    let savedConfig = localStorage.getItem('cybernode_config');

                    if (encodedConfig) {
                        try {
                            savedConfig = decodeURIComponent(atob(encodedConfig));
                            localStorage.setItem('cybernode_config', savedConfig);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        } catch (e) {
                            console.error("URL 解碼失敗", e);
                        }
                    }

                    if (savedConfig) {
                        initFirebase(savedConfig);
                    } else {
                        setSystemState('SETUP');
                    }
                }, []);

                useEffect(() => {
                    document.body.setAttribute('data-theme', theme);
                    localStorage.setItem('cybernode_theme', theme);
                }, [theme]);

                const initFirebase = async (configStr) => {
                    setSystemState('BOOTING');
                    try {
                        const configObj = JSON.parse(configStr);
                        const app = getApps().length === 0 ? initializeApp(configObj) : getApp();
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        
                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            setFirebaseInstances({ app, auth, db });
                            setDbConfig(configObj);
                            setSystemState('READY');
                        });
                    } catch (err) {
                        console.error("Firebase Init Error:", err);
                        setErrorMsg(err.message);
                        setSystemState('ERROR');
                        localStorage.removeItem('cybernode_config');
                    }
                };

                const handleSetupSubmit = (configStr) => {
                    localStorage.setItem('cybernode_config', configStr);
                    initFirebase(configStr);
                };

                const resetSystem = () => {
                    localStorage.removeItem('cybernode_config');
                    window.location.reload();
                };

                return (
                    <div className="min-h-screen w-full relative">
                        <div className="scanline"></div>
                        
                        {systemState === 'BOOTING' && (
                            <div className="flex items-center justify-center h-screen flex-col gap-4">
                                <div className="w-16 h-16 rounded-full border-4 border-theme-primary border-t-transparent animate-spin"></div>
                                <div className="text-theme-primary font-cyber text-xl animate-pulse">系統初始化中...</div>
                            </div>
                        )}

                        {systemState === 'ERROR' && (
                            <div className="flex items-center justify-center h-screen p-4">
                                <div className="glass-panel p-8 rounded-2xl max-w-lg text-center border-theme-danger border">
                                    <div className="text-theme-danger text-6xl mb-4">⚠️</div>
                                    <h2 className="text-2xl font-bold text-theme-danger mb-2 font-cyber">連線失敗</h2>
                                    <p className="text-theme-muted mb-6">{errorMsg}</p>
                                    <button onClick={resetSystem} className="px-6 py-2 bg-theme-danger/20 hover:bg-theme-danger/40 text-theme-danger rounded border border-theme-danger transition">重新設定系統</button>
                                </div>
                            </div>
                        )}

                        {systemState === 'SETUP' && <SetupWizard onConfigSubmit={handleSetupSubmit} />}

                        {systemState === 'READY' && (
                            <AppContext.Provider value={{ ...firebaseInstances, user, dbConfig, resetSystem, theme, setTheme }}>
                                <MainTerminal />
                            </AppContext.Provider>
                        )}
                    </div>
                );
            }

            // ==========================================
            // 設定精靈
            // ==========================================
            function SetupWizard({ onConfigSubmit }) {
                const [inputText, setInputText] = useState('');
                const [error, setError] = useState('');

                const handleParse = () => {
                    const config = extractConfig(inputText);
                    if (config) {
                        onConfigSubmit(JSON.stringify(config));
                    } else {
                        setError('無法解析 Config，請確保包含 apiKey, projectId 等欄位。');
                    }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-panel p-8 md:p-12 rounded-3xl max-w-3xl w-full relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.1)]">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-theme-primary to-theme-secondary"></div>
                            
                            <h1 className="text-3xl md:text-4xl font-cyber font-bold text-glow mb-2">
                                <span className="text-theme-primary">智慧測驗</span><span className="text-theme-secondary">終端</span>
                                <span className="text-theme-muted text-xl ml-4 tracking-widest">// 系統初始化</span>
                            </h1>
                            <p className="text-theme-muted mb-8 font-mono text-sm">請注入您的 Firebase 資料庫核心金鑰以啟動終端。</p>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <h3 className="text-theme-primary font-bold mb-4 flex items-center gap-2">
                                        <span className="bg-theme-primary/20 text-theme-primary px-2 py-1 rounded text-xs font-mono">步驟 1</span>
                                        取得憑證教學
                                    </h3>
                                    <ol className="text-theme-text/80 text-sm space-y-3 font-mono leading-relaxed list-decimal list-inside">
                                        <li>前往 <a href="https://console.firebase.google.com/" target="_blank" className="text-theme-primary hover:underline">Firebase Console</a> 新增專案。</li>
                                        <li>左側選單進入 <b>Firestore Database</b>，建立資料庫並選擇「測試模式 (Test Mode)」。</li>
                                        <li>左側選單進入 <b>Authentication</b>，<span className="text-theme-danger font-bold">必須啟用「匿名登入」與「電子郵件/密碼」</span>兩種登入方式。</li>
                                        <li>前往「專案設定 &gt; 您的應用程式」，新增一個網頁應用程式 <code>&lt;/&gt;</code>。</li>
                                        <li>複製出現的 <code>const firebaseConfig = &#123; ... &#125;</code> 程式碼區塊。</li>
                                    </ol>
                                </div>
                                
                                <div className="flex flex-col">
                                    <h3 className="text-theme-primary font-bold mb-4 flex items-center gap-2">
                                        <span className="bg-theme-primary/20 text-theme-primary px-2 py-1 rounded text-xs font-mono">步驟 2</span>
                                        金鑰注入區
                                    </h3>
                                    <textarea 
                                        className="flex-1 w-full bg-theme-input border border-theme-border text-theme-success font-mono text-xs p-4 rounded-xl focus:outline-none focus:border-theme-primary transition resize-none neon-border"
                                        placeholder="請貼上 firebaseConfig 程式碼..."
                                        value={inputText}
                                        onChange={(e) => { setInputText(e.target.value); setError(''); }}
                                    ></textarea>
                                    {error && <div className="text-theme-danger text-xs mt-2 font-mono">{error}</div>}
                                    
                                    <button 
                                        onClick={handleParse}
                                        className="mt-4 w-full py-3 bg-theme-primary hover:opacity-90 text-white font-cyber font-bold rounded-xl transition transform hover:scale-[1.02] active:scale-95 shadow-md"
                                    >
                                        [ 初始化資料庫 ]
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 主終端機路由與頭部設定
            // ==========================================
            function MainTerminal() {
                const { user, auth, resetSystem, theme, setTheme } = useContext(AppContext);
                const [view, setView] = useState('role-select');
                const [studentProfile, setStudentProfile] = useState(null);

                const handleLogout = async () => {
                    if (user) await signOut(auth);
                    setStudentProfile(null);
                    setView('role-select');
                };

                const themeNames = { cyber: '賽博龐克', light: '明亮模式', dark: '深色模式' };
                const toggleTheme = () => {
                    const order = ['cyber', 'light', 'dark'];
                    setTheme(order[(order.indexOf(theme) + 1) % 3]);
                };

                return (
                    <div className="min-h-screen flex flex-col">
                        <header className="glass-panel border-b border-theme-border p-4 sticky top-0 z-50">
                            <div className="container mx-auto flex flex-wrap justify-between items-center gap-2">
                                <div className="font-cyber font-bold text-xl cursor-pointer" onClick={() => setView('role-select')}>
                                    <span className="text-theme-primary text-glow">智慧</span>
                                    <span className="text-theme-text">終端</span>
                                </div>
                                <div className="flex flex-wrap items-center gap-2 md:gap-4">
                                    <button onClick={toggleTheme} className="text-xs font-mono text-theme-muted hover:text-theme-primary transition">
                                        [ 佈景: {themeNames[theme]} ]
                                    </button>

                                    {user && !user.isAnonymous && (
                                        <div className="hidden md:flex items-center gap-2 bg-theme-secondary/20 px-3 py-1 rounded-full border border-theme-secondary">
                                            <div className="w-2 h-2 rounded-full bg-theme-secondary animate-pulse"></div>
                                            <span className="text-xs font-mono text-theme-text/80">授權: 教師</span>
                                        </div>
                                    )}
                                    {studentProfile && (
                                        <div className="hidden md:flex items-center gap-2 bg-theme-input px-3 py-1 rounded-full border border-theme-border">
                                            <div className="w-2 h-2 rounded-full bg-theme-success animate-pulse"></div>
                                            <span className="text-xs font-mono text-theme-text/80">{studentProfile.classRoom}-{studentProfile.seatNo} [{studentProfile.name}]</span>
                                        </div>
                                    )}
                                    {user && (
                                        <button onClick={handleLogout} className="text-xs font-mono text-theme-muted hover:text-theme-danger transition">
                                            [ 登出系統 ]
                                        </button>
                                    )}
                                    <button onClick={resetSystem} className="text-xs font-mono text-theme-muted hover:text-theme-danger transition md:border-l border-theme-border md:pl-4">
                                        [ 解除資料庫綁定 ]
                                    </button>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 container mx-auto p-4 md:p-6 overflow-hidden">
                            {view === 'role-select' && <RoleSelect setView={setView} />}
                            {view === 'teacher-login' && <TeacherAuth setView={setView} />}
                            {view === 'teacher-dashboard' && <TeacherDashboard setView={setView} />}
                            {view === 'student-login' && <StudentLogin setView={setView} onLogin={setStudentProfile} />}
                            {view === 'student-dashboard' && <StudentDashboard setView={setView} profile={studentProfile} />}
                        </main>
                    </div>
                );
            }

            function RoleSelect({ setView }) {
                const { user, auth } = useContext(AppContext);

                const handleStudentMode = async () => {
                    if (!user) {
                        try {
                            await signInAnonymously(auth);
                        } catch (e) {
                            if (e.code === 'auth/operation-not-allowed') {
                                alert("⛔ 系統阻擋：操作不允許\n\n系統偵測到您的 Firebase 尚未開啟「匿名登入」權限。\n\n請老師前往 Firebase 後台：\n1. 點擊左側 Authentication (驗證)\n2. 進入 Sign-in method (登入方式) 頁籤\n3. 找到「匿名 (Anonymous)」並啟用它！");
                            } else {
                                alert("學生登入失敗: " + e.message);
                            }
                            return;
                        }
                    }
                    setView('student-login');
                };

                const handleTeacherMode = () => {
                    if (user && !user.isAnonymous) {
                        setView('teacher-dashboard');
                    } else {
                        setView('teacher-login');
                    }
                };

                return (
                    <div className="h-full flex flex-col items-center justify-center pt-10 pb-20">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-5xl font-cyber font-bold mb-4 text-gradient">請選擇您的登入身分</h2>
                            <p className="text-theme-muted font-mono">請選擇對應的入口以取得操作權限</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
                            <button onClick={handleStudentMode} className="glass-panel neon-border p-10 rounded-3xl flex flex-col items-center group transition transform hover:-translate-y-2 relative overflow-hidden">
                                <div className="absolute inset-0 bg-theme-primary/5 group-hover:bg-theme-primary/10 transition"></div>
                                <div className="text-7xl mb-6 group-hover:scale-110 transition duration-300 drop-shadow-md">🧑‍🚀</div>
                                <h3 className="text-2xl font-cyber font-bold text-theme-primary mb-2">[ 學生入口 ]</h3>
                                <p className="text-theme-muted text-sm">進入測驗模擬器</p>
                            </button>
                            <button onClick={handleTeacherMode} className="glass-panel neon-border-green p-10 rounded-3xl flex flex-col items-center group transition transform hover:-translate-y-2 relative overflow-hidden">
                                <div className="absolute inset-0 bg-theme-success/5 group-hover:bg-theme-success/10 transition"></div>
                                <div className="text-7xl mb-6 group-hover:scale-110 transition duration-300 drop-shadow-md">👩‍💻</div>
                                <h3 className="text-2xl font-cyber font-bold text-theme-success mb-2">[ 教師後台 ]</h3>
                                <p className="text-theme-muted text-sm">指揮官儀表板 (需帳號密碼)</p>
                            </button>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 教師驗證模組
            // ==========================================
            function TeacherAuth({ setView }) {
                const { auth } = useContext(AppContext);
                const [isRegister, setIsRegister] = useState(false);
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const [error, setError] = useState('');

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    setError('');
                    try {
                        if (isRegister) {
                            await createUserWithEmailAndPassword(auth, email, password);
                            alert("註冊成功！系統授權完畢。");
                        } else {
                            await signInWithEmailAndPassword(auth, email, password);
                        }
                        setView('teacher-dashboard');
                    } catch (err) {
                        console.error(err);
                        if (err.code === 'auth/email-already-in-use') setError('此信箱已被註冊。');
                        else if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') setError('⛔ 登入失敗：帳號或密碼錯誤。');
                        else if (err.code === 'auth/operation-not-allowed') setError('⛔ 系統阻擋：請至 Firebase 後台 -> Authentication 啟用「電子郵件/密碼」功能！');
                        else setError(`錯誤: ${err.message}`);
                    }
                };

                return (
                    <div className="flex items-center justify-center min-h-[80vh]">
                        <div className="glass-panel border-theme-secondary/50 shadow-lg p-8 md:p-12 rounded-3xl w-full max-w-md relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-theme-primary to-theme-secondary"></div>
                            
                            <div className="text-center mb-8">
                                <h2 className="text-3xl font-cyber text-theme-secondary mb-2">指揮官認證</h2>
                                <p className="text-theme-muted font-mono text-sm">{isRegister ? '建立新的教師管理權限' : '請輸入教師憑證'}</p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <label className="block font-mono text-theme-secondary text-xs mb-2">電子郵件 (Email)</label>
                                    <input 
                                        type="email" required
                                        className="w-full bg-theme-input border border-theme-border text-theme-text p-3 rounded-lg focus:outline-none focus:border-theme-secondary font-mono shadow-sm"
                                        value={email} onChange={e => setEmail(e.target.value)}
                                    />
                                </div>
                                <div>
                                    <label className="block font-mono text-theme-secondary text-xs mb-2">密碼 (Password)</label>
                                    <input 
                                        type="password" required minLength="6"
                                        className="w-full bg-theme-input border border-theme-border text-theme-text p-3 rounded-lg focus:outline-none focus:border-theme-secondary font-mono shadow-sm"
                                        value={password} onChange={e => setPassword(e.target.value)}
                                    />
                                </div>

                                {error && <div className="text-theme-danger text-xs mt-2 font-mono bg-theme-danger/10 p-3 rounded border border-theme-danger/50 whitespace-pre-line">{error}</div>}

                                <button type="submit" className="w-full py-4 rounded-xl font-cyber font-bold text-lg transition shadow-md mt-6 bg-theme-secondary hover:opacity-90 text-white">
                                    [ {isRegister ? '註冊並進入' : '授權登入'} ]
                                </button>
                                
                                <div className="text-center mt-4">
                                    <button type="button" onClick={() => { setIsRegister(!isRegister); setError(''); }} className="text-sm text-theme-muted hover:text-theme-text font-mono transition">
                                        {isRegister ? '已有帳號？點此登入' : '沒有帳號？點此註冊'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 教師儀表板 (Commander Dashboard)
            // ==========================================
            function TeacherDashboard({ setView }) {
                const { db, dbConfig } = useContext(AppContext);
                const [activeTab, setActiveTab] = useState('exams');

                useEffect(() => {

                    const q = query(collection(db, getPath('quiz_records')));

                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    <div className="glass-panel rounded-2xl p-6 border-theme-success/50">
                        <div className="flex justify-between items-center mb-6">

            function TabStudents() {
                const { db } = useContext(AppContext);
                const [students, setStudents] = useState([]);
                const [newClass, setNewClass] = useState('');
                const [newSeat, setNewSeat] = useState('');
                const [newName, setNewName] = useState('');
                const [isBatchMode, setIsBatchMode] = useState(false);
                const [batchData, setBatchData] = useState('');
                const [editingId, setEditingId] = useState(null);
                const [editData, setEditData] = useState({ classRoom: '', seatNo: '', name: '' });

                useEffect(() => {
                    if (!db) return;
                    const q = query(collection(db, getPath('students')));
                    const unsub = onSnapshot(q, (snapshot) => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        list.sort((a,b) => {
                            if (a.classRoom !== b.classRoom) return String(a.classRoom).localeCompare(String(b.classRoom));
                            return parseInt(a.seatNo) - parseInt(b.seatNo);
                        });
                        setStudents(list);
                    });
                    return () => unsub();
                }, [db]);

                const handleAdd = async (e) => {
                    e.preventDefault();
                    if (!newClass || !newSeat || !newName) return;
                    try {
                        await addDoc(collection(db, getPath('students')), {
                            classRoom: String(newClass).trim(),
                            seatNo: String(newSeat).trim(),
                            name: String(newName).trim()
                        });
                        setNewSeat(''); setNewName('');
                    } catch(err) { alert('新增失敗: ' + err.message); }
                };

                const handleBatchImport = async (e) => {
                    e.preventDefault();
                    if (!batchData.trim()) return;
                    try {
                        const batch = writeBatch(db);
                        const lines = batchData.trim().split('\n');
                        let count = 0;
                        for (let line of lines) {
                            const parts = line.split(/\t|,/).map(s => s.trim()).filter(s => s !== '');
                            if (parts.length >= 3) {
                                const docRef = doc(collection(db, getPath('students')));
                                batch.set(docRef, { classRoom: String(parts[0]), seatNo: String(parts[1]), name: String(parts[2]) });
                                count++;
                            }
                        }
                        if (count > 0) {
                            await batch.commit();
                            alert(`✅ 成功匯入 ${count} 筆學生資料！`);
                            setBatchData(''); setIsBatchMode(false);
                        } else {
                            alert('找不到有效的資料格式。');
                        }
                    } catch (err) { alert('匯入失敗: ' + err.message); }
                };

                const handleDelete = async (id, name) => {
                    if (!confirm(`確定要刪除學生 [${name}] 嗎？`)) return;
                    try { await deleteDoc(doc(db, getPath('students'), id)); } catch(err) { alert('刪除失敗'); }
                };

                const startEdit = (student) => {
                    setEditingId(student.id);
                    setEditData({ classRoom: student.classRoom, seatNo: student.seatNo, name: student.name });
                };

                const saveEdit = async (id) => {
                    try {
                        await updateDoc(doc(db, getPath('students'), id), {
                            classRoom: String(editData.classRoom).trim(),
                            seatNo: String(editData.seatNo).trim(),
                            name: String(editData.name).trim()
                        });
                        setEditingId(null);
                    } catch (err) { alert('更新失敗'); }
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="glass-panel p-6 rounded-2xl lg:col-span-1 border-theme-primary h-fit">
                            <div className="flex justify-between items-center border-b border-theme-border pb-2 mb-4">
                                <h3 className="text-lg font-cyber text-theme-primary">{isBatchMode ? '批次匯入' : '新增人員'}</h3>
                                <button onClick={() => setIsBatchMode(!isBatchMode)} className="text-xs px-3 py-1.5 bg-theme-input text-theme-primary hover:text-white rounded font-mono border border-theme-border">切換模式</button>
                            </div>
                            {!isBatchMode ? (
                                <form onSubmit={handleAdd} className="space-y-4 animate-fade-in">
                                    <div><label className="text-xs text-theme-muted font-mono">班級</label><input type="text" className="w-full bg-theme-input border border-theme-border rounded p-2 text-theme-text font-mono mt-1" value={newClass} onChange={e=>setNewClass(e.target.value)} required /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="text-xs text-theme-muted font-mono">座號</label><input type="number" className="w-full bg-theme-input border border-theme-border rounded p-2 text-theme-text font-mono mt-1" value={newSeat} onChange={e=>setNewSeat(e.target.value)} required /></div>
                                        <div><label className="text-xs text-theme-muted font-mono">姓名</label><input type="text" className="w-full bg-theme-input border border-theme-border rounded p-2 text-theme-text font-mono mt-1" value={newName} onChange={e=>setNewName(e.target.value)} required /></div>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-theme-primary hover:opacity-90 text-white rounded font-cyber transition">[ 新增資料 ]</button>
                                </form>
                            ) : (
                                <form onSubmit={handleBatchImport} className="space-y-4 animate-fade-in">
                                    <div><textarea placeholder="格式：班級 座號 姓名&#10;(支援 Tab 或逗號分隔)" className="w-full bg-theme-input border border-theme-border rounded p-2 text-theme-text font-mono mt-1 h-48 text-sm" value={batchData} onChange={e=>setBatchData(e.target.value)} required /></div>
                                    <button type="submit" className="w-full py-3 bg-theme-secondary hover:opacity-90 text-white rounded font-cyber transition">[ 批次匯入 ]</button>
                                </form>
                            )}
                        </div>
                        <div className="glass-panel p-6 rounded-2xl lg:col-span-2 border-theme-border">
                            <h3 className="text-lg font-cyber text-theme-text mb-4 border-b border-theme-border pb-2">人員資料庫 ({students.length})</h3>
                            <div className="max-h-[60vh] overflow-y-auto pr-2">
                                <table className="w-full text-left font-mono text-sm">
                                    <thead className="bg-theme-input text-theme-muted sticky top-0 z-10"><tr><th className="p-3 w-1/4">班級</th><th className="p-3 w-1/4">座號</th><th className="p-3 w-1/4">姓名</th><th className="p-3 w-1/4 text-right">操作</th></tr></thead>
                                    <tbody className="divide-y divide-theme-border">
                                        {students.map(s => {
                                            const isEditing = editingId === s.id;
                                            return (
                                                <tr key={s.id} className="hover:bg-theme-input/50 transition text-theme-text">
                                                    {isEditing ? (
                                                        <>
                                                            <td className="p-2"><input type="text" className="w-full bg-theme-bg border border-theme-primary text-theme-primary px-2 py-1 rounded outline-none" value={editData.classRoom} onChange={e=>setEditData({...editData, classRoom: e.target.value})} /></td>
                                                            <td className="p-2"><input type="text" className="w-full bg-theme-bg border border-theme-primary text-theme-text px-2 py-1 rounded outline-none" value={editData.seatNo} onChange={e=>setEditData({...editData, seatNo: e.target.value})} /></td>
                                                            <td className="p-2"><input type="text" className="w-full bg-theme-bg border border-theme-primary text-theme-text px-2 py-1 rounded outline-none" value={editData.name} onChange={e=>setEditData({...editData, name: e.target.value})} /></td>
                                                            <td className="p-2 text-right whitespace-nowrap"><button onClick={() => saveEdit(s.id)} className="px-3 py-1.5 bg-theme-success text-white rounded transition text-xs mr-2 font-bold">儲存</button><button onClick={() => setEditingId(null)} className="px-3 py-1.5 bg-theme-input border border-theme-border text-theme-muted hover:text-theme-text rounded transition text-xs">取消</button></td>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <td className="p-3 text-theme-primary">{s.classRoom}</td><td className="p-3">{s.seatNo}</td><td className="p-3">{s.name}</td>
                                                            <td className="p-3 text-right whitespace-nowrap"><button onClick={() => startEdit(s)} className="px-3 py-1 bg-theme-primary/20 text-theme-primary hover:bg-theme-primary hover:text-white rounded transition text-xs mr-2">編輯</button><button onClick={() => handleDelete(s.id, s.name)} className="px-3 py-1 bg-theme-danger/20 text-theme-danger hover:bg-theme-danger hover:text-white rounded transition text-xs">刪除</button></td>
                                                        </>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            // 標籤 3: 試卷管理 (升級 6 欄位版本)
            function TabExams() {
                const { db } = useContext(AppContext);
                const [exams, setExams] = useState([]);
                const [title, setTitle] = useState('');
                const [currentQuestions, setCurrentQuestions] = useState([]);
                
                // 單題新增狀態
                const [qText, setQText] = useState('');
                const [correct, setCorrect] = useState('');
                const [opt1, setOpt1] = useState('');
                const [opt2, setOpt2] = useState('');
                const [opt3, setOpt3] = useState('');
                const [opt4, setOpt4] = useState('');

                // 批次匯入狀態
                const [isBatchMode, setIsBatchMode] = useState(false);
                const [batchData, setBatchData] = useState('');

                useEffect(() => {
                    if (!db) return;
                    const unsub = onSnapshot(collection(db, getPath('exams')), (snap) => {
                        setExams(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                    return () => unsub();
                }, [db]);

                const addTempQuestion = (e) => {
                    e.preventDefault();
                    if(!qText || !correct || !opt1 || !opt2 || !opt3 || !opt4) return alert('請填滿所有題目與選項！');
                    
                    const optionsArray = [opt1.trim(), opt2.trim(), opt3.trim(), opt4.trim()];
                    if (!optionsArray.includes(correct.trim())) {
                        if (!confirm('警告：您設定的「答案」不在四個選項之中。確定要加入嗎？')) return;
                    }

                    setCurrentQuestions([...currentQuestions, {
                        id: Date.now(),
                        question: qText.trim(),
                        correct: correct.trim(),
                        options: optionsArray
                    }]);
                    setQText(''); setCorrect(''); setOpt1(''); setOpt2(''); setOpt3(''); setOpt4('');
                };

                const handleBatchImport = (e) => {
                    e.preventDefault();
                    if (!batchData.trim()) return;

                    const lines = batchData.trim().split('\n');
                    let count = 0;
                    const newQuestions = [];

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        const parts = line.split(/\t|,/).map(s => s.trim()).filter(s => s !== '');
                        
                        // 需要 6 欄位：題目, 答案, 選項1, 選項2, 選項3, 選項4
                        if (parts.length >= 6) {
                            newQuestions.push({
                                id: Date.now() + i, 
                                question: parts[0],
                                correct: parts[1],
                                options: [parts[2], parts[3], parts[4], parts[5]]
                            });
                            count++;
                        }
                    }

                    if (count > 0) {
                        setCurrentQuestions(prev => [...prev, ...newQuestions]);
                        alert(`✅ 成功解析 ${count} 題！請點擊下方 [ 部署發布任務 ] 進行儲存。`);
                        setBatchData('');
                        setIsBatchMode(false);
                    } else {
                        alert('找不到有效的題目格式。\n請確保每行有 6 個欄位：「題目 答案 選項1 選項2 選項3 選項4」並以 Tab 或逗號分隔。');
                    }
                };

                const saveExam = async () => {
                    if (!title) return alert('請輸入任務名稱！');
                    if (currentQuestions.length === 0) return alert('請至少加入一題！');
                    try {
                        await addDoc(collection(db, getPath('exams')), {
                            title: title.trim(),
                            isActive: true,
                            questions: currentQuestions
                        });
                        setTitle(''); setCurrentQuestions([]);
                        alert('任務部署成功！');
                    } catch(err) { alert('部署失敗: '+err.message); }
                };

                const deleteExam = async (id, examTitle) => {
                    if(!confirm(`確定要刪除任務 [${examTitle}]？這將無法復原。`)) return;
                    try { await deleteDoc(doc(db, getPath('exams'), id)); }
                    catch(err) { alert('刪除失敗'); }
                };

                // 下載 CSV 範例檔
                const downloadSample = () => {
                    const csvContent = "\uFEFF題目,答案,選項一,選項二,選項三,選項四\n「躊躇」的意思是什麼？,猶豫不決,非常快樂,大聲說話,猶豫不決,走路很快\n台灣最高的山是哪一座？,玉山,阿里山,玉山,雪山,陽明山\n";
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.setAttribute("href", url);
                    link.setAttribute("download", "測驗題庫匯入範例.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass-panel p-6 rounded-2xl border-theme-warning h-fit">
                            <div className="flex justify-between items-center border-b border-theme-border pb-2 mb-4">
                                <h3 className="text-lg font-cyber text-theme-warning">建置新任務 (New Mission)</h3>
                                <button 
                                    onClick={() => setIsBatchMode(!isBatchMode)} 
                                    className="text-xs px-3 py-1.5 bg-theme-input text-theme-warning hover:text-theme-text rounded font-mono border border-theme-border transition shadow-sm"
                                >
                                    切換為{isBatchMode ? '單題新增' : '批次匯入'}
                                </button>
                            </div>

                            <div className="mb-4">
                                <label className="text-xs text-theme-muted font-mono">任務/試卷名稱 (必須填寫)</label>
                                <input type="text" className="w-full bg-theme-input border border-theme-border rounded p-2 text-theme-text font-mono focus:border-theme-warning outline-none mt-1 shadow-sm" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：期中防禦測試" />
                            </div>
                            
                            {!isBatchMode ? (
                                <form onSubmit={addTempQuestion} className="bg-theme-input/50 p-4 rounded-lg border border-theme-border mb-4 space-y-3 animate-fade-in">
                                    <h4 className="text-sm font-bold text-theme-text/80">新增單題</h4>
                                    <div><input type="text" placeholder="題目內容" className="w-full bg-theme-bg border border-theme-border rounded p-2 text-theme-text text-sm shadow-sm" value={qText} onChange={e=>setQText(e.target.value)} required /></div>
                                    <div><input type="text" placeholder="正確答案 (必須與下方選項之一完全相同)" className="w-full bg-theme-success/10 border border-theme-success/50 rounded p-2 text-theme-success text-sm shadow-sm placeholder-theme-success/50" value={correct} onChange={e=>setCorrect(e.target.value)} required /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="text" placeholder="選項一" className="w-full bg-theme-bg border border-theme-border rounded p-2 text-theme-text/80 text-sm shadow-sm" value={opt1} onChange={e=>setOpt1(e.target.value)} required />

            // 標籤 4: 系統設定與派發
            function TabSystem({ dbConfig, db }) {
                const studentLink = useMemo(() => {
                    if (!dbConfig) return '';
                    const base64Config = btoa(encodeURIComponent(JSON.stringify(dbConfig)));
                    return `${window.location.origin}${window.location.pathname}?config=${base64Config}`;
                }, [dbConfig]);

                const copyLink = () => {
                    try {
                        const el = document.createElement('textarea');
                        el.value = studentLink; el.setAttribute('readonly', '');
                        el.style.position = 'absolute'; el.style.left = '-9999px';
                        document.body.appendChild(el); el.select();
                        document.execCommand('copy'); document.body.removeChild(el);
                        alert('網址已複製！請將此網址轉換為 QR Code 讓學生掃描。');
                    } catch (err) { alert('自動複製失敗，請手動選取並複製網址。'); }
                };

                const deployMockData = async () => {
                    if (!confirm('將注入測試用學生與試卷資料，確定嗎？')) return;
                    try {
                        const studentsCol = collection(db, getPath('students'));
                        await addDoc(studentsCol, { classRoom: '101', seatNo: '1', name: '王小明' });
                        await addDoc(studentsCol, { classRoom: '101', seatNo: '2', name: '陳小美' });
                        await addDoc(studentsCol, { classRoom: '102', seatNo: '5', name: '張大華' });
                        const examsCol = collection(db, getPath('exams'));
                        await addDoc(examsCol, {
                            title: '網路安全基礎特訓',
                            isActive: true,
                            questions: [
                                { id: 1, question: '「躊躇」的意思是什麼？', correct: '猶豫不決', options: ['猶豫不決', '非常快樂', '走路很快', '大聲說話'] },
                                { id: 2, question: '為了防止帳號被盜，下列何者是最佳的密碼設定策略？', correct: '使用長度超過12字元且包含大小寫與符號的隨機組合', options: ['使用生日或電話號碼', '所有網站使用同一組密碼', '使用長度超過12字元且包含大小寫與符號的隨機組合', '將密碼寫在螢幕旁邊的便利貼上'] }
                            ]
                        });
                        alert('✅ 測試數據注入完畢！請至各面板查看。');
                    } catch (e) { alert('❌ 注入失敗'); }
                };

                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="glass-panel p-8 rounded-2xl neon-border">
                            <h3 className="text-xl font-cyber text-theme-primary mb-4">生成學生終端入口</h3>
                            <p className="text-theme-muted font-mono text-sm mb-6 leading-relaxed">您的 Firebase 金鑰已封裝入以下網址。請複製網址並轉換為 QR Code，展示於大螢幕讓學生掃描進入系統。</p>
                            <div className="bg-theme-input border border-theme-border p-4 rounded-lg flex items-center gap-4 mb-4 shadow-sm">
                                <code className="text-xs text-theme-success break-all overflow-hidden max-h-20">{studentLink}</code>
                            </div>
                            <button onClick={copyLink} className="w-full py-3 bg-theme-primary hover:opacity-90 text-white font-bold rounded-lg transition font-cyber shadow-md">[ 複製專屬網址 ]</button>
                        </div>
                        <div className="glass-panel p-8 rounded-2xl border-theme-border">
                            <h3 className="text-xl font-cyber text-theme-secondary mb-4">系統重置與除錯</h3>
                            <p className="text-theme-muted font-mono text-sm mb-6">點擊下方按鈕將為您的資料庫注入一組示範用的學生與考卷資料。建議僅在初期測試時使用。</p>
                            <button onClick={deployMockData} className="w-full py-3 border border-theme-secondary text-theme-secondary hover:bg-theme-secondary hover:text-white font-bold rounded-lg transition font-cyber shadow-sm">[ 注入測試資料 ]</button>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // 學生面板與測驗
            // ==========================================
            function StudentLogin({ setView, onLogin }) {
                const { db, user } = useContext(AppContext);
                const [students, setStudents] = useState([]);
                const [loading, setLoading] = useState(true);
                const [selectedClass, setSelectedClass] = useState('');
                const [selectedSeat, setSelectedSeat] = useState('');

                useEffect(() => {
                    if (!db || !user) return;
                    const fetchStudents = async () => {
                        const q = query(collection(db, getPath('students')));
                        onSnapshot(q, (snapshot) => {
                            const list = snapshot.docs.map(doc => doc.data());
                            setStudents(list);
                            setLoading(false);
                        }, (err) => {
                            console.error("名單載入失敗", err);
                            setLoading(false);
                        });
                    };
                    fetchStudents();
                }, [db, user]);

                const classes = [...new Set(students.map(s => s.classRoom))].sort();
                const seats = students.filter(s => s.classRoom === selectedClass).map(s => s.seatNo).sort((a,b)=>parseInt(a)-parseInt(b));
                const targetStudent = students.find(s => s.classRoom === selectedClass && s.seatNo === selectedSeat);

                const handleLogin = (e) => {
                    e.preventDefault();
                    if (targetStudent) {
                        onLogin(targetStudent);
                        setView('student-dashboard');
                    }
                };

                return (
                    <div className="flex items-center justify-center min-h-[80vh]">
                        <div className="glass-panel neon-border p-8 md:p-12 rounded-3xl w-full max-w-md">
                            <div className="text-center mb-8">
                                <h2 className="text-3xl font-cyber text-theme-primary mb-2">身分識別</h2>
                                <p className="text-theme-muted font-mono text-sm">請選擇對應的班級與座號</p>
                            </div>

                            {loading ? (
                                <div className="text-center py-10 text-theme-primary font-mono animate-pulse">資料庫連線中...</div>
                            ) : (
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <div>
                                        <label className="block font-mono text-theme-primary text-xs mb-2">班級 (Class)</label>
                                        <select 
                                            className="w-full bg-theme-input border border-theme-border text-theme-text p-3 rounded-lg focus:outline-none focus:border-theme-primary font-mono shadow-sm"
                                            value={selectedClass} onChange={e => { setSelectedClass(e.target.value); setSelectedSeat(''); }}
                                        >
                                            <option value="">-- 選擇班級 --</option>
                                            {classes.map(c => <option key={c} value={c}>{c} 班</option>)}
                                        </select>
                                    </div>

                                    {selectedClass && (
                                        <div className="animate-fade-in">
                                            <label className="block font-mono text-theme-primary text-xs mb-2">座號 (Seat)</label>
                                            <select 
                                                className="w-full bg-theme-input border border-theme-border text-theme-text p-3 rounded-lg focus:outline-none focus:border-theme-primary font-mono shadow-sm"
                                                value={selectedSeat} onChange={e => setSelectedSeat(e.target.value)}
                                            >
                                                <option value="">-- 選擇座號 --</option>
                                                {seats.map(s => <option key={s} value={s}>{s} 號</option>)}
                                            </select>
                                        </div>
                                    )}

                                    {targetStudent && (
                                        <div className="bg-theme-primary/10 border border-theme-primary/50 p-4 rounded-lg text-center animate-fade-in mt-4 shadow-sm">
                                            <p className="text-theme-primary font-mono mb-1">身分已確認</p>
                                            <p className="text-theme-text font-bold text-xl">{targetStudent.name}</p>
                                        </div>
                                    )}

                                    <button 
                                        type="submit" 
                                        disabled={!targetStudent}
                                        className={`w-full py-4 rounded-xl font-cyber font-bold text-lg transition shadow-md mt-6
                                            ${!targetStudent ? 'bg-theme-input text-theme-muted cursor-not-allowed border border-theme-border' : 'bg-theme-primary hover:opacity-90 text-white'}`}
                                    >
                                        [ 進入測驗 ]
                                    </button>
                                </form>
                            )}
