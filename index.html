                    </div>
                );
            }

            function StudentDashboard({ setView, profile }) {
                const { db, user } = useContext(AppContext);
                const [exams, setExams] = useState([]);
                const [loading, setLoading] = useState(true);
                const [selectedExam, setSelectedExam] = useState(null);

                useEffect(() => {
                    if (!db || !user) return;
                    const q = query(collection(db, getPath('exams')));
                    onSnapshot(q, (snapshot) => {
                        setExams(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, (err) => {
                        console.error(err);
                        setLoading(false);
                    });
                }, [db, user]);

                if (selectedExam) {
                    return <QuizEngine exam={selectedExam} profile={profile} onBack={() => setSelectedExam(null)} />;
                }

                return (
                    <div className="max-w-4xl mx-auto pt-8">
                        <h2 className="text-3xl font-cyber font-bold text-theme-primary mb-8 border-l-4 border-theme-primary pl-4">可執行的測驗任務</h2>
                        
                        {loading ? (
                            <div className="text-center py-20 text-theme-primary font-mono animate-pulse">掃描可執行的任務...</div>
                        ) : exams.length === 0 ? (
                            <div className="glass-panel p-10 text-center rounded-2xl text-theme-muted border border-dashed border-theme-border">
                                目前沒有開放的任務
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {exams.map(exam => (
                                    <div key={exam.id} className="glass-panel neon-border p-6 rounded-2xl flex flex-col justify-between group">
                                        <div>
                                            <h3 className="text-xl font-bold text-theme-text mb-2">{exam.title}</h3>
                                            <p className="text-theme-muted text-sm font-mono mb-4">總題數: {exam.questions?.length || 0}</p>
                                        </div>
                                        <button onClick={() => setSelectedExam(exam)} className="self-end px-6 py-2 bg-theme-primary/20 text-theme-primary border border-theme-primary rounded font-cyber text-sm group-hover:bg-theme-primary group-hover:text-white transition shadow-sm">
                                            開始測驗 🚀
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            function QuizEngine({ exam, profile, onBack }) {
                const { db } = useContext(AppContext);
                const [stage, setStage] = useState('playing');
                const [questions, setQuestions] = useState([]);
                const [currentIndex, setCurrentIndex] = useState(0);
                
                const [timeLeft, setTimeLeft] = useState(30);
                const [score, setScore] = useState(0);
                const [combo, setCombo] = useState(0);
                const [wrongAnswers, setWrongAnswers] = useState([]);
                const [feedback, setFeedback] = useState(null);
                
                const [lockoutTime, setLockoutTime] = useState(0);
                const [consecutiveErrors, setConsecutiveErrors] = useState(0);
                const [isPaused, setIsPaused] = useState(false);

                useEffect(() => {
                    if (!exam || !exam.questions) return;
                    const shuffledQ = [...exam.questions].sort(() => Math.random() - 0.5).map(q => ({
                        ...q,
                        shuffledOptions: [...q.options].sort(() => Math.random() - 0.5)
                    }));
                    setQuestions(shuffledQ);
                }, [exam]);

                useEffect(() => {
                    if (lockoutTime > 0) {
                        const timer = setTimeout(() => setLockoutTime(prev => prev - 1), 1000);
                        return () => clearTimeout(timer);
                    }

                    if (isPaused || stage !== 'playing' || questions.length === 0) return;

                    const timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                handleAnswer(null);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }, [currentIndex, isPaused, lockoutTime, stage, questions]);

                const handleAnswer = (selectedOpt) => {
                    setIsPaused(true);
                    const currentQ = questions[currentIndex];
                    const isFastAnswer = timeLeft >= 25;
                    
                    let isMatch = false;
                    if (selectedOpt === currentQ.correct || selectedOpt === currentQ.options[parseInt(currentQ.correct)-1]) {
                        isMatch = true;
                    }

                    let earnedPoints = 0;
                    if (isMatch) {
                        const newCombo = combo + 1;
                        setCombo(newCombo);
                        let base = Math.round((timeLeft / 30) * 1000);
                        const multiplier = Math.min(2.0, 1 + (newCombo - 1) * 0.1);
                        earnedPoints = Math.round(base * multiplier);
                        
                        setFeedback('correct');
                        setConsecutiveErrors(0);
                    } else {
                        setCombo(0);
                        setFeedback('incorrect');
                        setWrongAnswers(p => [...p, { ...currentQ, selected: selectedOpt || 'TIMEOUT' }]);
                        
                        const nextErrors = isFastAnswer ? consecutiveErrors + 1 : 0;
                        setConsecutiveErrors(nextErrors);
                        if (nextErrors >= 3) {
                            setLockoutTime(5);
                            setConsecutiveErrors(0);
                        }
                    }

                    setScore(p => p + earnedPoints);

                    setTimeout(() => {
                        setFeedback(null);
                        if (currentIndex < questions.length - 1) {
                            setCurrentIndex(p => p + 1);
                            setTimeLeft(30);
                            setIsPaused(false);
                        } else {
                            finishQuiz(score + earnedPoints, isMatch ? wrongAnswers : [...wrongAnswers, { ...currentQ, selected: selectedOpt || 'TIMEOUT' }]);
                        }
                    }, 1500);
                };

                const finishQuiz = async (finalScore, finalWrongs) => {
                    setStage('saving');
                    try {
                        const recordId = `${profile.classRoom}_${profile.seatNo}`;
                        
                        await addDoc(collection(db, getPath('quiz_records')), {
                            examId: exam.title,
                            studentId: recordId,
                            name: profile.name,
                            score: finalScore,
                            timestamp: serverTimestamp()
                        });

                        if (finalWrongs.length > 0) {
                            const mistakesCol = collection(db, getPath('mistake_logs'));
                            for (const w of finalWrongs) {
                                await addDoc(mistakesCol, {
                                    examId: exam.title,
                                    studentId: recordId,
                                    question: w.question,
                                    correct: w.correct,
                                    selected: w.selected,
                                    timestamp: serverTimestamp()
                                });
                            }
                        }
                        setStage('completed');
                    } catch (e) {
                        console.error("寫入成績失敗", e);
                        alert("成績上傳失敗，請聯絡教官！");
                        onBack();
                    }
                };

                if (questions.length === 0) return null;

                if (stage === 'saving') return (
                    <div className="flex flex-col items-center justify-center h-[80vh]">
                        <div className="w-16 h-16 rounded-full border-4 border-theme-secondary border-t-transparent animate-spin mb-4"></div>
                        <h2 className="text-2xl font-cyber text-theme-secondary animate-pulse">資料上傳中...</h2>
                    </div>
                );

                if (stage === 'completed') return (
                    <div className="max-w-2xl mx-auto pt-10 text-center animate-fade-in">
                        <div className="glass-panel neon-border p-12 rounded-3xl mb-8 border-t-4 border-theme-primary">
                            <h2 className="text-4xl font-cyber text-theme-text mb-6">測驗完成</h2>
                            <p className="text-theme-muted font-mono mb-2">最終分數</p>
                            <div className="text-7xl font-bold text-theme-primary text-glow font-mono tracking-tighter mb-8">
                                {score}
                            </div>
                            
                            {wrongAnswers.length > 0 ? (
                                <div className="bg-theme-danger/10 border border-theme-danger/30 p-4 rounded-lg text-left shadow-sm">
                                    <h4 className="text-theme-danger font-bold mb-2 flex items-center gap-2">⚠️ 需要複習的單元 ({wrongAnswers.length})</h4>
                                    <ul className="text-theme-text/80 text-sm space-y-2 list-disc pl-5">
                                        {wrongAnswers.slice(0,3).map((w, i) => <li key={i}>{w.question}</li>)}
                                        {wrongAnswers.length > 3 && <li>...等其他 {wrongAnswers.length - 3} 題</li>}
                                    </ul>
                                </div>
                            ) : (
                                <div className="bg-theme-success/10 border border-theme-success/30 p-4 rounded-lg text-theme-success font-bold text-xl shadow-sm">
                                    完美通關！
                                </div>
                            )}
                        </div>
                        <button onClick={onBack} className="px-8 py-3 bg-theme-input hover:bg-theme-border text-theme-text rounded-lg font-cyber transition border border-theme-border shadow-sm">
                            返回大廳
                        </button>
                    </div>
                );

                const currentQ = questions[currentIndex];
                const isReading = timeLeft >= 29;
                const isOptionsDisabled = isPaused || isReading || lockoutTime > 0;

                return (
                    <div className="max-w-5xl mx-auto h-[80vh] flex flex-col relative">
                        
                        {lockoutTime > 0 && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-theme-danger/90 backdrop-blur-md rounded-3xl">
                                <div className="text-center">
                                    <div className="text-7xl mb-4 animate-pulse text-white">⚠️</div>
                                    <h2 className="text-3xl font-cyber text-white font-bold mb-2">系統鎖定</h2>
                                    <p className="text-white/80 font-mono mb-6">偵測到異常作答頻率，冷卻中...</p>
                                    <div className="text-8xl font-mono text-white">{lockoutTime}</div>
                                </div>
                            </div>
                        )}

                        {feedback && (
                            <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm rounded-3xl">
                                <div className={`p-10 rounded-3xl flex flex-col items-center gap-4 animate-pulse-ring ${feedback === 'correct' ? 'text-theme-success' : 'text-theme-danger'}`}>
                                    <span className="text-6xl">{feedback === 'correct' ? '⭕' : '❌'}</span>
                                    <span className="text-4xl font-cyber font-bold">{feedback === 'correct' ? '正確' : '錯誤'}</span>
                                    {feedback === 'correct' && combo >= 2 && (
                                        <div className="text-theme-warning font-cyber font-bold text-2xl mt-2 animate-bounce">
                                            COMBO x{combo} !!
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-end mb-4 px-2">
                            <div>
                                <span className="text-theme-primary font-cyber text-lg">Q.{currentIndex + 1} <span className="text-theme-muted text-sm">/ {questions.length}</span></span>
                                {combo >= 2 && <span className="ml-4 text-theme-warning font-cyber text-sm bg-theme-warning/10 px-2 py-1 rounded border border-theme-warning/50">COMBO {combo}</span>}
                            </div>
                            <div className="text-right">
                                <span className="text-xs text-theme-muted font-mono block">分數</span>
                                <span className="text-3xl font-cyber font-bold text-theme-primary">{score}</span>
                            </div>
                        </div>

                        <div className="w-full h-2 bg-theme-input rounded-full mb-6 overflow-hidden border border-theme-border">
                            <div 
                                className={`h-full transition-all duration-1000 linear ${timeLeft < 10 ? 'bg-theme-danger shadow-md' : 'bg-theme-primary shadow-md'}`} 
                                style={{ width: `${(timeLeft / 30) * 100}%` }}
                            ></div>
                        </div>

                        <div className="flex-[3] flex items-center justify-center glass-panel rounded-3xl p-8 mb-6 relative">
                            <h2 className="text-2xl md:text-4xl font-bold text-theme-text leading-relaxed text-center">
                                {currentQ.question}
                            </h2>
                            {isReading && (
                                <div className="absolute top-4 left-4 flex items-center gap-2 bg-theme-danger/10 border border-theme-danger text-theme-danger px-3 py-1 rounded-full text-xs font-mono">
                                    <span className="w-2 h-2 rounded-full bg-theme-danger animate-pulse"></span>
                                    資料解析中...
                                </div>
                            )}
                        </div>

                        <div className="flex-[4] grid grid-cols-2 gap-4">
                            {currentQ.shuffledOptions.map((opt, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => !isOptionsDisabled && handleAnswer(opt)}
                                    disabled={isOptionsDisabled}
                                    className={`glass-panel border-t-2 rounded-2xl flex items-center justify-center p-6 text-xl md:text-2xl font-bold transition duration-200 break-words h-full
                                        ${isOptionsDisabled && !isReading ? 'opacity-50 cursor-not-allowed' : 'hover:-translate-y-1 active:scale-95 shadow-sm'}
                                        ${isReading ? 'border-theme-border text-theme-muted' : 'border-theme-primary text-theme-text hover:bg-theme-primary/10 hover:border-theme-primary'}
                                    `}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        if (window.FirebaseModules) {
            startApp();
        } else {
            window.addEventListener('FIREBASE_LOADED', startApp);
        }
    </script>
</body>
</html>
