    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, createContext, useContext, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        // 🌟 新增 Award, Crown 圖示用於排行榜

        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, onSnapshot, query, where, getDocs, orderBy } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyB9NJXQwdKweStTbATahldDgvtbuGclo34",
            authDomain: "test-reading-71839.firebaseapp.com",
            projectId: "test-reading-71839",
            storageBucket: "test-reading-71839.firebasestorage.app",
            messagingSenderId: "499192051513",
            appId: "1:499192051513:web:777c873e938464e2995ae8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 全域 Toast 系統 ---
        const ToastContext = createContext();
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={showToast}>
                    {children}
                    <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-3 pointer-events-none w-11/12 max-w-sm">
                        {toasts.map(t => (
                            <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl bg-white/95 dark:glass-card border-l-4 shadow-lg transform transition-all animate-[pop_0.2s_ease-out] ${t.type === 'error' ? 'border-red-500 text-slate-800 dark:text-red-100' : 'border-cyan-500 text-slate-800 dark:text-cyan-100'}`}>
                                {t.type === 'error' ? <ShieldAlert size={20} className="text-red-500 dark:text-neon-red shrink-0" /> : <Zap size={20} className="text-cyan-600 dark:text-neon-cyan shrink-0" />}
                                <span className="font-bold text-sm tracking-wide">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        const useToast = () => useContext(ToastContext);

        const useAudioEngine = (isEnabled) => {
            const audioCtxRef = useRef(null);
            
            const initAudio = () => {
                if (!audioCtxRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtxRef.current = new AudioContext();
                }
                if (audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
            };

            const playTone = useCallback((frequency, type, duration, vol=0.1) => {
                if (!isEnabled || !audioCtxRef.current) return;
                try {
                    const osc = audioCtxRef.current.createOscillator();
                    const gain = audioCtxRef.current.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(frequency, audioCtxRef.current.currentTime);
                    gain.gain.setValueAtTime(vol, audioCtxRef.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtxRef.current.destination);
                    osc.start();
                    osc.stop(audioCtxRef.current.currentTime + duration);
                } catch(e) {}
            }, [isEnabled]);

            const playCorrect = useCallback(() => {
                initAudio();
                playTone(600, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(800, 'sine', 0.2, 0.15), 100);
            }, [playTone]);

            const playWrong = useCallback(() => {
                initAudio();
                playTone(300, 'sawtooth', 0.2, 0.1);
                setTimeout(() => playTone(200, 'square', 0.3, 0.15), 150);
            }, [playTone]);

            return { initAudio, playCorrect, playWrong };
        };

        const shuffleArray = (arr) => {
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const LoginScreen = ({ onLogin }) => {
            const [classes, setClasses] = useState([]);
            const [students, setStudents] = useState([]);
            const [selectedClassId, setSelectedClassId] = useState('');
            const [selectedStudentId, setSelectedStudentId] = useState('');
            const [loading, setLoading] = useState(true);
            const showToast = useToast();

            useEffect(() => {
                const savedStudent = localStorage.getItem('smartQuizStudent');
                if (savedStudent) {
                    onLogin(JSON.parse(savedStudent));
                    return;
                }
                
                const fetchClasses = async () => {
                    const snap = await getDocs(collection(db, 'classes'));
                    setClasses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                };
                fetchClasses();
            }, []);

            useEffect(() => {
                if (!selectedClassId) { setStudents([]); return; }
                const fetchStudents = async () => {
                    const q = query(collection(db, 'students'), where('classId', '==', selectedClassId));
                    const snap = await getDocs(q);
                    let list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    list.sort((a,b) => parseInt(a.seatNo) - parseInt(b.seatNo));
                    setStudents(list);
                };
                fetchStudents();
            }, [selectedClassId]);

            const handleLogin = () => {
                if(!selectedStudentId) {
                    showToast("請選擇您的姓名", "error");
                    return;
                }
                const studentData = students.find(s => s.id === selectedStudentId);
                localStorage.setItem('smartQuizStudent', JSON.stringify(studentData));
                showToast(`登入成功！歡迎，${studentData.name}`);
                onLogin(studentData);
            };

            if(loading) return <div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-4 border-cyan-500 border-t-transparent"></div></div>;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="text-center mb-8">
                        <div className="inline-flex items-center justify-center w-24 h-24 rounded-full bg-white dark:bg-dark-card border-4 border-cyan-500 shadow-lg shadow-cyan-500/30 mb-4">
                            <UserCircle className="text-cyan-600 dark:text-cyan-400" size={50} />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 dark:text-white tracking-wider">身份識別</h1>
                        <p className="text-slate-500 dark:text-cyan-500/80 mt-2 font-bold tracking-widest">STUDENT TERMINAL</p>
                    </div>

                    <div className="glass-card p-8 rounded-3xl w-full max-w-md shadow-2xl">
                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">請選擇您的班級</label>
                                <select className="w-full bg-slate-50 dark:bg-dark-main border-2 border-slate-200 dark:border-gray-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition font-bold" value={selectedClassId} onChange={e => {setSelectedClassId(e.target.value); setSelectedStudentId('');}}>
                                    <option value="">-- 點擊選擇班級 --</option>
                                    {classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            
                            <div className={`transition-all duration-300 ${selectedClassId ? 'opacity-100' : 'opacity-50 pointer-events-none'}`}>
                                <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">請選擇您的姓名</label>
                                <select className="w-full bg-slate-50 dark:bg-dark-main border-2 border-slate-200 dark:border-gray-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition font-bold" value={selectedStudentId} onChange={e => setSelectedStudentId(e.target.value)}>
                                    <option value="">-- 點擊選擇姓名 --</option>
                                    {students.map(s => <option key={s.id} value={s.id}>{s.seatNo}號 - {s.name}</option>)}
                                </select>
                            </div>

                            <button onClick={handleLogin} className="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-cyan-600/30 active:scale-95 transition-all flex justify-center items-center gap-2 text-lg">
                                <Zap size={20}/> 啟動測驗介面
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const MistakeBook = ({ student, onBack }) => {
            const [groupedExams, setGroupedExams] = useState({});
            const [selectedExamId, setSelectedExamId] = useState(null); 
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchMistakes = async () => {
                    const q = query(collection(db, 'mistakes'), where('studentId', '==', student.id));
                    const snapshot = await getDocs(q);
                    
                    const groups = {};
                    snapshot.docs.forEach(doc => {
                        const data = { id: doc.id, ...doc.data() };
                        if (!groups[data.examId]) {
                            groups[data.examId] = {
                                examId: data.examId,
                                examTitle: data.examTitle || '未命名試卷',
                                mistakes: [],
                                latestTime: data.timestamp 
                            };
                        }
                        groups[data.examId].mistakes.push(data);
                        if (data.timestamp > groups[data.examId].latestTime) {
                            groups[data.examId].latestTime = data.timestamp;
                        }
                    });

                    setGroupedExams(groups);
                    setLoading(false);
                };
                fetchMistakes();
            }, [student.id]);

            if (loading) return (
                <div className="h-full flex items-center justify-center p-10">
                    <div className="animate-spin rounded-full h-12 w-12 border-4 border-red-500 border-t-transparent"></div>
                </div>
            );

            const examList = Object.values(groupedExams).sort((a, b) => b.latestTime - a.latestTime);

            return (
                <div className="p-4 md:p-6 fade-in h-full flex flex-col pb-20 overflow-y-auto">
                    <div className="mb-6 flex justify-between items-center gap-4 border-b border-slate-200 dark:border-gray-800 pb-4 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-red-100 dark:bg-red-900/40 rounded-xl">
                                <BookOpen className="text-red-600 dark:text-red-400" size={24}/>
                            </div>
                            <div>
                                <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-white">專屬錯題本</h2>
                                <p className="text-xs md:text-sm text-slate-500 dark:text-gray-400">
                                    {selectedExamId ? `複習：${groupedExams[selectedExamId]?.examTitle}` : '選擇考卷以進行複習'}
                                </p>
                            </div>
                        </div>
                        <button 
                            onClick={() => selectedExamId ? setSelectedExamId(null) : onBack()} 
                            className="flex items-center gap-1 bg-slate-200 hover:bg-slate-300 dark:bg-gray-800 dark:hover:bg-gray-700 text-slate-700 dark:text-gray-300 px-4 py-2 rounded-xl font-bold transition active:scale-95 text-sm shrink-0"
                        >
                            <ArrowLeft size={16}/> 返回
                        </button>
                    </div>

                    <div className="flex-1 space-y-4">
                        {examList.length === 0 ? (
                            <div className="glass-card p-10 rounded-2xl text-center text-green-600 dark:text-green-400 font-bold flex flex-col items-center justify-center gap-3">
                                <CheckCircle size={48} />
                                太神啦！您的錯題本目前空空如也！
                            </div>
                        ) : !selectedExamId ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                                {examList.map((exam) => (
                                    <div 
                                        key={exam.examId} 
                                        onClick={() => setSelectedExamId(exam.examId)}
                                        className="glass-card p-5 rounded-2xl border-2 border-transparent hover:border-red-400 hover:shadow-lg dark:hover:shadow-red-900/20 cursor-pointer transition-all active:scale-[0.98] group flex items-center justify-between"
                                    >
                                        <div className="flex items-start gap-4">
                                            <div className="bg-red-50 dark:bg-red-900/20 p-3 rounded-full text-red-500 dark:text-red-400 shrink-0 group-hover:bg-red-500 group-hover:text-white transition">
                                                <FolderOpen size={24}/>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 dark:text-white text-lg mb-1">{exam.examTitle}</h3>
                                                <div className="flex gap-3 text-xs text-slate-500 dark:text-gray-400">
                                                    <span className="bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 px-2 py-0.5 rounded-full font-bold">
                                                        待複習：{exam.mistakes.length} 題
                                                    </span>
                                                    <span className="flex items-center">
                                                        最後作答：{new Date(exam.latestTime).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <ChevronRight className="text-slate-300 dark:text-gray-600 group-hover:text-red-500 transition shrink-0" size={24}/>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-4 fade-in">
                                <div className="bg-amber-50 dark:bg-amber-900/20 text-amber-800 dark:text-amber-400 px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2 border border-amber-200 dark:border-amber-800/50 mb-2">
                                    <AlertTriangle size={18}/> 此區記錄您在「{groupedExams[selectedExamId]?.examTitle}」中所有曾答錯的題目。
                                </div>
                                
                                {groupedExams[selectedExamId].mistakes.map((m, idx) => (
                                    <div key={idx} className="glass-card p-5 md:p-6 rounded-2xl border-l-4 border-l-red-500 text-left shadow-md">
                                        <div className="font-bold text-slate-800 dark:text-white mb-4 text-lg leading-snug">
                                            <span className="text-red-500 mr-2">{idx + 1}.</span>{m.question}
                                        </div>
                                        <div className="flex flex-col gap-3 text-sm">
                                            <div className="flex items-start gap-3 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 p-3 rounded-xl border border-red-100 dark:border-red-900/50">
                                                <XCircle size={20} className="shrink-0 mt-0.5" />
                                                <div>
                                                    <span className="font-bold opacity-70 block text-xs mb-1">你當時選了</span>
                                                    <span className="font-medium text-base">{m.selected}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-3 text-green-700 dark:text-green-400 bg-green-50 dark:bg-green-900/20 p-3 rounded-xl border border-green-200 dark:border-green-900/50">
                                                <CheckCircle size={20} className="shrink-0 mt-0.5" />
                                                <div>
                                                    <span className="font-bold opacity-70 block text-xs mb-1">正確解答是</span>
                                                    <span className="font-bold text-base">{m.correctText}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ScoreBoard = ({ student, onBack }) => {
            const [completedExams, setCompletedExams] = useState([]);
            const [selectedExam, setSelectedExam] = useState(null); 
            const [leaderboard, setLeaderboard] = useState([]);
            const [myStats, setMyStats] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchMyExams = async () => {
                    const q = query(collection(db, 'scores'), where('studentId', '==', student.id));
                    const snap = await getDocs(q);
                    const examMap = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (!examMap[data.examId] || data.timestamp > examMap[data.examId].latestTime) {
                            examMap[data.examId] = {
                                examId: data.examId,
                                examTitle: data.examTitle,
                                latestTime: data.timestamp
                            };
                        }
                    });
                    setCompletedExams(Object.values(examMap).sort((a,b) => b.latestTime - a.latestTime));
                    setLoading(false);
                };
                fetchMyExams();
            }, [student.id]);

            useEffect(() => {
                if (!selectedExam) return;
                const q = query(collection(db, 'scores'), where('examId', '==', selectedExam.examId));
                const unsub = onSnapshot(q, (snap) => {
                    const scoreMap = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (!scoreMap[data.studentId] || data.score > scoreMap[data.studentId].score) {
                            scoreMap[data.studentId] = data;
                        }
                    });
                    const sorted = Object.values(scoreMap).sort((a,b) => b.score - a.score);
                    setLeaderboard(sorted);
                    
                    const myRankIndex = sorted.findIndex(s => s.studentId === student.id);
                    if (myRankIndex !== -1) {
                        setMyStats({ rank: myRankIndex + 1, ...sorted[myRankIndex] });
                    } else {
                        setMyStats(null);
                    }
                });
                return () => unsub();
            }, [selectedExam, student.id]);

            if (loading) return (
                <div className="h-full flex items-center justify-center p-10">
                    <div className="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent"></div>
                </div>
            );

            return (
                <div className="p-4 md:p-6 fade-in h-full flex flex-col pb-20 overflow-y-auto">
                    <div className="mb-6 flex justify-between items-center gap-4 border-b border-slate-200 dark:border-gray-800 pb-4 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-amber-100 dark:bg-amber-900/40 rounded-xl">
                                <Trophy className="text-amber-600 dark:text-amber-400" size={24}/>
                            </div>
                            <div>
                                <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-white">英雄榜</h2>
                                <p className="text-xs md:text-sm text-slate-500 dark:text-gray-400">
                                    {selectedExam ? `目前排名：${selectedExam.examTitle}` : '選擇考卷以查看成績與排名'}
                                </p>
                            </div>
                        </div>
                        <button 
                            onClick={() => selectedExam ? setSelectedExam(null) : onBack()} 
                            className="flex items-center gap-1 bg-slate-200 hover:bg-slate-300 dark:bg-gray-800 dark:hover:bg-gray-700 text-slate-700 dark:text-gray-300 px-4 py-2 rounded-xl font-bold transition active:scale-95 text-sm shrink-0"
                        >
                            <ArrowLeft size={16}/> 返回
                        </button>
                    </div>

                    <div className="flex-1 space-y-4">
                        {completedExams.length === 0 ? (

                                目前尚無任何作戰紀錄，快去完成任務吧！

                        ) : !selectedExam ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                                {completedExams.map((exam) => (
                                    <div 
                                        key={exam.examId} 
                                        onClick={() => setSelectedExam(exam)}
                                        className="glass-card p-5 rounded-2xl border-2 border-transparent hover:border-amber-400 hover:shadow-lg dark:hover:shadow-amber-900/20 cursor-pointer transition-all active:scale-[0.98] group flex items-center justify-between"
                                    >
                                        <div className="flex items-start gap-4">
                                            <div className="bg-amber-50 dark:bg-amber-900/20 p-3 rounded-full text-amber-500 dark:text-amber-400 shrink-0 group-hover:bg-amber-500 group-hover:text-white transition">
                                                <Trophy size={24}/>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 dark:text-white text-lg mb-1">{exam.examTitle}</h3>
                                                <div className="text-xs text-slate-500 dark:text-gray-400">
                                                    點擊查看全班排名
                                                </div>

                                        <ChevronRight className="text-slate-300 dark:text-gray-600 group-hover:text-amber-500 transition shrink-0" size={24}/>

                                ))}

                        ) : (
                            <div className="fade-in flex flex-col gap-6">
                                {myStats && (
                                    <div className="bg-gradient-to-r from-amber-500 to-orange-500 rounded-3xl p-6 text-white shadow-lg shadow-amber-500/30 flex justify-between items-center">
                                        <div>
                                            <div className="text-sm font-bold opacity-80 mb-1">我的最佳成績</div>
                                            <div className="text-3xl font-black font-mono">{myStats.score} <span className="text-base font-bold">PTS</span></div>
                                            <div className="mt-2 text-sm font-bold bg-white/20 inline-block px-3 py-1 rounded-full border border-white/30">
                                                答對率 {myStats.accuracy}%
                                            </div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-sm font-bold opacity-80 mb-1">目前排名</div>
                                            <div className="text-4xl font-black flex items-baseline justify-center gap-1">
                                                <span className="text-lg">第</span>{myStats.rank}<span className="text-lg">名</span>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="glass-card rounded-3xl p-5 shadow-sm">
                                    <h3 className="font-bold text-slate-800 dark:text-white mb-4 flex items-center gap-2 px-2 pb-2 border-b border-slate-200 dark:border-gray-800">
                                        <Crown className="text-amber-500" size={20}/> 即時戰力排行榜
                                    </h3>
                                    <div className="space-y-2">
                                        {leaderboard.map((player, idx) => {
                                            const isMe = player.studentId === student.id;
                                            let rankColor = "text-slate-400 dark:text-gray-500";
                                            let rankBg = "bg-slate-50 dark:bg-gray-800/50";
                                            
                                            if (idx === 0) { rankColor = "text-amber-500 dark:text-neon-gold"; rankBg = "bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50"; }
                                            else if (idx === 1) { rankColor = "text-slate-500 dark:text-slate-300"; rankBg = "bg-slate-100 dark:bg-slate-800/60 border border-slate-300 dark:border-slate-600/50"; }
                                            else if (idx === 2) { rankColor = "text-orange-500 dark:text-orange-400"; rankBg = "bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800/50"; }

                                            if (isMe) {
                                                rankBg += " ring-2 ring-cyan-500 dark:ring-neon-cyan relative overflow-hidden";
                                            }

                                            return (
                                                <div key={player.studentId} className={`flex items-center gap-4 p-3 md:p-4 rounded-xl transition-all ${rankBg}`}>
                                                    {isMe && <div className="absolute top-0 left-0 w-1.5 h-full bg-cyan-500 dark:bg-neon-cyan shadow-[0_0_10px_#00E5FF]"></div>}
                                                    
                                                    <div className={`flex items-center justify-center w-8 h-8 rounded-full font-black text-lg shrink-0 ${rankColor}`}>
                                                        {idx < 3 ? <Award size={24}/> : idx + 1}
                                                    </div>
                                                    
                                                    <div className="flex-1 min-w-0">
                                                        <div className="font-bold text-slate-800 dark:text-white truncate flex items-center gap-2">
                                                            {player.studentName}
                                                            {isMe && <span className="text-[10px] bg-cyan-100 text-cyan-700 dark:bg-cyan-900/50 dark:text-cyan-400 px-2 py-0.5 rounded-full font-black tracking-widest border border-cyan-200 dark:border-cyan-800">你</span>}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="text-right shrink-0">
                                                        <div className={`text-lg md:text-xl font-black font-mono ${isMe ? 'text-cyan-600 dark:text-neon-cyan' : 'text-slate-600 dark:text-gray-300'}`}>{player.score}</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MissionBoard = ({ student, onStartTest, onOpenMistakeBook, onOpenLeaderboard }) => {
            const [exams, setExams] = useState([]);
            const [scores, setScores] = useState({});
            const showToast = useToast();

            useEffect(() => {
                const q = query(collection(db, 'exams'), where('isPublished', '==', true), where('teacherId', '==', student.teacherId));
                const unsub = onSnapshot(q, (snapshot) => {
                    setExams(snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
                });
                return () => unsub();
            }, [student.teacherId]);

            useEffect(() => {
                const sq = query(collection(db, 'scores'), where('studentId', '==', student.id));
                const unsubScore = onSnapshot(sq, (snapshot) => {
                    const scoreMap = {};
                    snapshot.docs.forEach(d => {
                        const data = d.data();
                        if(!scoreMap[data.examId] || data.score > scoreMap[data.examId].score) {
                            scoreMap[data.examId] = data;
                        }
                    });
                    setScores(scoreMap);
                });
                return () => unsubScore();
            }, [student.id]);

            const handleExamClick = (exam) => {
                const hasTaken = scores[exam.id];
                if (!exam.allowMultipleAttempts && hasTaken) {
                    showToast("🛑 此為嚴格測驗，您已完成作答，無法重複挑戰", "error");
                    return;
                }
                onStartTest(exam);
            };

            return (
                <div className="p-4 md:p-6 fade-in h-full flex flex-col">
                    <div className="mb-6 flex justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-cyan-100 dark:bg-cyan-900/40 rounded-xl">
                                <Zap className="text-cyan-600 dark:text-cyan-400" size={24}/>
                            </div>
                            <div>
                                <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-white">作戰任務面板</h2>
                                <p className="hidden md:block text-sm text-slate-500 dark:text-gray-400">請選擇下方已解鎖的測驗任務</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-2 shrink-0">
                            <button onClick={onOpenLeaderboard} className="bg-amber-100 hover:bg-amber-200 dark:bg-amber-900/30 dark:hover:bg-amber-900/50 text-amber-600 dark:text-amber-400 px-3 md:px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition active:scale-95 shadow-sm border border-amber-200 dark:border-amber-900/50">
                                <Trophy size={18} />
                                <span className="hidden sm:inline">英雄榜</span>
                            </button>
                            <button onClick={onOpenMistakeBook} className="bg-red-100 hover:bg-red-200 dark:bg-red-900/30 dark:hover:bg-red-900/50 text-red-600 dark:text-red-400 px-3 md:px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition active:scale-95 shadow-sm border border-red-200 dark:border-red-900/50">
                                <BookOpen size={18} />
                                <span className="hidden sm:inline">錯題本</span>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-4 pb-20">
                        {exams.length === 0 ? (
                            <div className="text-center py-20 text-slate-500">
                                <ShieldAlert size={48} className="mx-auto mb-4 opacity-20" />
                                <p className="font-bold">目前指揮部尚未派送任何任務</p>
                            </div>
                        ) : exams.map(exam => {
                            const hasTaken = scores[exam.id];
                            const isLocked = !exam.allowMultipleAttempts && hasTaken;
                            const displayTime = exam.timeLimit || 30;

                            return (
                                <div key={exam.id} onClick={() => handleExamClick(exam)} className={`relative overflow-hidden p-5 rounded-2xl border-2 transition-all cursor-pointer group ${isLocked ? 'bg-slate-100 dark:bg-gray-800/50 border-slate-300 dark:border-gray-700 opacity-70 grayscale' : 'glass-card border-transparent hover:border-cyan-400 shadow-sm hover:shadow-cyan-500/20 active:scale-[0.98]'}`}>
                                    {isLocked && (
                                        <div className="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg">
                                            已鎖定 (完成)
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-1 group-hover:text-cyan-600 dark:group-hover:text-cyan-400 transition">{exam.title}</h3>
                                            <div className="flex flex-wrap gap-3 text-xs font-bold text-slate-500 dark:text-gray-400">
                                                <span className="flex items-center gap-1"><AlertTriangle size={14}/> 隨機 {exam.drawCount} 題</span>
                                                <span className="flex items-center gap-1"><Clock size={14}/> 每題 {displayTime} 秒</span>
                                                <span className="flex items-center gap-1">
                                                    {exam.allowMultipleAttempts ? <span className="text-green-600 dark:text-neon-green flex items-center gap-1"><CheckCircle size={14}/> 無限刷題</span> : <span className="text-amber-600 dark:text-neon-amber flex items-center gap-1"><ShieldAlert size={14}/> 單次嚴格測驗</span>}
                                                </span>
                                            </div>
                                        </div>
                                        {!isLocked && (
                                            <div className="w-10 h-10 rounded-full bg-cyan-100 dark:bg-cyan-900/50 flex items-center justify-center group-hover:bg-cyan-500 group-hover:text-white transition">
                                                <Play size={20} className={hasTaken ? "text-cyan-600 dark:text-cyan-400 group-hover:text-white" : "text-cyan-600 dark:text-cyan-400 group-hover:text-white ml-1"} />
                                            </div>
                                        )}
                                    </div>
                                    {hasTaken && (
                                        <div className="mt-4 pt-3 border-t border-slate-200 dark:border-gray-700 flex justify-between items-center text-sm font-bold">
                                            <span className="text-slate-600 dark:text-gray-300">最佳紀錄</span>
                                            <span className="flex items-center gap-4">
                                                {hasTaken.accuracy !== undefined && <span className="text-green-600 dark:text-green-400">{hasTaken.accuracy}% 答對率</span>}
                                                <span className="text-cyan-600 dark:text-cyan-400 text-lg">{hasTaken.score} PTS</span>
                                            </span>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const QuizEngine = ({ student, exam, onComplete, audioEngine }) => {
            const examTimeLimit = exam.timeLimit || 30;

            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [combo, setCombo] = useState(0); 
            
            const [correctCount, setCorrectCount] = useState(0); 
            const [answeredCount, setAnsweredCount] = useState(0);
            const initialQuestionsCountRef = useRef(0);
            
            const [timeLeft, setTimeLeft] = useState(examTimeLimit); 
            const [mistakes, setMistakes] = useState([]); 
            const [recordedMistakes, setRecordedMistakes] = useState([]); 
            
            const [isReviewMode, setIsReviewMode] = useState(false); 
            const [isLocked, setIsLocked] = useState(false); 
            const [animState, setAnimState] = useState(''); 

            const showToast = useToast();

            useEffect(() => {
                const shuffled = shuffleArray(exam.questions || []);
                const drawn = shuffled.slice(0, Math.min(exam.drawCount, shuffled.length));
                initialQuestionsCountRef.current = drawn.length; 
                const processed = drawn.map(q => {
                    const correctText = /^[1-4]$/.test(q.correct) ? q.options[parseInt(q.correct)-1] : q.correct;
                    const shuffledOptions = shuffleArray([...q.options]);
                    return { ...q, correctText, displayOptions: shuffledOptions };
                });
                setQuestions(processed);
                audioEngine.initAudio(); 
            }, []);

            useEffect(() => {
                if (questions.length === 0 || isLocked) return;
                
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            handleTimeOut();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [currentIndex, questions.length, isLocked]);

            const handleTimeOut = () => {
                handleAnswer(null, true); 
            };

            const handleAnswer = (selectedOpt, isTimeout = false) => {
                if (isLocked) return;
                
                const currentQ = questions[currentIndex];
                const isCorrect = !isTimeout && (selectedOpt === currentQ.correctText);
                
                if (!isReviewMode) {
                    setAnsweredCount(prev => prev + 1);
                    if (isCorrect) setCorrectCount(prev => prev + 1);
                }

                const timeRatio = Math.max(0, timeLeft / examTimeLimit); 
                const BASE_SCORE = Math.max(100, Math.floor(timeRatio * 1000));
                let earnedPoints = 0;

                if (isCorrect) {
                    audioEngine.playCorrect();
                    setAnimState('correct');
                    
                    if (isReviewMode) {
                        earnedPoints = Math.round(BASE_SCORE / 2);
                        setScore(prev => prev + earnedPoints);
                    } else {
                        const currentMultiplier = Math.min(1.0 + (combo * 0.1), 2.0); 
                        earnedPoints = Math.round(BASE_SCORE * currentMultiplier);
                        setScore(prev => prev + earnedPoints);
                        setCombo(prev => prev + 1);
                        
                        if(combo > 1) {
                            showToast(`${combo} 連擊！分數加成 x${currentMultiplier.toFixed(1)} (+${earnedPoints} PTS)`, 'success');
                        }
                    }
                } else {
                    audioEngine.playWrong();
                    setAnimState('wrong');
                    setCombo(0); 
                    
                    const mistakeRecord = {
                        ...currentQ,
                        selected: selectedOpt || '超時未作答'
                    };

                    if (!mistakes.find(m => m.question === currentQ.question)) {
                        setMistakes(prev => [...prev, mistakeRecord]);
                    }
                    
                    if (!recordedMistakes.find(m => m.question === currentQ.question)) {
                        setRecordedMistakes(prev => [...prev, mistakeRecord]);
                    }

                    setIsLocked(true);
                    setTimeout(() => setIsLocked(false), 3000); 
                }

                setTimeout(() => {
                    setAnimState('');
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                        setTimeLeft(examTimeLimit);
                    } else {
                        handleRoundComplete();
                    }
                }, 1000);
            };

            const handleRoundComplete = () => {
                if (!isReviewMode && mistakes.length > 0) {
                    showToast(`第一輪結束！準備進入錯題訂正 (共 ${mistakes.length} 題)，訂正分數減半！`, 'error');
                    setIsReviewMode(true);
                    setQuestions(shuffleArray(mistakes));
                    setCurrentIndex(0);
                    setTimeLeft(examTimeLimit);
                    setMistakes([]); 
                } else {
                    finalizeTest();
                }
            };

            const finalizeTest = async () => {
                const finalAccuracy = Math.round(((initialQuestionsCountRef.current - recordedMistakes.length) / initialQuestionsCountRef.current) * 100) || 0;

                const scoreData = {
                    studentId: student.id,
                    studentName: student.name,
                    classId: student.classId,
                    examId: exam.id,
                    examTitle: exam.title,
                    score: score,
                    accuracy: finalAccuracy, 
                    timestamp: Date.now()
                };

                try {
                    await addDoc(collection(db, 'scores'), scoreData);
                    
                    const mistakePromises = recordedMistakes.map(m => addDoc(collection(db, 'mistakes'), {
                        studentId: student.id, 
                        classId: student.classId, 
                        examId: exam.id,
                        examTitle: exam.title,
                        question: m.question, 
                        correctText: m.correctText, 
                        selected: m.selected, 
                        options: m.options,
                        timestamp: Date.now()
                    }));
                    await Promise.all(mistakePromises);

                    onComplete(score, finalAccuracy, recordedMistakes, initialQuestionsCountRef.current);
                } catch (error) {
                    showToast("成績上傳失敗：" + error.message, "error");
                }
            };

            if (questions.length === 0) return <div className="p-10 text-center">正在解析作戰任務...</div>;

            const currentQ = questions[currentIndex];
            const isDangerTime = timeLeft <= 5;
            const multiplier = Math.min(1.0 + (combo * 0.1), 2.0).toFixed(1);
            
            const currentAccuracy = answeredCount === 0 ? '--' : Math.round((correctCount / answeredCount) * 100);

            return (
                <div className={`h-full flex flex-col p-4 md:p-6 transition-all duration-300 ${isLocked ? 'force-field-locked' : ''}`}>
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <div className="text-xs font-bold text-slate-500 mb-1">{isReviewMode ? '🔥 錯題訂正模式 (得分半價)' : '⚔️ 任務執行中'}</div>
                            <div className="text-xl sm:text-2xl font-black text-cyan-600 dark:text-cyan-400 font-mono">
                                題 {currentIndex + 1} <span className="text-slate-400 text-sm">/ {questions.length}</span>
                            </div>
                        </div>
                        <div className="text-right flex flex-col items-end">
                            {!isReviewMode && combo >= 2 && <div className="text-sm font-black text-amber-500 animate-bounce mb-1">x{multiplier} COMBO!</div>}
                            
                            <div className="flex items-end gap-4 sm:gap-6">
                                <div className="text-right">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Accuracy</div>
                                    <div className="text-2xl sm:text-3xl font-black text-green-500 font-mono leading-none">{currentAccuracy}<span className="text-sm sm:text-base">%</span></div>
                                </div>
                                <div className="text-right">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Score</div>
                                    <div className="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white font-mono leading-none">{score} <span className="text-xs sm:text-sm text-slate-400">PTS</span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="relative h-2 bg-slate-200 dark:bg-gray-800 rounded-full mb-8 overflow-hidden">
                        <div className={`absolute top-0 left-0 h-full transition-all duration-1000 ${isDangerTime ? 'bg-red-500' : 'bg-cyan-500'}`} style={{ width: `${(timeLeft / examTimeLimit) * 100}%` }}></div>
                    </div>

                    <div className={`glass-card p-6 md:p-8 rounded-3xl mb-6 shadow-lg min-h-[120px] flex items-center justify-center transition ${animState === 'wrong' ? 'animate-shake border-red-500' : ''} ${animState === 'correct' ? 'border-green-500 shadow-green-500/20' : ''}`}>
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 dark:text-white leading-relaxed text-center">{currentQ.question}</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
                        {currentQ.displayOptions.map((opt, i) => {
                            let btnStyle = "bg-white dark:bg-dark-card border-2 border-slate-200 dark:border-gray-700 text-slate-800 dark:text-gray-200 hover:border-cyan-400 dark:hover:border-cyan-500 hover:shadow-lg active:scale-95";
                            
                            if (animState !== '') {
                                if (opt === currentQ.correctText) btnStyle = "bg-green-500 border-green-500 text-white shadow-lg shadow-green-500/40 transform scale-[1.02]";
                                else btnStyle = "bg-slate-100 dark:bg-gray-800 border-slate-200 dark:border-gray-700 text-slate-400 opacity-50";
                            }

                            return (
                                <button 
                                    key={i} 
                                    disabled={isLocked || animState !== ''}
                                    onClick={() => handleAnswer(opt)}
                                    className={`p-5 rounded-2xl font-bold text-lg transition-all duration-200 text-left flex items-center gap-3 ${btnStyle}`}
                                >
                                    <span className={`flex items-center justify-center w-8 h-8 rounded-full text-sm shrink-0 ${animState !== '' && opt === currentQ.correctText ? 'bg-white text-green-600' : 'bg-slate-100 dark:bg-gray-800 text-slate-500'}`}>{String.fromCharCode(65 + i)}</span>
                                    <span>{opt}</span>
                                </button>
                            );
                        })}
                    </div>

                    {isLocked && (
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-600/90 text-white px-8 py-4 rounded-2xl font-black tracking-widest text-xl shadow-2xl flex items-center gap-2 animate-[pop_0.2s_ease-out] z-50 backdrop-blur-sm">
                            <ShieldAlert size={28}/> 系統鎖定冷卻中
                        </div>
                    )}
                </div>
            );
        };

        // 🌟 改版的 ReportCard：加入雙欄版面與即時戰力排行榜
        const ReportCard = ({ student, examId, score, accuracy, mistakes, totalQuestions, onBack }) => {
            const [leaderboard, setLeaderboard] = useState([]);
            const [myRank, setMyRank] = useState('-');

            useEffect(() => {
                // 考完試當下即時連線抓取此張考卷的所有成績，進行排行
                const q = query(collection(db, 'scores'), where('examId', '==', examId));
                const unsub = onSnapshot(q, (snapshot) => {
                    const scoreMap = {};
                    // 相同學生只保留最高分
                    snapshot.docs.forEach(d => {
                        const data = d.data();
                        if (!scoreMap[data.studentId] || data.score > scoreMap[data.studentId].score) {
                            scoreMap[data.studentId] = data;
                        }
                    });
                    
                    // 根據分數由高至低排序
                    const sortedScores = Object.values(scoreMap).sort((a, b) => b.score - a.score);
                    setLeaderboard(sortedScores);

                    // 尋找自己的名次
                    const rank = sortedScores.findIndex(s => s.studentId === student.id) + 1;
                    setMyRank(rank > 0 ? rank : '-');
                });
                return () => unsub();
            }, [examId, student.id]);

            return (
                <div className="h-full flex flex-col items-center py-6 md:py-10 px-4 fade-in overflow-y-auto w-full">
                    
                    <div className="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 shrink-0">
                        {/* 左側：個人成績結算面板 */}
                        <div className="lg:col-span-1 glass-card p-6 md:p-8 rounded-3xl text-center shadow-xl border-t-8 border-t-cyan-500 flex flex-col justify-between">
                            <div>
                                <Trophy className="mx-auto text-amber-400 mb-4" size={60} />
                                <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-1 tracking-widest">作戰結算</h2>
                                <p className="text-slate-500 dark:text-gray-400 font-bold mb-6 text-sm">Personal Report</p>
                                
                                <div className="grid grid-cols-2 gap-3 mb-6 w-full">
                                    <div className="bg-slate-50 dark:bg-dark-main rounded-2xl p-4 border border-slate-200 dark:border-gray-700 shadow-inner">
                                        <div className="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">獲得積分</div>
                                        <div className="text-2xl md:text-3xl font-black text-cyan-600 dark:text-cyan-400 font-mono">{score}</div>
                                    </div>
                                    <div className="bg-slate-50 dark:bg-dark-main rounded-2xl p-4 border border-slate-200 dark:border-gray-700 shadow-inner">
                                        <div className="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">答對率</div>
                                        <div className="text-2xl md:text-3xl font-black text-green-500 dark:text-green-400 font-mono">{accuracy}%</div>
                                    </div>
                                </div>
                                
                                <div className="bg-amber-50 dark:bg-amber-900/20 border-2 border-amber-200 dark:border-amber-700/50 rounded-2xl p-4 mb-8 text-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-2 opacity-10"><Crown size={40} className="text-amber-500"/></div>
                                    <div className="text-[11px] font-bold text-amber-600 dark:text-amber-500 mb-1 tracking-widest">目前全班排名</div>
                                    <div className="text-4xl font-black text-amber-500 dark:text-neon-gold flex justify-center items-baseline gap-1 relative z-10">
                                        <span className="text-lg">第</span>{myRank}<span className="text-lg">名</span>
                                    </div>
                                </div>
                            </div>

                            <button onClick={onBack} className="w-full bg-slate-800 dark:bg-white text-white dark:text-slate-900 font-black py-4 px-4 rounded-xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                                返回任務大廳
                            </button>
                        </div>

                        {/* 右側：即時戰力排行榜 */}
                        <div className="lg:col-span-2 glass-card p-6 md:p-8 rounded-3xl shadow-xl flex flex-col h-[400px] lg:h-auto min-h-[400px]">
                            <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2 mb-4 shrink-0 pb-3 border-b border-slate-200 dark:border-gray-800">
                                <Crown className="text-amber-500" size={24}/>
                                即時戰力排行榜
                            </h3>
                            
                            <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                                {leaderboard.length === 0 ? (
                                    <div className="h-full flex items-center justify-center text-slate-400">載入排名中...</div>
                                ) : (
                                    leaderboard.map((player, idx) => {
                                        const isMe = player.studentId === student.id;
                                        
                                        // 依據名次賦予不同樣式
                                        let rankColor = "text-slate-400 dark:text-gray-500";
                                        let rankBg = "bg-slate-50 dark:bg-gray-800/50";
                                        if (idx === 0) { rankColor = "text-amber-500 dark:text-neon-gold"; rankBg = "bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700/50 shadow-sm"; }
                                        else if (idx === 1) { rankColor = "text-slate-500 dark:text-slate-300"; rankBg = "bg-slate-100 dark:bg-slate-800/60 border-slate-300 dark:border-slate-600/50 shadow-sm"; }
                                        else if (idx === 2) { rankColor = "text-orange-500 dark:text-orange-400"; rankBg = "bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800/50 shadow-sm"; }

                                        // 如果是自己，加上高亮光圈
                                        if (isMe) {
                                            rankBg += " ring-2 ring-cyan-500 dark:ring-neon-cyan relative overflow-hidden bg-cyan-50 dark:bg-cyan-900/20";
                                        }

                                        return (
                                            <div key={player.studentId} className={`flex items-center gap-4 p-3 md:p-4 rounded-xl border transition-all ${rankBg} ${idx > 2 && !isMe ? 'border-transparent' : ''}`}>
                                                {isMe && <div className="absolute top-0 left-0 w-1.5 h-full bg-cyan-500 dark:bg-neon-cyan shadow-[0_0_10px_#00E5FF]"></div>}
                                                
                                                <div className={`flex items-center justify-center w-8 h-8 rounded-full font-black text-lg shrink-0 ${rankColor}`}>
                                                    {idx < 3 ? <Award size={24}/> : idx + 1}
                                                </div>
                                                
                                                <div className="flex-1 min-w-0">
                                                    <div className="font-bold text-slate-800 dark:text-white truncate flex items-center gap-2">
                                                        {player.studentName}
                                                        {isMe && <span className="text-[10px] bg-cyan-100 text-cyan-700 dark:bg-cyan-900/50 dark:text-cyan-400 px-2 py-0.5 rounded-full font-black tracking-widest border border-cyan-200 dark:border-cyan-800">你</span>}
                                                    </div>
                                                </div>
                                                
                                                <div className="text-right shrink-0">
                                                    <div className={`text-xl font-black font-mono ${isMe ? 'text-cyan-600 dark:text-neon-cyan' : 'text-slate-600 dark:text-gray-300'}`}>{player.score}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">PTS</div>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 底部：錯題檢討區 */}
                    <div className="w-full max-w-5xl shrink-0 pb-10">
                        <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2 mb-4 ml-2">
                            <AlertTriangle className="text-cyan-600 dark:text-cyan-400" size={24}/>
                            本回錯題檢討區 <span className="text-sm font-normal text-slate-500">({mistakes.length} 題)</span>
                        </h3>

                        {mistakes.length === 0 ? (
                            <div className="glass-card p-8 rounded-2xl text-center text-green-600 dark:text-green-400 font-bold flex flex-col items-center justify-center gap-3">
                                <CheckCircle size={48} />
                                完美達成！沒有任何錯題！
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {mistakes.map((m, idx) => (
                                    <div key={idx} className="glass-card p-5 md:p-6 rounded-2xl border-l-4 border-l-red-500 text-left shadow-md flex flex-col">
                                        <div className="font-bold text-slate-800 dark:text-white mb-4 text-lg leading-relaxed"><span className="text-red-500 mr-2">{idx + 1}.</span>{m.question}</div>
                                        <div className="flex flex-col gap-3 text-sm mt-auto">
                                            <div className="flex items-start gap-3 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 p-3 rounded-xl border border-red-100 dark:border-red-900/50">
                                                <XCircle size={20} className="shrink-0 mt-0.5" />
                                                <div>
                                                    <span className="font-bold opacity-70 block text-[10px] mb-1 tracking-widest uppercase">你的答案</span>
                                                    <span className="font-medium text-base">{m.selected}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-3 text-green-700 dark:text-green-400 bg-green-50 dark:bg-green-900/20 p-3 rounded-xl border border-green-200 dark:border-green-900/50">
                                                <CheckCircle size={20} className="shrink-0 mt-0.5" />
                                                <div>
                                                    <span className="font-bold opacity-70 block text-[10px] mb-1 tracking-widest uppercase">正確答案</span>
                                                    <span className="font-bold text-base">{m.correctText}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [student, setStudent] = useState(null);
            const [activeExam, setActiveExam] = useState(null);
            const [reportData, setReportData] = useState(null); 
            const [isViewingMistakes, setIsViewingMistakes] = useState(false); 
            const [isViewingLeaderboard, setIsViewingLeaderboard] = useState(false);
            
            const [isDarkMode, setIsDarkMode] = useState(false); 
            const [isSoundEnabled, setIsSoundEnabled] = useState(false); 
            const audioEngine = useAudioEngine(isSoundEnabled);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
            }, [isDarkMode]);

            const handleLogout = () => {
                localStorage.removeItem('smartQuizStudent');
                setStudent(null);
                setActiveExam(null);
                setReportData(null);
                setIsViewingMistakes(false);
                setIsViewingLeaderboard(false);
            };

            const Header = () => (
                <header className="glass-card border-b-0 border-cyan-500/20 px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-40">
                    <div className="flex items-center gap-2">
                        <Zap className="text-cyan-600 dark:text-cyan-400" size={20} />
                        <h1 className="text-lg font-black tracking-widest text-slate-800 dark:text-white">智慧測驗</h1>
                    </div>
                    <div className="flex items-center gap-1 md:gap-3">
                        <a href="teacher.html" target="_blank" rel="noopener noreferrer" className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400" title="進入指揮中控台 (老師專用)">
                            <Settings size={20}/>
                        </a>

                        <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className={`p-2 rounded-full transition ${isSoundEnabled ? 'text-cyan-600 dark:text-cyan-400 bg-cyan-50 dark:bg-cyan-900/30' : 'text-slate-400 hover:bg-slate-100 dark:hover:bg-gray-800'}`} title="音效切換">
                            {isSoundEnabled ? <Volume2 size={20}/> : <VolumeX size={20}/>}
                        </button>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400" title="佈景主題切換">
                            {isDarkMode ? <Sun size={20} className="hover:text-amber-400" /> : <Moon size={20} className="hover:text-indigo-600" />}
                        </button>
                        {student && (
                            <button onClick={handleLogout} className="p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20 transition text-red-500 ml-2" title="登出">
                                <LogOut size={20}/>
                            </button>
                        )}
                    </div>
                </header>
            );

            return (
                <ToastProvider>
                    <div className="h-screen flex flex-col relative pb-safe">
                        <main className="flex-1 w-full mx-auto overflow-hidden relative" style={{ maxWidth: (reportData || isViewingMistakes || isViewingLeaderboard) ? '100%' : '48rem' }}>
                            {!student ? (
                                <LoginScreen onLogin={setStudent} />
                            ) : reportData ? (
                                /* 🌟 更新傳入參數，加上 student 與 examId 供排行榜使用 */
                                <ReportCard student={student} examId={activeExam.id} score={reportData.score} accuracy={reportData.accuracy} mistakes={reportData.mistakes} totalQuestions={reportData.total} onBack={() => {setReportData(null); setActiveExam(null);}} />
                            ) : activeExam ? (
                                <QuizEngine student={student} exam={activeExam} audioEngine={audioEngine} onComplete={(score, accuracy, mistakesList, total) => setReportData({score, accuracy, mistakes: mistakesList, total})} />
                            ) : isViewingMistakes ? (
                                <MistakeBook student={student} onBack={() => setIsViewingMistakes(false)} />
                            ) : isViewingLeaderboard ? (
                                <ScoreBoard student={student} onBack={() => setIsViewingLeaderboard(false)} />
                            ) : (
                                <MissionBoard student={student} onStartTest={setActiveExam} onOpenMistakeBook={() => setIsViewingMistakes(true)} onOpenLeaderboard={() => setIsViewingLeaderboard(true)} />
                            )}
                        </main>
                    </div>
                </ToastProvider>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
