<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus 智慧測驗終端 | 2077 Edition</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: { cyan: '#00f0ff', magenta: '#ff003c', dark: '#020617' }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'scanline': 'scanline 8s linear infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        scanline: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(100vh)' } }
                    }
                }
            }
        }
    </script>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "firebase/app": "https://esm.sh/firebase@10.8.0/app",
                "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
            }
        }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #020617; /* 深淵黑 */
            color: #e2e8f0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-cyber { font-family: 'Orbitron', sans-serif; }

        /* 全息網格背景 */
        .bg-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
        }

        /* 掃描線特效 */
        .scanline {
            width: 100%; height: 200px;
            background: linear-gradient(to bottom, transparent, rgba(0, 240, 255, 0.1), transparent);
            position: fixed; top: 0; left: 0;
            z-index: -1; pointer-events: none;
        }

        /* 玻璃擬物化 (Glassmorphism) 卡片 */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05), inset 0 0 20px rgba(0, 240, 255, 0.02);
        }

        /* 霓虹發光字體與邊框 */
        .text-glow-cyan { text-shadow: 0 0 10px rgba(0, 240, 255, 0.7); }
        .text-glow-magenta { text-shadow: 0 0 10px rgba(255, 0, 60, 0.7); }
        
        .btn-cyber {
            position: relative; overflow: hidden; transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        .btn-cyber:hover {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            transform: translateY(-2px);
        }
        .btn-cyber::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }
        .btn-cyber:hover::before { left: 100%; }

        /* 雷達掃描 Loading 動畫 */
        .radar-spinner {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(0, 240, 255, 0.2);
            border-top-color: #00f0ff;
            animation: spin 1s linear infinite, glow 2s ease-in-out infinite alternate;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes glow { 100% { box-shadow: 0 0 20px #00f0ff; } }

        /* Toast 進入動畫 */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scanline animate-scanline"></div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, createContext, useContext, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore } from 'firebase/firestore';

        // --- 核心系統 Context (UI & Firebase) ---
        const SystemContext = createContext();
        const useSystem = () => useContext(SystemContext);

        // --- 頂級 Toast 提示系統元件 ---
        const ToastProvider = ({ children, addToast }) => (
            <div className="fixed top-4 right-4 z-50 flex flex-col gap-3 pointer-events-none">
                {children}
            </div>
        );

        const Toast = ({ message, type }) => {
            const isError = type === 'error';
            return (
                <div className={`toast-enter glass-panel border-l-4 p-4 rounded-r-lg shadow-lg flex items-center gap-3 w-80 pointer-events-auto
                    ${isError ? 'border-neon-magenta shadow-[0_0_15px_rgba(255,0,60,0.3)]' : 'border-neon-cyan shadow-[0_0_15px_rgba(0,240,255,0.3)]'}`}>
                    <span className={`text-2xl ${isError ? 'text-neon-magenta text-glow-magenta' : 'text-neon-cyan text-glow-cyan'}`}>
                        {isError ? '⚠️' : '⚡'}
                    </span>
                    <p className="text-sm font-medium text-slate-200">{message}</p>
                </div>
            );
        };

        // --- 共用 UI 元件 ---
        const CyberLoader = ({ text = "SYSTEM LOADING..." }) => (
            <div className="flex flex-col items-center justify-center h-full gap-6 animate-float">
                <div className="radar-spinner"></div>
                <p className="font-cyber text-neon-cyan text-glow-cyan tracking-widest animate-pulse">{text}</p>
            </div>
        );

        // --- 模組 1：系統初始化艙 (Bootloader) ---
        function Bootloader({ onConfigSaved }) {
            const [inputConfig, setInputConfig] = useState('');
            const { showToast } = useSystem();

            const handleSave = () => {
                try {
                    // 嘗試解析使用者貼上的 JSON
                    let configObj = inputConfig;
                    if (typeof inputConfig === 'string') {
                        // 移除可能複製到的變數宣告，只取 {} 內容
                        const match = inputConfig.match(/\{[\s\S]*\}/);
                        if (!match) throw new Error("無效的格式");
                        // 替換單引號為雙引號，並處理沒有引號的 key (簡易處理)
                        let jsonStr = match[0].replace(/'/g, '"').replace(/(\w+):/g, '"$1":');
                        configObj = JSON.parse(jsonStr);
                    }
                    
                    if (!configObj.apiKey || !configObj.projectId) throw new Error("缺少必要欄位");
                    
                    // 加密並存入 localStorage
                    const encoded = btoa(JSON.stringify(configObj));
                    localStorage.setItem('nexus_db_config', encoded);
                    showToast("資料庫連線代碼已寫入核心", "success");
                    onConfigSaved(configObj);
                } catch (e) {
                    showToast("解析失敗，請確認 Firebase Config 格式是否正確", "error");
                    console.error(e);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-screen p-4">
                    <div className="glass-panel p-8 md:p-12 rounded-2xl w-full max-w-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-neon-cyan to-transparent opacity-50"></div>
                        
                        <div className="text-center mb-8">
                            <h1 className="font-cyber text-3xl md:text-5xl text-white mb-2 tracking-wider">NEXUS <span className="text-neon-cyan text-glow-cyan">CORE</span></h1>
                            <p className="text-slate-400 text-sm">偵測到未知的執行環境，請指揮官輸入 Firebase 核心配置金鑰以建立神經連結。</p>
                        </div>

                        <div className="space-y-6">
                            <div className="relative">
                                <label className="block text-neon-cyan text-xs font-cyber tracking-widest mb-2 ml-1">FIREBASE_CONFIG (JSON)</label>
                                <textarea 
                                    className="w-full h-48 bg-slate-950/80 border border-slate-700 rounded-xl p-4 text-slate-300 font-mono text-sm focus:outline-none focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan transition-colors resize-none placeholder-slate-700"
                                    placeholder="const firebaseConfig = {&#10;  apiKey: '...',&#10;  authDomain: '...',&#10;  projectId: '...',&#10;  ...&#10;};"
                                    value={inputConfig}
                                    onChange={(e) => setInputConfig(e.target.value)}
                                ></textarea>
                            </div>
                            
                            <button onClick={handleSave} className="w-full btn-cyber bg-slate-800 border border-neon-cyan text-neon-cyan py-4 rounded-xl font-cyber tracking-widest text-lg">
                                INITIATE CONNECTION
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 模組 2：主入口選擇與教師授權 (Role Select & Auth) ---
        function RoleSelect({ setView }) {
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const { showToast } = useSystem();
            
            const handleTeacherAccess = () => {
                const savedPin = localStorage.getItem('nexus_admin_pin');
                if (!savedPin) {
                    setView('admin-setup'); // 首次設定
                } else {
                    setShowPinModal(true); // 驗證
                }
            };

            const verifyPin = () => {
                const savedPin = localStorage.getItem('nexus_admin_pin');
                if (btoa(pinInput) === savedPin) {
                    showToast("授權成功，歡迎指揮官", "success");
                    setView('teacher-dashboard');
                } else {
                    showToast("存取被拒絕：PIN 碼無效", "error");
                    setPinInput('');
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-screen p-4">
                    <div className="text-center mb-12 animate-float">
                        <h1 className="font-cyber text-4xl md:text-6xl text-white tracking-widest mb-4">
                            NEXUS <span className="text-neon-cyan text-glow-cyan">TERMINAL</span>
                        </h1>
                        <p className="text-slate-400">請選擇您的神經連結身分</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl px-4">
                        {/* 學生卡片 */}
                        <button onClick={() => setView('student-portal')} className="glass-panel p-10 rounded-3xl flex flex-col items-center justify-center group transition transform hover:-translate-y-2 hover:border-neon-cyan">
                            <div className="text-6xl mb-6 group-hover:scale-110 transition duration-300 drop-shadow-[0_0_15px_rgba(0,240,255,0.5)]">🧑‍🚀</div>
                            <span className="text-2xl font-bold text-white mb-2 tracking-widest">學員連結</span>
                            <span className="text-slate-400 text-sm">進入測驗與訓練模擬器</span>
                        </button>

                        {/* 教師卡片 */}
                        <button onClick={handleTeacherAccess} className="glass-panel p-10 rounded-3xl flex flex-col items-center justify-center group transition transform hover:-translate-y-2 hover:border-neon-magenta">
                            <div className="text-6xl mb-6 group-hover:scale-110 transition duration-300 drop-shadow-[0_0_15px_rgba(255,0,60,0.5)]">👁️‍🗨️</div>
                            <span className="text-2xl font-bold text-white mb-2 tracking-widest">指揮官授權</span>
                            <span className="text-slate-400 text-sm">進入中央控制台與數據分析</span>
                        </button>
                    </div>

                    {/* PIN 碼驗證彈跳窗 */}
                    {showPinModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex justify-center items-center z-50">
                            <div className="glass-panel border-neon-magenta p-8 rounded-2xl w-80 text-center">
                                <h3 className="font-cyber text-neon-magenta mb-4 tracking-widest">ADMIN OVERRIDE</h3>
                                <input 
                                    type="password" maxLength="4" placeholder="----"
                                    className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-center text-2xl tracking-[1em] text-white focus:border-neon-magenta outline-none mb-6"
                                    value={pinInput} onChange={e => setPinInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && verifyPin()}
                                />
                                <div className="flex gap-4">
                                    <button onClick={() => setShowPinModal(false)} className="flex-1 py-2 text-slate-400 hover:text-white transition">取消</button>
                                    <button onClick={verifyPin} className="flex-1 py-2 bg-neon-magenta/20 text-neon-magenta border border-neon-magenta rounded-lg hover:bg-neon-magenta hover:text-white transition font-cyber">DECRYPT</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 模組 3：主控台元件 (App) ---
        function App() {
            const [firebaseConfig, setFirebaseConfig] = useState(null);
            const [db, setDb] = useState(null);
            const [view, setView] = useState('loading'); // loading, bootloader, role-select, etc.
            const [toasts, setToasts] = useState([]);

            const showToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000); // 4秒後自動消失
            };

            // 系統啟動：檢查本機是否有設定檔
            useEffect(() => {
                const initSystem = () => {
                    const savedConfig = localStorage.getItem('nexus_db_config');
                    if (savedConfig) {
                        try {
                            const parsedConfig = JSON.parse(atob(savedConfig));
                            setFirebaseConfig(parsedConfig);
                            
                            // 初始化 Firebase 引擎
                            const app = initializeApp(parsedConfig);
                            const firestore = getFirestore(app);
                            setDb(firestore);
                            
                            showToast("神經連結已重新建立", "success");
                            setTimeout(() => setView('role-select'), 1000);
                        } catch (e) {
                            console.error("配置損毀", e);
                            localStorage.removeItem('nexus_db_config');
                            setView('bootloader');
                        }
                    } else {
                        setView('bootloader');
                    }
                };
                
                // 模擬系統啟動特效延遲
                setTimeout(initSystem, 1500);
            }, []);

            return (
                <SystemContext.Provider value={{ db, showToast, setView }}>
                    <ToastProvider>
                        {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} />)}
                    </ToastProvider>
                    
                    <main className="h-screen w-screen overflow-hidden text-slate-200">
                        {view === 'loading' && <CyberLoader />}
                        {view === 'bootloader' && <Bootloader onConfigSaved={(cfg) => {
                            const app = initializeApp(cfg);
                            setDb(getFirestore(app));
                            setView('role-select');
                        }} />}
                        {view === 'role-select' && <RoleSelect setView={setView} />}
                        
                        {/* 尚未實作的區域，先用 Placeholder 代替 */}
                        {view === 'admin-setup' && (
                            <div className="flex flex-col items-center justify-center h-full p-4">
                                <div className="glass-panel border-neon-magenta p-8 rounded-2xl w-full max-w-md text-center">
                                    <h2 className="font-cyber text-2xl text-neon-magenta mb-4">INITIALIZE PIN</h2>
                                    <p className="text-sm text-slate-400 mb-6">請設定 4 位數指揮官密碼</p>
                                    <input type="password" id="newPin" maxLength="4" className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-center text-2xl tracking-[1em] text-white focus:border-neon-magenta outline-none mb-6" placeholder="----" />
                                    <button onClick={() => {
                                        const pin = document.getElementById('newPin').value;
                                        if(pin.length !== 4) return showToast("請輸入完整的 4 位數 PIN 碼", "error");
                                        localStorage.setItem('nexus_admin_pin', btoa(pin));
                                        showToast("安全憑證設定完成", "success");
                                        setView('teacher-dashboard');
                                    }} className="w-full btn-cyber bg-slate-800 border border-neon-magenta text-neon-magenta py-3 rounded-xl font-cyber">SAVE CREDENTIALS</button>
                                </div>
                            </div>
                        )}
                        {view === 'teacher-dashboard' && <CyberLoader text="ACCESSING ADMIN DASHBOARD..." />}
                        {view === 'student-portal' && <CyberLoader text="CONNECTING TO SIMULATOR..." />}
                    </main>
                </SystemContext.Provider>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
