<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧測驗 | 老師中控台</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind 自訂設定 (科技感色彩) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: { cyan: '#00E5FF', blue: '#2979FF', red: '#FF1744', gold: '#FFD700', silver: '#C0C0C0', bronze: '#CD7F32' },
                        dark: { main: '#0B0F19', card: '#111827', border: '#1F2937' }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 10px rgba(0, 229, 255, 0.5), 0 0 20px rgba(0, 229, 255, 0.3)',
                        'neon-cyan-hover': '0 0 15px rgba(0, 229, 255, 0.8), 0 0 30px rgba(0, 229, 255, 0.5)',
                        'neon-blue': '0 0 10px rgba(41, 121, 255, 0.5)',
                        'neon-red': '0 0 10px rgba(255, 23, 68, 0.5)',
                        'neon-gold': '0 0 10px rgba(255, 215, 0, 0.5)'
                    }
                }
            }
        }
    </script>

    <style>
        /* 日光/暗黑模式 CSS 變數定義 */
        :root {
            --bg-color: #F8FAFC; 
            --text-main: #0F172A; 
            --grid-color: rgba(15, 23, 42, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(203, 213, 225, 0.8); 
            --scrollbar-track: #F8FAFC;
            --scrollbar-thumb: #CBD5E1;
        }
        .dark {
            --bg-color: #0B0F19;
            --text-main: #E5E7EB;
            --grid-color: rgba(0, 229, 255, 0.03);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(31, 41, 55, 0.8);
            --scrollbar-track: #0B0F19;
            --scrollbar-thumb: #1F2937;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: background-color 0.3s, color 0.3s, background-image 0.3s;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00E5FF; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: background 0.3s, border 0.3s;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-item { animation: slideInUp 0.4s ease-out forwards; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom": "https://esm.sh/react-dom@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createPortal } from 'react-dom';
        import { Users, BookOpen, LogOut, Upload, Download, Trash2, Plus, Zap, Settings, ShieldAlert, CheckCircle2, Sun, Moon, Edit, Clipboard, X, Key, Activity, Flame, Award, TrendingUp, Target, BarChart3, Maximize2, HelpCircle } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, updatePassword } from 'firebase/auth';
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, onSnapshot, query, where, orderBy, getDocs } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyB9NJXQwdKweStTbATahldDgvtbuGclo34",
            authDomain: "test-reading-71839.firebaseapp.com",
            projectId: "test-reading-71839",
            storageBucket: "test-reading-71839.firebasestorage.app",
            messagingSenderId: "499192051513",
            appId: "1:499192051513:web:777c873e938464e2995ae8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🌟 空間傳送門 (Portal)
        const ModalPortal = ({ children }) => createPortal(children, document.body);

        // ==========================================
        // 🌟 共用組件：BaseModal
        // ==========================================
        const BaseModal = ({ isOpen, onClose, title, icon: Icon, iconColor = "text-cyan-600 dark:text-neon-cyan", btnColor = "bg-cyan-600 hover:bg-cyan-700 dark:bg-neon-cyan dark:hover:bg-cyan-400", children, confirmText = "確認", onConfirm, isConfirmDisabled = false, maxWidth = "max-w-sm" }) => {
            if (!isOpen) return null;
            return (
                <ModalPortal>
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm fade-in">
                        <div className={`bg-white dark:bg-dark-card w-full ${maxWidth} rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col max-h-[90vh] overflow-hidden animate-[slideIn_0.2s_ease-out]`}>
                            <div className="px-6 py-4 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50 shrink-0">
                                <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                    {Icon && <Icon size={20} className={iconColor} />}
                                    {title}
                                </h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-slate-700 dark:hover:text-white transition"><X size={24}/></button>
                            </div>
                            <div className="p-6 space-y-4 overflow-y-auto flex-1">
                                {children}
                            </div>
                            <div className="px-6 py-4 bg-slate-50 dark:bg-gray-800/50 border-t border-slate-200 dark:border-gray-800 flex justify-end gap-3 shrink-0">
                                <button onClick={onClose} className="px-5 py-2 rounded-lg text-slate-600 dark:text-gray-300 font-bold hover:bg-slate-200 dark:hover:bg-gray-700 transition">取消</button>
                                <button onClick={onConfirm} disabled={isConfirmDisabled} className={`px-5 py-2 rounded-lg text-white dark:text-dark-main font-bold shadow-md transition ${isConfirmDisabled ? 'bg-slate-400 cursor-not-allowed' : btnColor}`}>
                                    {confirmText}
                                </button>
                            </div>
                        </div>
                    </div>
                </ModalPortal>
            );
        };

        const ToastContext = createContext();
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={showToast}>
                    {children}
                    <div className="fixed top-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`flex items-center gap-3 px-6 py-3 rounded-lg bg-white/95 dark:glass-card border-l-4 shadow-lg transform transition-all animate-[slideIn_0.3s_ease-out] ${t.type === 'error' ? 'border-red-500 dark:border-neon-red shadow-md dark:shadow-neon-red text-slate-800 dark:text-red-100' : 'border-cyan-500 dark:border-neon-cyan shadow-md dark:shadow-neon-cyan text-slate-800 dark:text-cyan-100'}`}>
                                {t.type === 'error' ? <ShieldAlert size={20} className="text-red-500 dark:text-neon-red" /> : <CheckCircle2 size={20} className="text-cyan-600 dark:text-neon-cyan" />}
                                <span className="font-medium tracking-wider">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        const useToast = () => useContext(ToastContext);

        const downloadCSV = (filename, content) => {
            const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        };

        // ==========================================
        // 🌟 組件：即時戰情室 (War Room) 
        // ==========================================
        const WarRoom = ({ exam }) => {
            const [studentScores, setStudentScores] = useState([]);
            const [mistakeStats, setMistakeStats] = useState([]);
            const [overallAccuracy, setOverallAccuracy] = useState(0);
            const [isDataLoaded, setIsDataLoaded] = useState(false);
            
            const [selectedMistake, setSelectedMistake] = useState(null);
            const [isFullScreen, setIsFullScreen] = useState(false); 
            const [mistakeFontSize, setMistakeFontSize] = useState('medium'); 

            useEffect(() => {
                if (!exam) return;
                
                const qScores = query(collection(db, 'scores'), where('examId', '==', exam.id));
                const unsubScores = onSnapshot(qScores, (snap) => {
                    const scoreMap = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (!scoreMap[data.studentId] || data.score > scoreMap[data.studentId].score) {
                            scoreMap[data.studentId] = data;
                        }
                    });
                    
                    const sortedScores = Object.values(scoreMap).sort((a, b) => b.score - a.score);
                    setStudentScores(sortedScores);

                    if (sortedScores.length > 0) {
                        const totalAcc = sortedScores.reduce((sum, s) => sum + (s.accuracy || 0), 0);
                        setOverallAccuracy(Math.round(totalAcc / sortedScores.length));
                    } else {
                        setOverallAccuracy(0);
                    }
                    setIsDataLoaded(true);
                });

                const qMistakes = query(collection(db, 'mistakes'), where('examId', '==', exam.id));
                const unsubMistakes = onSnapshot(qMistakes, (snap) => {
                    const mData = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        const qText = data.question;
                        
                        if (!mData[qText]) {
                            mData[qText] = { question: qText, correctText: data.correctText, options: data.options || [], count: 0, selections: {} };
                        }
                        
                        mData[qText].count++;
                        const sel = data.selected || '未作答';
                        mData[qText].selections[sel] = (mData[qText].selections[sel] || 0) + 1;
                    });
                    
                    const sortedMistakes = Object.values(mData).sort((a, b) => b.count - a.count);
                    setMistakeStats(sortedMistakes);
                });

                return () => { unsubScores(); unsubMistakes(); };
            }, [exam?.id]);

            useEffect(() => {
                return () => setIsFullScreen(false);
            }, []);

            if (!isDataLoaded) return <div className="p-10 text-center text-slate-500 animate-pulse">建立戰情連線中...</div>;
            
            if (studentScores.length === 0) return (
                <div className="flex flex-col items-center justify-center p-20 text-slate-500 dark:text-gray-500 fade-in">
                    <Activity size={60} className="mb-4 opacity-20" />
                    <h3 className="text-xl font-bold mb-2">雷達靜默</h3>
                    <p>目前尚未有學生提交本試卷成績，等待作戰數據傳回...</p>
                </div>
            );

            // 🌟 重新建構的戰情室內容區塊 (垂直佈局)
            const renderInnerContent = () => (
                <>
                    {/* 頂部：全班戰況拉鋸戰 */}
                    <div className="bg-white dark:bg-dark-card p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm flex flex-col gap-3 shrink-0">
                        <div className="flex justify-between items-end">
                            <h3 className="font-bold text-slate-800 dark:text-white flex items-center gap-2"><Target size={18} className="text-cyan-600 dark:text-neon-cyan"/> 戰況拉鋸戰 (全班總答對率)</h3>
                            <div className="flex items-center gap-3 md:gap-5">
                                <span className="text-2xl font-black text-slate-800 dark:text-white font-mono">{overallAccuracy}%</span>
                                {!isFullScreen && (
                                    <button onClick={() => setIsFullScreen(true)} className="p-1.5 text-slate-400 hover:text-cyan-600 dark:hover:text-neon-cyan bg-slate-100 hover:bg-cyan-50 dark:bg-gray-800 dark:hover:bg-gray-700 rounded-lg transition" title="進入全螢幕投影模式">
                                        <Maximize2 size={20}/>
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        <div className="h-8 w-full rounded-full overflow-hidden flex bg-red-100 dark:bg-red-900/30 relative shadow-inner">
                            <div className="h-full bg-cyan-500 dark:bg-cyan-600 transition-all duration-1000 ease-out flex items-center justify-end px-3" style={{ width: `${overallAccuracy}%` }}>
                                {overallAccuracy > 10 && <span className="text-xs font-bold text-white drop-shadow-md">正確</span>}
                            </div>
                            <div className="h-full bg-red-500 dark:bg-red-600 transition-all duration-1000 ease-out flex items-center justify-start px-3" style={{ width: `${100 - overallAccuracy}%` }}>
                                {(100 - overallAccuracy) > 10 && <span className="text-xs font-bold text-white drop-shadow-md">錯誤</span>}
                            </div>
                            <div className="absolute top-0 bottom-0 w-2 bg-white/50 blur-sm mix-blend-overlay transition-all duration-1000" style={{ left: `calc(${overallAccuracy}% - 4px)` }}></div>
                        </div>
                    </div>

                    {/* 🌟 版面變更：改為垂直堆疊 (flex-col) 而不是左右並排的 Grid */}
                    <div className="flex flex-col gap-6 flex-1 min-h-0">
                        
                        {/* 中段：即時戰力排行榜 (全寬) */}
                        <div className="bg-white dark:bg-dark-card p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm flex flex-col shrink-0">
                            <h3 className="font-bold text-slate-800 dark:text-white flex items-center gap-2 mb-4 shrink-0"><TrendingUp size={18} className="text-green-500"/> 即時戰力排行榜</h3>
                            <div className={`overflow-y-auto space-y-3 pr-2 ${isFullScreen ? 'max-h-[35vh]' : 'max-h-64'}`}>
                                {studentScores.map((student, idx) => {
                                    let rankColor = "text-slate-400 dark:text-gray-500";
                                    let rankBg = "bg-slate-100 dark:bg-gray-800";
                                    if (idx === 0) { rankColor = "text-amber-500 dark:text-neon-gold"; rankBg = "bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700/50 shadow-[0_0_10px_rgba(255,215,0,0.15)]"; }
                                    else if (idx === 1) { rankColor = "text-slate-400 dark:text-slate-300"; rankBg = "bg-slate-50 dark:bg-slate-800/60 border-slate-300 dark:border-slate-600/50"; }
                                    else if (idx === 2) { rankColor = "text-orange-500 dark:text-orange-400"; rankBg = "bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800/50"; }

                                    return (
                                        <div key={student.studentId} className={`flex items-center gap-4 p-3 md:p-4 rounded-xl border transition-all animate-item ${rankBg} ${idx > 2 ? 'border-slate-100 dark:border-gray-800' : ''}`} style={{animationDelay: `${idx * 0.05}s`}}>
                                            <div className={`flex items-center justify-center w-8 h-8 rounded-full font-black text-lg ${rankColor}`}>
                                                {idx < 3 ? <Award size={24}/> : idx + 1}
                                            </div>
                                            
                                            <div className="flex-1 min-w-0">
                                                <div className="font-bold text-slate-800 dark:text-white truncate text-sm md:text-base">
                                                    {student.studentName}
                                                </div>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <div className="h-1.5 w-24 md:w-32 bg-red-100 dark:bg-red-900/30 rounded-full overflow-hidden shrink-0">
                                                        <div className="h-full bg-cyan-500 transition-all duration-1000" style={{width: `${student.accuracy || 0}%`}}></div>
                                                    </div>
                                                    <span className="text-[10px] text-slate-500 font-mono">{student.accuracy || 0}%</span>
                                                </div>
                                            </div>
                                            
                                            <div className="text-right shrink-0">
                                                <div className="text-xl md:text-2xl font-black text-cyan-600 dark:text-neon-cyan font-mono">{student.score}</div>
                                                <div className="text-[10px] text-slate-400 font-bold uppercase">PTS</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* 底部：易錯題警戒區 (全寬，網格排列充分利用空間) */}
                        <div className="bg-red-50 dark:bg-red-900/10 p-5 rounded-xl border border-red-100 dark:border-red-900/30 shadow-sm flex flex-col flex-1 min-h-0">
                            <h3 className="font-bold text-red-600 dark:text-red-400 flex items-center gap-2 mb-4 shrink-0"><Flame size={18} className="animate-pulse"/> 傷亡最慘重題 (點擊放大檢討)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto pr-2 pb-2">
                                {mistakeStats.length === 0 ? (
                                    <div className="col-span-full text-center text-red-400 dark:text-red-500/60 text-sm mt-6 mb-6">目前無錯題記錄，全班表現優異！</div>
                                ) : mistakeStats.map((stat, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => setSelectedMistake(stat)}
                                        className="bg-white dark:bg-dark-main p-4 rounded-xl border border-red-100 dark:border-red-900/50 flex flex-col justify-between animate-item shadow-sm cursor-pointer hover:border-red-400 hover:shadow-md transition-all group active:scale-95" 
                                        style={{animationDelay: `${idx * 0.1}s`}}
                                        title="點擊放大檢討此題"
                                    >
                                        <div className="text-sm md:text-base font-bold text-slate-800 dark:text-gray-200 line-clamp-3 leading-snug group-hover:text-red-500 transition mb-3">
                                            {stat.question}
                                        </div>
                                        <div className="flex justify-between items-center border-t border-slate-100 dark:border-gray-800 pt-3 mt-auto">
                                            <span className="text-[10px] text-slate-500 dark:text-gray-400 bg-slate-100 dark:bg-gray-800 px-2 py-0.5 rounded flex items-center gap-1 group-hover:bg-red-100 dark:group-hover:bg-red-900/30 transition font-bold"><BarChart3 size={12}/> 解析</span>
                                            <div className="text-xs font-bold text-red-600 dark:text-red-400 flex items-center gap-1 bg-red-100 dark:bg-red-900/30 px-2 py-1 rounded-md">
                                                <Users size={14}/> {stat.count} 人答錯
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </>
            );

            return (
                <>
                    {isFullScreen ? (
                        <ModalPortal>
                            <div className="fixed inset-0 z-[110] bg-slate-50 dark:bg-dark-main overflow-y-auto p-4 md:p-8 flex flex-col fade-in">
                                <div className="max-w-7xl mx-auto w-full flex-1 flex flex-col gap-6">
                                    <div className="flex justify-between items-center shrink-0 bg-white dark:bg-dark-card p-4 md:p-6 rounded-2xl border border-slate-200 dark:border-gray-700 shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <div className="p-3 bg-cyan-100 dark:bg-cyan-900/40 rounded-xl">
                                                <Activity className="text-cyan-600 dark:text-cyan-400" size={28}/>
                                            </div>
                                            <div>
                                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white leading-tight">{exam.title}</h2>
                                                <p className="text-sm text-slate-500 dark:text-gray-400 font-bold tracking-widest mt-1">即時戰情室 (投影模式)</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setIsFullScreen(false)} className="bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 text-red-500 hover:text-red-600 dark:text-red-400 p-3 md:p-4 rounded-full transition shadow-sm border border-red-100 dark:border-red-900/50" title="關閉全螢幕">
                                            <X size={28}/>
                                        </button>
                                    </div>
                                    {renderInnerContent()}
                                </div>
                            </div>
                        </ModalPortal>
                    ) : (
                        <div className="flex flex-col gap-6 fade-in relative pb-10 h-full">
                            {renderInnerContent()}
                        </div>
                    )}

                    {selectedMistake && (
                        <ModalPortal>
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-2 md:p-6 bg-slate-900/90 dark:bg-black/90 backdrop-blur-md fade-in">
                                <div className="bg-white dark:bg-dark-card w-[96vw] h-[96vh] max-w-none rounded-3xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                                    
                                    <div className="px-4 md:px-10 py-4 md:py-6 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50 shrink-0">
                                        <h3 className="text-xl md:text-3xl font-bold text-slate-800 dark:text-white flex items-center gap-2 md:gap-3"><Flame className="text-red-500 hidden sm:block" size={32}/> 錯題深度解析</h3>
                                        
                                        <div className="flex items-center gap-3 md:gap-6">
                                            <div className="flex bg-slate-200 dark:bg-gray-700 rounded-lg p-1 shadow-inner">
                                                <button onClick={() => setMistakeFontSize('small')} className={`px-3 md:px-4 py-1.5 rounded-md text-xs md:text-sm font-bold transition-all ${mistakeFontSize === 'small' ? 'bg-white dark:bg-gray-600 shadow-sm text-cyan-600 dark:text-neon-cyan' : 'text-slate-500 dark:text-gray-400 hover:text-slate-700 dark:hover:text-gray-200'}`}>小</button>
                                                <button onClick={() => setMistakeFontSize('medium')} className={`px-3 md:px-4 py-1.5 rounded-md text-xs md:text-sm font-bold transition-all ${mistakeFontSize === 'medium' ? 'bg-white dark:bg-gray-600 shadow-sm text-cyan-600 dark:text-neon-cyan' : 'text-slate-500 dark:text-gray-400 hover:text-slate-700 dark:hover:text-gray-200'}`}>中</button>

                                                    <textarea

            const showToast = useToast();

            const handleUpdatePassword = async () => {
                if(newPassword.length < 6) return showToast("至少 6 字元", "error");
                try {
                    await updatePassword(user, newPassword);
                    setIsPwdModalOpen(false);
                    showToast("更新成功");
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showToast("安全考量：若登入已久請先登出再登入後修改", "error");
                    else showToast("密碼更新失敗：" + error.message, "error");
                }
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    <header className="glass-card border-b-0 border-cyan-500/20 dark:border-neon-cyan/20 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <Zap className="text-cyan-600 dark:text-neon-cyan" size={24} />
                            <h1 className="text-xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 dark:from-white dark:to-gray-400">系統中控台</h1>
                            <span className="text-xs border border-cyan-500/30 text-cyan-700 dark:text-cyan-400 px-2 py-0.5 rounded-full ml-2">v2.0 Soft-Light</span>
                        </div>
                        <div className="flex items-center gap-2 md:gap-4">
                            <a href="readme.html" target="_blank" rel="noopener noreferrer" className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400" title="系統部署與轉移指南">
                                <HelpCircle size={20} />
                            </a>
                            <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400">
                                {isDarkMode ? <Sun size={20} className="hover:text-yellow-400" /> : <Moon size={20} className="hover:text-indigo-600" />}
                            </button>
                            <span className="text-sm text-slate-500 dark:text-gray-400 hidden md:inline border-l border-slate-300 dark:border-gray-700 pl-4">指揮官：{user.email}</span>
                            <button onClick={() => setIsPwdModalOpen(true)} className="flex items-center gap-2 text-sm text-slate-600 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-neon-cyan transition px-3 py-1.5 rounded-lg border border-transparent hover:border-cyan-200 dark:hover:border-cyan-900/50 hover:bg-cyan-50 dark:hover:bg-cyan-900/20" title="修改密碼"><Key size={16}/><span className="hidden lg:inline">修改密碼</span></button>
                            <button onClick={() => signOut(auth)} className="flex items-center gap-2 text-sm text-slate-600 dark:text-gray-400 hover:text-red-500 dark:hover:text-neon-red transition px-3 py-1.5 rounded-lg border border-transparent hover:border-red-200 dark:hover:border-red-900/50 hover:bg-red-50 dark:hover:bg-red-900/20"><LogOut size={16}/> 登出連線</button>
                        </div>
                    </header>

                    <main className="flex-1 container mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6 h-[calc(100vh-76px)]">
                        <aside className="w-full md:w-48 lg:w-56 shrink-0 flex flex-col gap-2">
                            <button onClick={()=>setView('classes')} className={`p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${view==='classes' ? 'bg-blue-100 text-blue-700 border border-blue-300 shadow-sm dark:bg-neon-blue/20 dark:text-neon-blue dark:border-neon-blue/50 dark:shadow-neon-blue' : 'glass-card text-slate-500 dark:text-gray-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-gray-800'}`}>
                                <Users size={20}/> 班級管理
                            </button>
                            <button onClick={()=>setView('exams')} className={`p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${view==='exams' ? 'bg-cyan-100 text-cyan-700 border border-cyan-300 shadow-sm dark:bg-neon-cyan/20 dark:text-neon-cyan dark:border-neon-cyan/50 dark:shadow-neon-cyan' : 'glass-card text-slate-500 dark:text-gray-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-gray-800'}`}>
                                <BookOpen size={20}/> 試卷兵工廠
                            </button>
                        </aside>
                        
                        <section className="flex-1 min-h-0 relative">
                            {view === 'classes' && <ClassManager user={user} />}
                            {view === 'exams' && <ExamFactory user={user} />}
                        </section>
                    </main>

                    <BaseModal
                        isOpen={isPwdModalOpen}
                        onClose={() => setIsPwdModalOpen(false)}
                        title="變更存取金鑰 (密碼)"
                        icon={Key}
                        confirmText="確認變更"
                        onConfirm={handleUpdatePassword}
                    >
                        <div className="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50 text-amber-700 dark:text-amber-400 text-xs p-3 rounded-lg mb-4">
                            💡 提示：基於安全防護，如果您已經登入一段時間，系統可能會拒絕修改密碼。遇到此情況請先登出並重新登入即可。
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">請輸入新密碼 (至少 6 個字元)</label>
                            <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" placeholder="******" />
                        </div>
                    </BaseModal>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [checking, setChecking] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(false);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const toggleTheme = () => setIsDarkMode(!isDarkMode);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setChecking(false);
                });
                return () => unsubscribe();
            }, []);

            if (checking) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-dark-main">
                    <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-cyan-600 dark:border-neon-cyan shadow-md dark:shadow-neon-cyan"></div>
                </div>
            );

            return (
                <ToastProvider>
                    {user ? <Dashboard user={user} isDarkMode={isDarkMode} toggleTheme={toggleTheme} /> : <AuthScreen isDarkMode={isDarkMode} toggleTheme={toggleTheme} />}
                </ToastProvider>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
