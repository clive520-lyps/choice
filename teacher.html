<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧測驗 | 老師中控台</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind 自訂設定 (科技感色彩) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: { cyan: '#00E5FF', blue: '#2979FF', red: '#FF1744' },
                        dark: { main: '#0B0F19', card: '#111827', border: '#1F2937' }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 10px rgba(0, 229, 255, 0.5), 0 0 20px rgba(0, 229, 255, 0.3)',
                        'neon-cyan-hover': '0 0 15px rgba(0, 229, 255, 0.8), 0 0 30px rgba(0, 229, 255, 0.5)',
                        'neon-blue': '0 0 10px rgba(41, 121, 255, 0.5)',
                        'neon-red': '0 0 10px rgba(255, 23, 68, 0.5)'
                    }
                }
            }
        }
    </script>

    <style>
        /* 日光/暗黑模式 CSS 變數定義 */
        :root {
            /* 柔和的明亮模式 (日光航艦) */
            --bg-color: #F8FAFC; /* Slate-50 */
            --text-main: #0F172A; /* Slate-900 */
            --grid-color: rgba(15, 23, 42, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(203, 213, 225, 0.8); /* Slate-300 */
            --scrollbar-track: #F8FAFC;
            --scrollbar-thumb: #CBD5E1;
        }
        .dark {
            /* 經典科幻暗黑模式 */
            --bg-color: #0B0F19;
            --text-main: #E5E7EB;
            --grid-color: rgba(0, 229, 255, 0.03);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(31, 41, 55, 0.8);
            --scrollbar-track: #0B0F19;
            --scrollbar-thumb: #1F2937;
        }

        /* 未來感網格背景與滾動條美化 */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: background-color 0.3s, color 0.3s, background-image 0.3s;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00E5FF; }
        
        /* 玻璃擬物化卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: background 0.3s, border 0.3s;
        }
    </style>

    <!-- Import Maps 設定 React 與 Firebase -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    
    <!-- 引入 Babel 用於編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Users, BookOpen, LogOut, Upload, Download, Trash2, Plus, Zap, Settings, ShieldAlert, CheckCircle2, Sun, Moon, Edit, Clipboard, X, Key } from 'lucide-react';
        
        // --- Firebase 初始化區塊 (Zero-Config) ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, updatePassword } from 'firebase/auth';
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, onSnapshot, query, where, orderBy, getDocs } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyB9NJXQwdKweStTbATahldDgvtbuGclo34",
            authDomain: "test-reading-71839.firebaseapp.com",
            projectId: "test-reading-71839",
            storageBucket: "test-reading-71839.firebasestorage.app",
            messagingSenderId: "499192051513",
            appId: "1:499192051513:web:777c873e938464e2995ae8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 全域 Toast 系統 (高科技提示) ---
        const ToastContext = createContext();
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={showToast}>
                    {children}
                    <div className="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`flex items-center gap-3 px-6 py-3 rounded-lg bg-white/95 dark:glass-card border-l-4 shadow-lg transform transition-all animate-[slideIn_0.3s_ease-out] ${t.type === 'error' ? 'border-red-500 dark:border-neon-red shadow-md dark:shadow-neon-red text-slate-800 dark:text-red-100' : 'border-cyan-500 dark:border-neon-cyan shadow-md dark:shadow-neon-cyan text-slate-800 dark:text-cyan-100'}`}>
                                {t.type === 'error' ? <ShieldAlert size={20} className="text-red-500 dark:text-neon-red" /> : <CheckCircle2 size={20} className="text-cyan-600 dark:text-neon-cyan" />}
                                <span className="font-medium tracking-wider">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        const useToast = () => useContext(ToastContext);

        // --- 工具函數：CSV 下載與解析 ---
        const downloadCSV = (filename, content) => {
            const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        };

        // --- 組件：登入與註冊介面 ---
        const AuthScreen = ({ isDarkMode, toggleTheme }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            
            const [isResetModalOpen, setIsResetModalOpen] = useState(false);
            const [resetEmail, setResetEmail] = useState('');
            const [resetLoading, setResetLoading] = useState(false);

            const showToast = useToast();

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                        showToast("系統登入成功，歡迎指揮官", "success");
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        showToast("系統註冊完成，核心權限已開通", "success");
                    }
                } catch (error) {
                    showToast(error.message, "error");
                }
                setLoading(false);
            };

            const handlePasswordReset = async () => {
                if (!resetEmail.trim()) {
                    showToast("請輸入您註冊的 Email", "error");
                    return;
                }
                setResetLoading(true);
                try {
                    await sendPasswordResetEmail(auth, resetEmail);
                    showToast("密碼重設信件已發送，請至信箱收信並重設密碼", "success");
                    setIsResetModalOpen(false);
                    setResetEmail('');
                } catch (error) {
                    showToast("發送失敗: " + error.message, "error");
                }
                setResetLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative">
                    <button onClick={toggleTheme} className="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-200 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400">
                        {isDarkMode ? <Sun size={24} className="hover:text-yellow-400" /> : <Moon size={24} className="hover:text-indigo-600" />}
                    </button>
                    
                    <div className="glass-card p-10 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 dark:via-neon-cyan to-transparent opacity-50"></div>
                        
                        <div className="text-center mb-10">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-100 dark:bg-dark-card border border-cyan-500/30 dark:border-neon-cyan/30 shadow-md dark:shadow-neon-cyan mb-4">
                                <Zap className="text-cyan-600 dark:text-neon-cyan" size={40} />
                            </div>
                            <h1 className="text-3xl font-black tracking-widest text-slate-900 dark:text-white">智慧測驗系統</h1>
                            <p className="text-cyan-700 dark:text-cyan-500/80 mt-2 font-mono text-sm uppercase tracking-widest">Teacher Terminal</p>
                        </div>

                        <form onSubmit={handleAuth} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-slate-600 dark:text-gray-400 mb-2">管理員信箱 (Email)</label>
                                <input type="email" required className="w-full bg-slate-50 dark:bg-dark-card/50 border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan focus:ring-1 focus:ring-cyan-500 dark:focus:ring-neon-cyan transition" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-600 dark:text-gray-400 mb-2">存取金鑰 (Password)</label>
                                <input type="password" required className="w-full bg-slate-50 dark:bg-dark-card/50 border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan focus:ring-1 focus:ring-cyan-500 dark:focus:ring-neon-cyan transition" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>
                            
                            {isLogin && (
                                <div className="text-right mt-1">
                                    <button type="button" onClick={() => { setResetEmail(email); setIsResetModalOpen(true); }} className="text-xs text-cyan-600 dark:text-cyan-400 hover:underline">
                                        忘記存取金鑰？
                                    </button>
                                </div>
                            )}

                            <button type="submit" disabled={loading} className="w-full bg-cyan-600 hover:bg-cyan-700 dark:bg-cyan-600 dark:hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-lg shadow-md dark:shadow-neon-cyan dark:hover:shadow-neon-cyan-hover transition-all duration-300 flex justify-center items-center mt-2">
                                {loading ? <span className="animate-pulse">連線中...</span> : (isLogin ? '啟動系統' : '註冊權限')}
                            </button>
                        </form>
                        
                        <div className="mt-6 text-center">
                            <button onClick={() => setIsLogin(!isLogin)} className="text-sm text-slate-500 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-neon-cyan transition">
                                {isLogin ? '尚未擁有權限？點此註冊' : '已有管理權限？點此登入'}
                            </button>
                        </div>
                    </div>

                    {isResetModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm fade-in">
                            <div className="bg-white dark:bg-dark-card w-full max-w-sm rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                                <div className="px-6 py-4 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50">
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2"><Key size={20} className="text-cyan-600 dark:text-neon-cyan"/> 重設存取金鑰</h3>
                                    <button onClick={() => setIsResetModalOpen(false)} className="text-slate-400 hover:text-slate-700 dark:hover:text-white"><X size={24}/></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <p className="text-sm text-slate-600 dark:text-gray-400">請輸入您註冊時使用的 Email，系統將發送密碼重設連結至您的信箱。</p>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">管理員信箱</label>
                                        <input type="email" value={resetEmail} onChange={e => setResetEmail(e.target.value)} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" placeholder="example@email.com" />
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-slate-50 dark:bg-gray-800/50 border-t border-slate-200 dark:border-gray-800 flex justify-end gap-3">
                                    <button onClick={() => setIsResetModalOpen(false)} className="px-5 py-2 rounded-lg text-slate-600 dark:text-gray-300 font-bold hover:bg-slate-200 dark:hover:bg-gray-700 transition">取消</button>
                                    <button onClick={handlePasswordReset} disabled={resetLoading} className="px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-700 dark:bg-neon-cyan dark:hover:bg-cyan-400 text-white dark:text-dark-main font-bold shadow-md transition">
                                        {resetLoading ? '發送中...' : '發送重設信'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 組件：班級與學生管理 ---
        const ClassManager = ({ user }) => {
            const [classes, setClasses] = useState([]);
            const [students, setStudents] = useState([]);
            const [newClassName, setNewClassName] = useState('');
            const [selectedClass, setSelectedClass] = useState(null);
            
            const [editingStudent, setEditingStudent] = useState(null);
            
            const showToast = useToast();

            useEffect(() => {
                const q = query(collection(db, 'classes'), where('teacherId', '==', user.uid));
                const unsub = onSnapshot(q, (snapshot) => {
                    setClasses(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b)=>b.createdAt - a.createdAt));
                });
                return () => unsub();
            }, [user.uid]);

            useEffect(() => {
                if (!selectedClass) { setStudents([]); return; }
                const q = query(collection(db, 'students'), where('classId', '==', selectedClass.id));
                const unsub = onSnapshot(q, (snapshot) => {
                    let list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    list.sort((a,b) => parseInt(a.seatNo) - parseInt(b.seatNo));
                    setStudents(list);
                });
                return () => unsub();
            }, [selectedClass]);

            const addClass = async () => {
                if (!newClassName.trim()) return;
                try {
                    await addDoc(collection(db, 'classes'), { name: newClassName, teacherId: user.uid, createdAt: Date.now() });
                    setNewClassName('');
                    showToast("班級建立成功");
                } catch (e) { showToast("建立失敗: " + e.message, "error"); }
            };

            const deleteClass = async (classId) => {
                if (!confirm("警告：確定要刪除此班級嗎？\n⚠️ 此操作將一併「刪除該班級的所有學生」，以及他們所有的「考試與錯題紀錄」，且無法復原！")) return;
                
                try {
                    const studentsQuery = query(collection(db, 'students'), where('classId', '==', classId));
                    const studentDocs = await getDocs(studentsQuery);
                    
                    const scoresQuery = query(collection(db, 'scores'), where('classId', '==', classId));
                    const scoreDocs = await getDocs(scoresQuery);
                    
                    const mistakesQuery = query(collection(db, 'mistakes'), where('classId', '==', classId));
                    const mistakeDocs = await getDocs(mistakesQuery);

                    const deletePromises = [];
                    studentDocs.docs.forEach(d => deletePromises.push(deleteDoc(d.ref)));
                    scoreDocs.docs.forEach(d => deletePromises.push(deleteDoc(d.ref)));
                    mistakeDocs.docs.forEach(d => deletePromises.push(deleteDoc(d.ref)));
                    
                    deletePromises.push(deleteDoc(doc(db, 'classes', classId)));

                    await Promise.all(deletePromises);

                    if(selectedClass?.id === classId) setSelectedClass(null);
                    showToast("班級及其所有關聯資料（學生、成績）已徹底刪除", "success");
                } catch (error) {
                    showToast("刪除班級失敗：" + error.message, "error");
                }
            };

            const deleteStudent = async (studentId) => {
                if (!confirm("確定要刪除這位學生嗎？相關考試紀錄將會一併刪除。")) return;
                try {
                    const scoresQuery = query(collection(db, 'scores'), where('studentId', '==', studentId));
                    const scoreDocs = await getDocs(scoresQuery);
                    const mistakesQuery = query(collection(db, 'mistakes'), where('studentId', '==', studentId));
                    const mistakeDocs = await getDocs(mistakesQuery);
                    
                    const deletePromises = [deleteDoc(doc(db, 'students', studentId))];
                    scoreDocs.docs.forEach(d => deletePromises.push(deleteDoc(d.ref)));
                    mistakeDocs.docs.forEach(d => deletePromises.push(deleteDoc(d.ref)));
                    
                    await Promise.all(deletePromises);
                    showToast("學生資料與相關紀錄已徹底刪除");
                } catch (error) {
                    showToast("刪除失敗：" + error.message, "error");
                }
            };

            const saveEditStudent = async () => {
                if (!editingStudent.name.trim() || !editingStudent.seatNo.trim()) {
                    showToast("座號與姓名不可為空", "error");
                    return;
                }
                try {
                    await updateDoc(doc(db, 'students', editingStudent.id), {
                        seatNo: editingStudent.seatNo,
                        name: editingStudent.name
                    });
                    setEditingStudent(null);
                    showToast("學生資料已更新", "success");
                } catch (error) {
                    showToast("更新失敗: " + error.message, "error");
                }
            };

            const handleStudentCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const lines = text.split('\n').filter(line => line.trim() !== '');
                    let successCount = 0;
                    
                    for (let i = 1; i < lines.length; i++) { 
                        const [seatNo, name] = lines[i].split(',').map(s => s.trim());
                        if (seatNo && name) {
                            await addDoc(collection(db, 'students'), {
                                classId: selectedClass.id, teacherId: user.uid,
                                seatNo, name, createdAt: Date.now()
                            });
                            successCount++;
                        }
                    }
                    showToast(`批次匯入完成，共新增 ${successCount} 筆資料`, "success");
                    e.target.value = ''; 
                };
                reader.readAsText(file);
            };

            const downloadStudentSample = () => {
                downloadCSV("學生匯入範例.csv", "座號,姓名\n1,王小明\n2,陳小美\n3,張大華");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in h-full">
                    {/* 左側：班級列表 */}
                    <div className="glass-card p-6 rounded-2xl flex flex-col h-full border-t-4 border-t-blue-500 dark:border-t-neon-blue">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-6 text-slate-900 dark:text-white"><Users className="text-blue-600 dark:text-neon-blue" /> 班級中樞</h2>
                        <div className="flex gap-2 mb-6">
                            <input type="text" placeholder="輸入班級名稱 (如: 101)" className="flex-1 bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 rounded-lg px-3 py-2 text-slate-900 dark:text-white focus:border-blue-500 dark:focus:border-neon-blue outline-none" value={newClassName} onChange={e=>setNewClassName(e.target.value)} />
                            <button onClick={addClass} className="bg-blue-100 hover:bg-blue-200 dark:bg-neon-blue/20 dark:hover:bg-neon-blue/40 text-blue-700 dark:text-neon-blue px-4 rounded-lg font-bold transition flex items-center gap-1 border border-blue-200 dark:border-neon-blue/50"><Plus size={18}/> 新增</button>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                            {classes.length === 0 && <p className="text-slate-500 dark:text-gray-500 text-center py-10">尚無班級，請先新增</p>}
                            {classes.map(c => (
                                <div key={c.id} onClick={() => setSelectedClass(c)} className={`p-4 rounded-xl cursor-pointer transition flex justify-between items-center group border ${selectedClass?.id === c.id ? 'bg-blue-50 border-blue-400 shadow-sm dark:bg-neon-blue/10 dark:border-neon-blue dark:shadow-neon-blue text-slate-900 dark:text-white' : 'bg-white dark:bg-dark-main border-slate-200 dark:border-gray-700 hover:border-slate-400 dark:hover:border-gray-500 text-slate-700 dark:text-gray-300'}`}>
                                    <span className="font-bold text-lg">{c.name} 班</span>
                                    <button onClick={(e) => { e.stopPropagation(); deleteClass(c.id); }} className="text-slate-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-neon-red opacity-0 group-hover:opacity-100 transition"><Trash2 size={18} /></button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 右側：學生名單 */}
                    <div className="lg:col-span-2 glass-card p-6 rounded-2xl flex flex-col h-full relative">
                        {!selectedClass ? (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 dark:text-gray-500">
                                <Users size={60} className="mb-4 opacity-20" />
                                <p>請從左側選擇一個班級以管理學生</p>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-blue-700 dark:text-neon-blue">{selectedClass.name} 班 - 學生名單</h2>
                                    <div className="flex gap-3">
                                        <button onClick={downloadStudentSample} className="flex items-center gap-1 text-sm bg-slate-100 hover:bg-slate-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-slate-700 dark:text-gray-300 px-3 py-2 rounded-lg border border-slate-300 dark:border-gray-600 transition"><Download size={16}/> 範例下載</button>
                                        <label className="flex items-center gap-1 text-sm bg-cyan-100 hover:bg-cyan-200 dark:bg-cyan-900/40 dark:hover:bg-cyan-900/80 text-cyan-700 dark:text-neon-cyan px-3 py-2 rounded-lg border border-cyan-300 dark:border-neon-cyan/50 cursor-pointer transition dark:shadow-[0_0_10px_rgba(0,229,255,0.2)]">
                                            <Upload size={16}/> 批次匯入
                                            <input type="file" accept=".csv" className="hidden" onChange={handleStudentCSVUpload} />
                                        </label>
                                    </div>
                                </div>
                                
                                <div className="bg-white dark:bg-dark-main rounded-xl border border-slate-200 dark:border-gray-700 flex-1 overflow-hidden flex flex-col">
                                    <div className="grid grid-cols-4 bg-slate-100 dark:bg-gray-800/50 p-4 text-sm font-bold text-slate-600 dark:text-gray-400 border-b border-slate-200 dark:border-gray-700">
                                        <div className="col-span-1">座號</div>
                                        <div className="col-span-2">姓名</div>
                                        <div className="col-span-1 text-right">操作</div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto">
                                        {students.length === 0 ? <div className="p-10 text-center text-slate-500 dark:text-gray-500">目前無學生資料，請使用批次匯入</div> :
                                            students.map(s => (
                                                <div key={s.id} className="grid grid-cols-4 p-4 border-b border-slate-100 dark:border-gray-800 items-center hover:bg-slate-50 dark:hover:bg-gray-800/30 transition text-slate-800 dark:text-gray-200">
                                                    <div className="col-span-1 font-mono text-cyan-700 dark:text-neon-cyan font-bold">{s.seatNo}</div>
                                                    <div className="col-span-2 font-medium">{s.name}</div>
                                                    <div className="col-span-1 text-right flex justify-end gap-2">
                                                        <button onClick={()=>setEditingStudent({ ...s })} className="text-slate-400 dark:text-gray-500 hover:text-blue-600 dark:hover:text-neon-blue transition p-1"><Edit size={18}/></button>
                                                        <button onClick={()=>deleteStudent(s.id)} className="text-slate-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-neon-red transition p-1"><Trash2 size={18}/></button>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* 學生編輯 Modal (浮動視窗) - 移出 glass-card 避免 filter 影響 fixed 定位 */}
                        {editingStudent && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm fade-in">
                                <div className="bg-white dark:bg-dark-card w-full max-w-sm rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                                    <div className="px-6 py-4 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50">
                                        <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2"><Edit size={20} className="text-blue-600 dark:text-neon-blue"/> 編輯學生資料</h3>
                                        <button onClick={() => setEditingStudent(null)} className="text-slate-400 hover:text-slate-700 dark:hover:text-white"><X size={24}/></button>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">座號</label>
                                            <input type="text" value={editingStudent.seatNo} onChange={e => setEditingStudent({...editingStudent, seatNo: e.target.value})} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 dark:focus:border-neon-blue transition" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">姓名</label>
                                            <input type="text" value={editingStudent.name} onChange={e => setEditingStudent({...editingStudent, name: e.target.value})} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 dark:focus:border-neon-blue transition" />
                                        </div>
                                    </div>
                                    <div className="px-6 py-4 bg-slate-50 dark:bg-gray-800/50 border-t border-slate-200 dark:border-gray-800 flex justify-end gap-3">
                                        <button onClick={() => setEditingStudent(null)} className="px-5 py-2 rounded-lg text-slate-600 dark:text-gray-300 font-bold hover:bg-slate-200 dark:hover:bg-gray-700 transition">取消</button>
                                        <button onClick={saveEditStudent} className="px-5 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 dark:bg-neon-blue dark:hover:bg-blue-400 text-white dark:text-dark-main font-bold shadow-md transition">儲存變更</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 組件：試卷兵工廠 (核心) ---
        const ExamFactory = ({ user }) => {
            const [exams, setExams] = useState([]);
            const [newExamTitle, setNewExamTitle] = useState('');
            const [selectedExam, setSelectedExam] = useState(null);
            
            // 🌟 預設改為 'settings'，且邏輯徹底分開
            const [examTab, setExamTab] = useState('settings'); 
            const [pasteText, setPasteText] = useState('');
            
            // 試卷名稱編輯狀態
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            const [editTitleValue, setEditTitleValue] = useState('');
            
            // 單題編輯/新增的 Modal 狀態
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editIndex, setEditIndex] = useState(null);
            const [modalData, setModalData] = useState({ question: '', correct: '', options: ['', '', '', ''] });
            
            const showToast = useToast();

            // 監聽試卷資料
            useEffect(() => {
                const q = query(collection(db, 'exams'), where('teacherId', '==', user.uid));
                const unsub = onSnapshot(q, (snapshot) => {
                    const loadedExams = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b)=>b.createdAt - a.createdAt);
                    setExams(loadedExams);
                    // 同步更新當前選取的試卷資料
                    if (selectedExam) {
                        const updatedSelected = loadedExams.find(e => e.id === selectedExam.id);
                        if (updatedSelected) setSelectedExam(updatedSelected);
                    }
                });
                return () => unsub();
            }, [user.uid, selectedExam?.id]);

            // 當切換試卷時，關閉標題編輯狀態
            useEffect(() => {
                setIsEditingTitle(false);
            }, [selectedExam?.id]);

            const createExam = async () => {
                if (!newExamTitle.trim()) return;
                try {
                    await addDoc(collection(db, 'exams'), {
                        title: newExamTitle, teacherId: user.uid,
                        isPublished: false, drawCount: 20, allowMultipleAttempts: true,
                        questions: [], createdAt: Date.now()
                    });
                    setNewExamTitle(''); showToast("試卷架構已建立，請繼續建立題庫");
                } catch (e) { showToast(e.message, "error"); }
            };

            const deleteExam = async (examId) => {
                if(!confirm("確定要銷毀此試卷嗎？此操作不可逆！")) return;
                await deleteDoc(doc(db, 'exams', examId));
                if(selectedExam?.id === examId) setSelectedExam(null);
                showToast("試卷已銷毀", "success");
            };

            const togglePublish = async (exam) => {
                await updateDoc(doc(db, 'exams', exam.id), { isPublished: !exam.isPublished });
                showToast(exam.isPublished ? "試卷已下架" : "試卷已成功派送至學生端！", "success");
            };

            const updateExamSetting = async (field, value) => {
                if(!selectedExam) return;
                await updateDoc(doc(db, 'exams', selectedExam.id), { [field]: value });
                showToast("設定已同步儲存");
            };

            const saveExamTitle = async () => {
                if (!editTitleValue.trim()) {
                    showToast("試卷名稱不可為空", "error");
                    return;
                }
                try {
                    await updateDoc(doc(db, 'exams', selectedExam.id), { title: editTitleValue.trim() });
                    setIsEditingTitle(false);
                    showToast("試卷名稱已更新", "success");
                } catch (error) {
                    showToast("名稱更新失敗: " + error.message, "error");
                }
            };

            // 處理 CSV 上傳
            const handleQuestionCSVUpload = (e) => {
                if(!selectedExam) return;
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const lines = text.split('\n').filter(line => line.trim() !== '');
                    const newQuestions = [];
                    
                    for (let i = 1; i < lines.length; i++) {
                        const cols = lines[i].split(',').map(s => s.trim());
                        if (cols.length >= 6) {
                            newQuestions.push({
                                question: cols[0], correct: cols[1],
                                options: [cols[2], cols[3], cols[4], cols[5]]
                            });
                        }
                    }
                    if(newQuestions.length > 0) {
                        await updateDoc(doc(db, 'exams', selectedExam.id), { questions: newQuestions });
                        showToast(`題庫匯入成功，共 ${newQuestions.length} 題`, "success");
                    } else {
                        showToast("無法解析題庫，請檢查格式", "error");
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            };

            // 處理 Excel 直接貼上
            const handleExcelPaste = async (overwrite = false) => {
                if(!pasteText.trim()) {
                    showToast("請先在輸入框貼上 Excel 內容", "error");
                    return;
                }
                const lines = pasteText.trim().split('\n');
                const newQuestions = [];
                
                for (let line of lines) {
                    let cols = line.split('\t').map(s => s.trim());
                    if (cols.length < 6) {
                        cols = line.split(',').map(s => s.trim());
                    }
                    if (cols.length >= 6 && cols[0] !== '題目' && cols[0] !== '') { 
                        newQuestions.push({
                            question: cols[0], correct: cols[1],
                            options: [cols[2], cols[3], cols[4], cols[5]]
                        });
                    }
                }
                
                if(newQuestions.length > 0) {
                    const updatedQuestions = overwrite ? newQuestions : [...(selectedExam.questions || []), ...newQuestions];
                    await updateDoc(doc(db, 'exams', selectedExam.id), { questions: updatedQuestions });
                    showToast(overwrite ? `成功覆寫並匯入 ${newQuestions.length} 題` : `成功解析並附加 ${newQuestions.length} 題`, "success");
                    setPasteText(''); 
                } else {
                    showToast("無法解析，請確保包含：題目、答案、選項1~4", "error");
                }
            };

            // 開啟單題編輯/新增 Modal
            const openModal = (index = null, qData = null) => {
                if (index !== null && qData) {
                    setEditIndex(index);
                    setModalData({ ...qData });
                } else {
                    setEditIndex(null);
                    setModalData({ question: '', correct: '', options: ['', '', '', ''] });
                }
                setIsModalOpen(true);
            };

            // 儲存單題
            const saveSingleQuestion = async () => {
                if(!modalData.question || !modalData.correct || modalData.options.some(o => !o.trim())) {
                    showToast("請完整填寫題目、答案與所有選項", "error");
                    return;
                }
                const currentQs = [...(selectedExam.questions || [])];
                if (editIndex !== null) {
                    currentQs[editIndex] = modalData; 
                } else {
                    currentQs.push(modalData); 
                }
                await updateDoc(doc(db, 'exams', selectedExam.id), { questions: currentQs });
                setIsModalOpen(false);
                showToast(editIndex !== null ? "題目編輯成功" : "單題新增成功", "success");
            };

            // 刪除單題
            const deleteSingleQuestion = async (index) => {
                if(!confirm("確定要刪除這道題目嗎？")) return;
                const currentQs = [...(selectedExam.questions || [])];
                currentQs.splice(index, 1);
                await updateDoc(doc(db, 'exams', selectedExam.id), { questions: currentQs });
                showToast("題目已刪除");
            };

            const downloadExamSample = () => {
                downloadCSV("試卷題庫範例.csv", "題目,正確答案(輸入選項內容或1~4數字),選項1,選項2,選項3,選項4\n「躊躇」的意思是什麼？,1,猶豫不決,非常快樂,走路很快,大聲說話\n蘋果的英文是什麼？,Apple,Banana,Apple,Orange,Grape");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in h-full relative">
                    {/* 左側：試卷庫 */}
                    <div className="glass-card p-6 rounded-2xl flex flex-col h-full border-t-4 border-t-cyan-500 dark:border-t-neon-cyan">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-6 text-slate-900 dark:text-white"><BookOpen className="text-cyan-600 dark:text-neon-cyan" /> 試卷庫</h2>
                        <div className="flex gap-2 mb-6">
                            <input type="text" placeholder="新建試卷名稱" className="flex-1 bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 rounded-lg px-3 py-2 text-slate-900 dark:text-white focus:border-cyan-500 dark:focus:border-neon-cyan outline-none" value={newExamTitle} onChange={e=>setNewExamTitle(e.target.value)} />
                            <button onClick={createExam} className="bg-cyan-100 hover:bg-cyan-200 dark:bg-neon-cyan/20 dark:hover:bg-neon-cyan/40 text-cyan-700 dark:text-neon-cyan px-4 rounded-lg font-bold transition flex items-center gap-1 border border-cyan-200 dark:border-neon-cyan/50"><Plus size={18}/> 建立</button>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                            {exams.length === 0 && <p className="text-slate-500 dark:text-gray-500 text-center py-10">資料庫空虛，請建立試卷</p>}
                            {exams.map(ex => (
                                <div key={ex.id} onClick={() => setSelectedExam(ex)} className={`p-4 rounded-xl cursor-pointer transition flex flex-col gap-2 border group ${selectedExam?.id === ex.id ? 'bg-cyan-50 border-cyan-400 shadow-sm dark:bg-neon-cyan/10 dark:border-neon-cyan dark:shadow-neon-cyan text-slate-900 dark:text-white' : 'bg-white dark:bg-dark-main border-slate-200 dark:border-gray-700 hover:border-slate-400 dark:hover:border-gray-500 text-slate-700 dark:text-gray-300'}`}>
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold">{ex.title}</span>
                                        <div className="flex items-center gap-2">
                                            {ex.isPublished ? <span className="text-[10px] bg-cyan-600 dark:bg-neon-cyan text-white dark:text-dark-main px-2 py-1 rounded font-bold">已派送</span> : <span className="text-[10px] bg-slate-300 dark:bg-gray-700 text-slate-600 dark:text-gray-300 px-2 py-1 rounded font-bold">草稿</span>}
                                            <button onClick={(e) => { e.stopPropagation(); deleteExam(ex.id); }} className="text-slate-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-neon-red opacity-0 group-hover:opacity-100 transition"><Trash2 size={16} /></button>
                                        </div>
                                    </div>
                                    <div className="text-xs text-slate-500 dark:text-gray-500">題庫：{ex.questions?.length || 0} 題</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 右側：試卷編輯與派送中心 */}
                    <div className="lg:col-span-2 glass-card p-6 rounded-2xl flex flex-col h-full relative">
                        {!selectedExam ? (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 dark:text-gray-500">
                                <Settings size={60} className="mb-4 opacity-20" />
                                <p>請選擇一份試卷進入控制中心</p>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full fade-in">
                                {/* 頭部資訊與派送鈕 */}
                                <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-200 dark:border-gray-800">
                                    <div>
                                        {isEditingTitle ? (
                                            <div className="flex items-center gap-2 mb-1">
                                                <input 
                                                    type="text" 
                                                    value={editTitleValue} 
                                                    onChange={e => setEditTitleValue(e.target.value)} 
                                                    onKeyDown={e => {
                                                        if(e.key === 'Enter') saveExamTitle();
                                                        if(e.key === 'Escape') setIsEditingTitle(false);
                                                    }}
                                                    className="bg-slate-50 dark:bg-dark-main border border-cyan-500 dark:border-neon-cyan text-slate-900 dark:text-white rounded-lg px-3 py-1 font-bold text-xl md:text-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition w-full max-w-md shadow-sm"
                                                    autoFocus
                                                />
                                                <button onClick={saveExamTitle} className="p-1.5 bg-green-100 hover:bg-green-200 dark:bg-green-900/30 dark:hover:bg-green-900/50 text-green-700 dark:text-green-400 rounded-lg transition" title="儲存 (Enter)"><CheckCircle2 size={20}/></button>
                                                <button onClick={() => setIsEditingTitle(false)} className="p-1.5 bg-slate-200 hover:bg-slate-300 dark:bg-gray-800 dark:hover:bg-gray-700 text-slate-600 dark:text-gray-400 rounded-lg transition" title="取消 (Esc)"><X size={20}/></button>
                                            </div>
                                        ) : (
                                            <div className="flex items-center gap-3 group mb-1">
                                                <h2 
                                                    className="text-2xl font-bold text-slate-900 dark:text-white tracking-wide cursor-pointer hover:text-cyan-600 dark:hover:text-neon-cyan transition"
                                                    onClick={() => { setEditTitleValue(selectedExam.title); setIsEditingTitle(true); }}
                                                    title="點擊編輯試卷名稱"
                                                >
                                                    {selectedExam.title}
                                                </h2>
                                                <button onClick={() => { setEditTitleValue(selectedExam.title); setIsEditingTitle(true); }} className="text-slate-400 hover:text-blue-600 dark:hover:text-neon-blue p-1.5 rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition" title="編輯名稱"><Edit size={18}/></button>
                                            </div>
                                        )}
                                        <p className="text-sm text-slate-500 dark:text-gray-400 mt-1">目前題庫數量：<span className="text-cyan-700 dark:text-neon-cyan font-mono font-bold">{selectedExam.questions?.length || 0}</span> 題</p>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <button onClick={() => togglePublish(selectedExam)} className={`px-6 py-2 rounded-lg font-bold text-sm tracking-widest transition-all shadow-md flex items-center justify-center gap-2 ${selectedExam.isPublished ? 'bg-transparent border border-slate-400 dark:border-gray-500 text-slate-600 dark:text-gray-400 hover:text-slate-900 dark:hover:text-white' : 'bg-cyan-600 dark:bg-neon-cyan text-white dark:text-dark-main hover:bg-cyan-700 dark:hover:bg-cyan-400 dark:shadow-neon-cyan dark:hover:shadow-neon-cyan-hover'}`}>
                                            <Zap size={16} /> {selectedExam.isPublished ? '停止派送' : '🚀 立即派送'}
                                        </button>
                                    </div>
                                </div>
                                
                                {/* 🌟 頁籤控制 (位置對調：Settings 放前面) */}
                                <div className="flex gap-6 border-b border-slate-200 dark:border-gray-800 mb-6">
                                    <button onClick={() => setExamTab('settings')} className={`pb-3 font-bold text-sm md:text-base flex items-center gap-2 transition ${examTab === 'settings' ? 'text-cyan-600 dark:text-neon-cyan border-b-2 border-cyan-600 dark:border-neon-cyan' : 'text-slate-500 dark:text-gray-500 hover:text-slate-700 dark:hover:text-gray-300'}`}>
                                        <Settings size={18}/> 測驗邏輯設定
                                    </button>
                                    <button onClick={() => setExamTab('questions')} className={`pb-3 font-bold text-sm md:text-base flex items-center gap-2 transition ${examTab === 'questions' ? 'text-cyan-600 dark:text-neon-cyan border-b-2 border-cyan-600 dark:border-neon-cyan' : 'text-slate-500 dark:text-gray-500 hover:text-slate-700 dark:hover:text-gray-300'}`}>
                                        <Clipboard size={18}/> 題庫管理與編輯
                                    </button>
                                </div>

                                {/* 內容區域 */}
                                <div className="flex-1 overflow-y-auto pr-2 pb-4">
                                    
                                    {/* 🌟 頁籤內容 1：測驗邏輯設定 */}
                                    {examTab === 'settings' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
                                            {/* 抽題數量設定 */}
                                            <div className="bg-white dark:bg-gray-800/40 p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm dark:shadow-none flex flex-col justify-between">
                                                <div>
                                                    <h3 className="font-bold text-slate-700 dark:text-gray-300 flex items-center gap-2 mb-4"><Settings size={18} className="text-slate-500 dark:text-gray-400"/> 動態測驗邏輯</h3>
                                                    <div className="flex justify-between mb-2">
                                                        <label className="text-sm font-bold text-slate-700 dark:text-gray-300">隨機抽題數量 (Draw Count)</label>
                                                        <span className="text-cyan-700 dark:text-neon-cyan font-mono font-bold bg-cyan-100 dark:bg-cyan-900/50 px-3 py-0.5 rounded-full">{selectedExam.drawCount} 題</span>
                                                    </div>
                                                    <input type="range" min="1" max={Math.max(50, selectedExam.questions?.length || 50)} value={selectedExam.drawCount} onChange={e => updateExamSetting('drawCount', parseInt(e.target.value))} className="w-full accent-cyan-600 dark:accent-neon-cyan cursor-pointer" />
                                                </div>
                                                <p className="text-[11px] text-slate-500 dark:text-gray-500 mt-4">💡 若設定數量大於總題數，系統將自動以「全題數」進行隨機順序測驗。</p>
                                            </div>

                                            {/* 作答次數模式 */}
                                            <div className="bg-white dark:bg-gray-800/40 p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm dark:shadow-none flex flex-col justify-center">
                                                <div className="flex justify-between items-center mb-4">
                                                    <div>
                                                        <div className="text-base font-bold text-slate-700 dark:text-gray-300 mb-1">無限刷題模式</div>
                                                        <div className="text-xs text-slate-500 dark:text-gray-500">開啟允許學生針對此試卷重複測驗；關閉則為單次嚴格測驗。</div>
                                                    </div>
                                                    <button onClick={() => updateExamSetting('allowMultipleAttempts', !selectedExam.allowMultipleAttempts)} className={`w-14 h-7 rounded-full transition-all duration-300 relative flex items-center shrink-0 ${selectedExam.allowMultipleAttempts ? 'bg-cyan-500 dark:bg-neon-cyan dark:shadow-neon-cyan' : 'bg-slate-300 dark:bg-gray-700'}`}>
                                                        <div className={`w-5 h-5 bg-white rounded-full absolute transition-all duration-300 shadow-sm ${selectedExam.allowMultipleAttempts ? 'left-8' : 'left-1'}`}></div>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* 🌟 頁籤內容 2：題庫管理與編輯 */}
                                    {examTab === 'questions' && (
                                        <div className="flex flex-col gap-6 fade-in">
                                            
                                            {/* 題庫匯入雙模組並列 (Excel & CSV) */}
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {/* Excel 快速貼上 */}
                                                <div className="bg-white dark:bg-gray-800/40 p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm dark:shadow-none flex flex-col">
                                                    <h4 className="font-bold text-slate-800 dark:text-gray-300 flex items-center gap-2 mb-2"><Clipboard size={18} className="text-cyan-600 dark:text-neon-cyan"/> 從 Excel 快速貼上</h4>
                                                    <p className="text-[11px] text-slate-500 dark:text-gray-400 mb-3">依序框選：<span className="font-bold text-cyan-600 dark:text-neon-cyan">題目、正確答案、選項1~4</span>，複製後貼於下方。</p>
                                                    <textarea 
                                                        value={pasteText} onChange={e => setPasteText(e.target.value)}
                                                        placeholder="在此按 Ctrl+V 貼上內容..."
                                                        className="w-full h-20 bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-600 rounded-lg p-3 text-sm text-slate-800 dark:text-gray-200 focus:border-cyan-500 dark:focus:border-neon-cyan outline-none transition resize-none"
                                                    ></textarea>
                                                    <div className="mt-3 flex justify-end gap-2">
                                                        <button onClick={() => handleExcelPaste(true)} className="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-slate-700 dark:text-gray-200 text-xs rounded-lg transition font-bold border border-transparent">覆寫</button>
                                                        <button onClick={() => handleExcelPaste(false)} className="px-3 py-1.5 bg-cyan-600 hover:bg-cyan-700 dark:bg-neon-cyan/20 dark:hover:bg-neon-cyan/40 text-white dark:text-neon-cyan text-xs rounded-lg transition font-bold border border-transparent dark:border-neon-cyan/50">附加</button>
                                                    </div>
                                                </div>

                                                {/* 傳統 CSV 匯入 */}
                                                <div className="bg-slate-50 dark:bg-dark-main border border-slate-200 dark:border-gray-700 p-5 rounded-xl flex flex-col justify-center items-center text-center shadow-sm dark:shadow-none relative">
                                                    <h4 className="font-bold text-slate-700 dark:text-gray-300 mb-2 flex items-center gap-2"><Upload size={18} className="text-slate-500 dark:text-gray-400"/> 傳統 CSV 匯入</h4>
                                                    <p className="text-[11px] text-slate-500 dark:text-gray-400 mb-4">上傳標準 CSV 格式檔案，此操作將<span className="font-bold text-red-500">覆寫</span>現有題目。</p>
                                                    <label className="bg-slate-800 dark:bg-gray-800 hover:bg-slate-700 dark:hover:bg-gray-700 text-white px-5 py-2 rounded-lg border border-slate-700 dark:border-gray-600 cursor-pointer transition shadow-sm font-bold text-sm">
                                                        選擇 CSV 檔案
                                                        <input type="file" accept=".csv" className="hidden" onChange={handleQuestionCSVUpload} />
                                                    </label>
                                                    <button onClick={downloadExamSample} className="mt-3 text-[11px] text-cyan-600 dark:text-neon-cyan hover:underline text-center">下載題庫 CSV 範例檔</button>
                                                </div>
                                            </div>

                                            {/* 單題管理列表 */}
                                            <div>
                                                <div className="flex justify-between items-center mb-4 mt-2 border-t border-slate-200 dark:border-gray-800 pt-4">
                                                    <h4 className="font-bold text-slate-800 dark:text-gray-300 flex items-center gap-2"><BookOpen size={18}/> 試卷內容檢視</h4>
                                                    <button onClick={() => openModal()} className="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 dark:bg-neon-blue/20 dark:hover:bg-neon-blue/40 text-blue-700 dark:text-neon-blue text-sm rounded-lg transition font-bold flex items-center gap-1 border border-blue-200 dark:border-neon-blue/50"><Plus size={16}/> 單題新增</button>
                                                </div>
                                                <div className="space-y-3">
                                                    {!selectedExam.questions || selectedExam.questions.length === 0 ? (
                                                        <div className="text-center py-10 bg-slate-50 dark:bg-gray-800/20 rounded-xl border border-dashed border-slate-300 dark:border-gray-700 text-slate-500 dark:text-gray-500">尚無題目，請使用上方 Excel 貼上或手動新增</div>
                                                    ) : selectedExam.questions.map((q, idx) => (
                                                        <div key={idx} className="bg-white dark:bg-dark-main border border-slate-200 dark:border-gray-700 p-4 rounded-xl shadow-sm dark:shadow-none relative group transition hover:border-cyan-300 dark:hover:border-gray-500">
                                                            <div className="flex justify-between items-start mb-3">
                                                                <span className="font-bold text-slate-800 dark:text-white text-lg pr-12 leading-snug"><span className="text-cyan-600 dark:text-neon-cyan mr-2">{idx + 1}.</span>{q.question}</span>
                                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition absolute top-4 right-4 bg-white dark:bg-dark-main pl-2">
                                                                    <button onClick={() => openModal(idx, q)} className="text-slate-400 hover:text-blue-600 dark:hover:text-neon-blue p-1"><Edit size={18}/></button>
                                                                    <button onClick={() => deleteSingleQuestion(idx)} className="text-slate-400 hover:text-red-500 dark:hover:text-neon-red p-1"><Trash2 size={18}/></button>
                                                                </div>
                                                            </div>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm text-slate-600 dark:text-gray-400">
                                                                {q.options.map((opt, oIdx) => (
                                                                    <div key={oIdx} className={`px-3 py-2 rounded-lg transition ${String(q.correct) === String(oIdx+1) || String(q.correct) === opt ? 'bg-cyan-50 dark:bg-cyan-900/30 border border-cyan-200 dark:border-cyan-800/50 text-cyan-800 dark:text-cyan-300 font-bold' : 'bg-slate-50 dark:bg-gray-800 border border-transparent'}`}>
                                                                        <span className="mr-2 opacity-60">{oIdx + 1}.</span> {opt}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </div>
                        )}
                    </div>

                    {/* 編輯/新增題目的 Modal (浮動視窗) - 移出 glass-card 避免 filter 影響 fixed 定位 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm fade-in">
                            <div className="bg-white dark:bg-dark-card w-full max-w-2xl rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                                <div className="px-6 py-4 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50">
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                        {editIndex !== null ? <><Edit size={20} className="text-cyan-600 dark:text-neon-cyan"/> 編輯題目</> : <><Plus size={20} className="text-cyan-600 dark:text-neon-cyan"/> 單題新增</>}
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-700 dark:hover:text-white"><X size={24}/></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">題目內容</label>
                                        <textarea value={modalData.question} onChange={e => setModalData({...modalData, question: e.target.value})} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition h-24"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">正確解答 <span className="text-xs font-normal text-slate-500">(可輸入數字 1~4 或完整選項文字)</span></label>
                                        <input type="text" value={modalData.correct} onChange={e => setModalData({...modalData, correct: e.target.value})} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                                        {modalData.options.map((opt, i) => (
                                            <div key={i}>
                                                <label className="block text-xs font-bold text-slate-600 dark:text-gray-400 mb-1">選項 {i + 1}</label>
                                                <input type="text" value={opt} onChange={e => { const newOpts = [...modalData.options]; newOpts[i] = e.target.value; setModalData({...modalData, options: newOpts}); }} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-slate-50 dark:bg-gray-800/50 border-t border-slate-200 dark:border-gray-800 flex justify-end gap-3">
                                    <button onClick={() => setIsModalOpen(false)} className="px-5 py-2 rounded-lg text-slate-600 dark:text-gray-300 font-bold hover:bg-slate-200 dark:hover:bg-gray-700 transition">取消</button>
                                    <button onClick={saveSingleQuestion} className="px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-700 dark:bg-neon-cyan dark:hover:bg-cyan-400 text-white dark:text-dark-main font-bold shadow-md transition">儲存題目</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主程式：儀表板框架 ---
        const Dashboard = ({ user, isDarkMode, toggleTheme }) => {
            const [view, setView] = useState('classes');
            
            // 修改密碼 Modal 狀態
            const [isPwdModalOpen, setIsPwdModalOpen] = useState(false);
            const [newPassword, setNewPassword] = useState('');
            
            const showToast = useToast();

            const handleUpdatePassword = async () => {
                if (newPassword.length < 6) {
                    showToast("密碼長度至少需要 6 個字元", "error");
                    return;
                }
                try {
                    await updatePassword(user, newPassword);
                    showToast("存取金鑰 (密碼) 已成功更新！", "success");
                    setIsPwdModalOpen(false);
                    setNewPassword('');
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') {
                        showToast("基於安全考量，請先登出並重新登入後，再進行密碼修改", "error");
                    } else {
                        showToast("密碼更新失敗：" + error.message, "error");
                    }
                }
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    {/* 頂部導航列 */}
                    <header className="glass-card border-b-0 border-cyan-500/20 dark:border-neon-cyan/20 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <Zap className="text-cyan-600 dark:text-neon-cyan" size={24} />
                            <h1 className="text-xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 dark:from-white dark:to-gray-400">系統中控台</h1>
                            <span className="text-xs border border-cyan-500/30 text-cyan-700 dark:text-cyan-400 px-2 py-0.5 rounded-full ml-2">v2.0 Soft-Light</span>
                        </div>
                        <div className="flex items-center gap-2 md:gap-4">
                            <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400">
                                {isDarkMode ? <Sun size={20} className="hover:text-yellow-400" /> : <Moon size={20} className="hover:text-indigo-600" />}
                            </button>
                            <span className="text-sm text-slate-500 dark:text-gray-400 hidden md:inline border-l border-slate-300 dark:border-gray-700 pl-4">指揮官：{user.email}</span>
                            <button onClick={() => setIsPwdModalOpen(true)} className="flex items-center gap-2 text-sm text-slate-600 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-neon-cyan transition px-3 py-1.5 rounded-lg border border-transparent hover:border-cyan-200 dark:hover:border-cyan-900/50 hover:bg-cyan-50 dark:hover:bg-cyan-900/20" title="修改密碼"><Key size={16}/><span className="hidden lg:inline">修改密碼</span></button>
                            <button onClick={() => signOut(auth)} className="flex items-center gap-2 text-sm text-slate-600 dark:text-gray-400 hover:text-red-500 dark:hover:text-neon-red transition px-3 py-1.5 rounded-lg border border-transparent hover:border-red-200 dark:hover:border-red-900/50 hover:bg-red-50 dark:hover:bg-red-900/20"><LogOut size={16}/> 登出連線</button>
                        </div>
                    </header>

                    {/* 主內容區 */}
                    <main className="flex-1 container mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6 h-[calc(100vh-76px)]">
                        {/* 左側選單 */}
                        <aside className="w-full md:w-48 lg:w-56 shrink-0 flex flex-col gap-2">
                            <button onClick={()=>setView('classes')} className={`p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${view==='classes' ? 'bg-blue-100 text-blue-700 border border-blue-300 shadow-sm dark:bg-neon-blue/20 dark:text-neon-blue dark:border-neon-blue/50 dark:shadow-neon-blue' : 'glass-card text-slate-500 dark:text-gray-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-gray-800'}`}>
                                <Users size={20}/> 班級管理
                            </button>
                            <button onClick={()=>setView('exams')} className={`p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${view==='exams' ? 'bg-cyan-100 text-cyan-700 border border-cyan-300 shadow-sm dark:bg-neon-cyan/20 dark:text-neon-cyan dark:border-neon-cyan/50 dark:shadow-neon-cyan' : 'glass-card text-slate-500 dark:text-gray-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-gray-800'}`}>
                                <BookOpen size={20}/> 試卷兵工廠
                            </button>
                        </aside>
                        
                        {/* 動態內容渲染 */}
                        <section className="flex-1 min-h-0 relative">
                            {view === 'classes' && <ClassManager user={user} />}
                            {view === 'exams' && <ExamFactory user={user} />}
                        </section>
                    </main>

                    {/* 修改密碼 Modal (浮動視窗) */}
                    {isPwdModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm fade-in">
                            <div className="bg-white dark:bg-dark-card w-full max-w-sm rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                                <div className="px-6 py-4 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50">
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2"><Key size={20} className="text-cyan-600 dark:text-neon-cyan"/> 變更存取金鑰 (密碼)</h3>
                                    <button onClick={() => setIsPwdModalOpen(false)} className="text-slate-400 hover:text-slate-700 dark:hover:text-white"><X size={24}/></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div className="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50 text-amber-700 dark:text-amber-400 text-xs p-3 rounded-lg mb-4">
                                        💡 提示：基於安全防護，如果您已經登入一段時間，系統可能會拒絕修改密碼。遇到此情況請先登出並重新登入即可。
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">請輸入新密碼 (至少 6 個字元)</label>
                                        <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" placeholder="******" />
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-slate-50 dark:bg-gray-800/50 border-t border-slate-200 dark:border-gray-800 flex justify-end gap-3">
                                    <button onClick={() => setIsPwdModalOpen(false)} className="px-5 py-2 rounded-lg text-slate-600 dark:text-gray-300 font-bold hover:bg-slate-200 dark:hover:bg-gray-700 transition">取消</button>
                                    <button onClick={handleUpdatePassword} className="px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-700 dark:bg-neon-cyan dark:hover:bg-cyan-400 text-white dark:text-dark-main font-bold shadow-md transition">確認變更</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- App Entry Point ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(false); // 🌟 預設明亮模式 (日光航艦)

            // 主題切換邏輯
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            const toggleTheme = () => setIsDarkMode(!isDarkMode);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthChecking(false);
                });
                return () => unsubscribe();
            }, []);

            if (authChecking) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-dark-main">
                    <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-cyan-600 dark:border-neon-cyan shadow-md dark:shadow-neon-cyan"></div>
                </div>
            );

            return (
                <ToastProvider>
                    {user ? <Dashboard user={user} isDarkMode={isDarkMode} toggleTheme={toggleTheme} /> : <AuthScreen isDarkMode={isDarkMode} toggleTheme={toggleTheme} />}
                </ToastProvider>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
