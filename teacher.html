<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧測驗 | 老師中控台</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind 自訂設定 (科技感色彩) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neon: { cyan: '#00E5FF', blue: '#2979FF', red: '#FF1744', gold: '#FFD700', silver: '#C0C0C0', bronze: '#CD7F32' },
                        dark: { main: '#0B0F19', card: '#111827', border: '#1F2937' }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 10px rgba(0, 229, 255, 0.5), 0 0 20px rgba(0, 229, 255, 0.3)',
                        'neon-cyan-hover': '0 0 15px rgba(0, 229, 255, 0.8), 0 0 30px rgba(0, 229, 255, 0.5)',
                        'neon-blue': '0 0 10px rgba(41, 121, 255, 0.5)',
                        'neon-red': '0 0 10px rgba(255, 23, 68, 0.5)',
                        'neon-gold': '0 0 10px rgba(255, 215, 0, 0.5)'
                    }
                }
            }
        }
    </script>

    <style>
        /* 日光/暗黑模式 CSS 變數定義 */
        :root {
            --bg-color: #F8FAFC; 
            --text-main: #0F172A; 
            --grid-color: rgba(15, 23, 42, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(203, 213, 225, 0.8); 
            --scrollbar-track: #F8FAFC;
            --scrollbar-thumb: #CBD5E1;
        }
        .dark {
            --bg-color: #0B0F19;
            --text-main: #E5E7EB;
            --grid-color: rgba(0, 229, 255, 0.03);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(31, 41, 55, 0.8);
            --scrollbar-track: #0B0F19;
            --scrollbar-thumb: #1F2937;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: background-color 0.3s, color 0.3s, background-image 0.3s;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00E5FF; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: background 0.3s, border 0.3s;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-item { animation: slideInUp 0.4s ease-out forwards; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom": "https://esm.sh/react-dom@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createPortal } from 'react-dom';
        import { Users, BookOpen, LogOut, Upload, Download, Trash2, Plus, Zap, Settings, ShieldAlert, CheckCircle2, Sun, Moon, Edit, Clipboard, X, Key, Activity, Flame, Award, TrendingUp, Target, BarChart3, Maximize2, HelpCircle } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, updatePassword } from 'firebase/auth';
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, onSnapshot, query, where, orderBy, getDocs } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyB9NJXQwdKweStTbATahldDgvtbuGclo34",
            authDomain: "test-reading-71839.firebaseapp.com",
            projectId: "test-reading-71839",
            storageBucket: "test-reading-71839.firebasestorage.app",
            messagingSenderId: "499192051513",
            appId: "1:499192051513:web:777c873e938464e2995ae8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🌟 空間傳送門 (Portal)
        const ModalPortal = ({ children }) => createPortal(children, document.body);

        // ==========================================
        // 🌟 共用組件：BaseModal
        // ==========================================
        const BaseModal = ({ isOpen, onClose, title, icon: Icon, iconColor = "text-cyan-600 dark:text-neon-cyan", btnColor = "bg-cyan-600 hover:bg-cyan-700 dark:bg-neon-cyan dark:hover:bg-cyan-400", children, confirmText = "確認", onConfirm, isConfirmDisabled = false, maxWidth = "max-w-sm" }) => {
            if (!isOpen) return null;
            return (
                <ModalPortal>
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm fade-in">
                        <div className={`bg-white dark:bg-dark-card w-full ${maxWidth} rounded-2xl shadow-2xl border border-slate-200 dark:border-gray-700 flex flex-col max-h-[90vh] overflow-hidden animate-[slideIn_0.2s_ease-out]`}>
                            <div className="px-6 py-4 border-b border-slate-200 dark:border-gray-800 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50 shrink-0">
                                <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                    {Icon && <Icon size={20} className={iconColor} />}
                                    {title}
                                </h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-slate-700 dark:hover:text-white transition"><X size={24}/></button>
                            </div>
                            <div className="p-6 space-y-4 overflow-y-auto flex-1">
                                {children}
                            </div>
                            <div className="px-6 py-4 bg-slate-50 dark:bg-gray-800/50 border-t border-slate-200 dark:border-gray-800 flex justify-end gap-3 shrink-0">
                                <button onClick={onClose} className="px-5 py-2 rounded-lg text-slate-600 dark:text-gray-300 font-bold hover:bg-slate-200 dark:hover:bg-gray-700 transition">取消</button>
                                <button onClick={onConfirm} disabled={isConfirmDisabled} className={`px-5 py-2 rounded-lg text-white dark:text-dark-main font-bold shadow-md transition ${isConfirmDisabled ? 'bg-slate-400 cursor-not-allowed' : btnColor}`}>
                                    {confirmText}
                                </button>
                            </div>
                        </div>
                    </div>
                </ModalPortal>
            );
        };

        const ToastContext = createContext();
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={showToast}>
                    {children}
                    <div className="fixed top-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`flex items-center gap-3 px-6 py-3 rounded-lg bg-white/95 dark:glass-card border-l-4 shadow-lg transform transition-all animate-[slideIn_0.3s_ease-out] ${t.type === 'error' ? 'border-red-500 dark:border-neon-red shadow-md dark:shadow-neon-red text-slate-800 dark:text-red-100' : 'border-cyan-500 dark:border-neon-cyan shadow-md dark:shadow-neon-cyan text-slate-800 dark:text-cyan-100'}`}>
                                {t.type === 'error' ? <ShieldAlert size={20} className="text-red-500 dark:text-neon-red" /> : <CheckCircle2 size={20} className="text-cyan-600 dark:text-neon-cyan" />}
                                <span className="font-medium tracking-wider">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        const useToast = () => useContext(ToastContext);

        const downloadCSV = (filename, content) => {
            const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        };

        // ==========================================
        // 🌟 組件：即時戰情室 (War Room) 
        // ==========================================
        const WarRoom = ({ exam }) => {
            const [studentScores, setStudentScores] = useState([]);
            const [mistakeStats, setMistakeStats] = useState([]);
            const [overallAccuracy, setOverallAccuracy] = useState(0);
            const [isDataLoaded, setIsDataLoaded] = useState(false);
            
            const [selectedMistake, setSelectedMistake] = useState(null);
            const [isFullScreen, setIsFullScreen] = useState(false); 
            const [mistakeFontSize, setMistakeFontSize] = useState('medium'); 

            useEffect(() => {
                if (!exam) return;
                
                const qScores = query(collection(db, 'scores'), where('examId', '==', exam.id));
                const unsubScores = onSnapshot(qScores, (snap) => {
                    const scoreMap = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        if (!scoreMap[data.studentId] || data.score > scoreMap[data.studentId].score) {
                            scoreMap[data.studentId] = data;
                        }
                    });
                    
                    const sortedScores = Object.values(scoreMap).sort((a, b) => b.score - a.score);
                    setStudentScores(sortedScores);

                    if (sortedScores.length > 0) {
                        const totalAcc = sortedScores.reduce((sum, s) => sum + (s.accuracy || 0), 0);
                        setOverallAccuracy(Math.round(totalAcc / sortedScores.length));
                    } else {
                        setOverallAccuracy(0);
                    }
                    setIsDataLoaded(true);
                });

                const qMistakes = query(collection(db, 'mistakes'), where('examId', '==', exam.id));
                const unsubMistakes = onSnapshot(qMistakes, (snap) => {
                    const mData = {};
                    snap.docs.forEach(d => {
                        const data = d.data();
                        const qText = data.question;
                        
                        if (!mData[qText]) {
                            mData[qText] = { question: qText, correctText: data.correctText, options: data.options || [], count: 0, selections: {} };
                        }
                        
                        mData[qText].count++;
                        const sel = data.selected || '未作答';
                        mData[qText].selections[sel] = (mData[qText].selections[sel] || 0) + 1;
                    });
                    
                    const sortedMistakes = Object.values(mData).sort((a, b) => b.count - a.count);
                    setMistakeStats(sortedMistakes);
                });

                return () => { unsubScores(); unsubMistakes(); };
            }, [exam?.id]);

            useEffect(() => {
                return () => setIsFullScreen(false);
            }, []);

            if (!isDataLoaded) return <div className="p-10 text-center text-slate-500 animate-pulse">建立戰情連線中...</div>;
            
            if (studentScores.length === 0) return (
                <div className="flex flex-col items-center justify-center p-20 text-slate-500 dark:text-gray-500 fade-in">
                    <Activity size={60} className="mb-4 opacity-20" />
                    <h3 className="text-xl font-bold mb-2">雷達靜默</h3>
                    <p>目前尚未有學生提交本試卷成績，等待作戰數據傳回...</p>
                </div>
            );

            const renderInnerContent = () => (
                <>
                    <div className="bg-white dark:bg-dark-card p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm flex flex-col gap-3 shrink-0">
                        <div className="flex justify-between items-end">
                            <h3 className="font-bold text-slate-800 dark:text-white flex items-center gap-2"><Target size={18} className="text-cyan-600 dark:text-neon-cyan"/> 戰況拉鋸戰</h3>
                            <div className="flex items-center gap-3"><span className="text-2xl font-black text-slate-800 dark:text-white font-mono">{overallAccuracy}%</span>{!isFullScreen && <button onClick={() => setIsFullScreen(true)} className="p-1.5 text-slate-400 hover:text-cyan-600 dark:hover:text-neon-cyan bg-slate-100 hover:bg-cyan-50 dark:bg-gray-800 rounded-lg transition"><Maximize2 size={20}/></button>}</div>
                        </div>
                        <div className="h-8 w-full rounded-full overflow-hidden flex bg-red-100 dark:bg-red-900/30 relative shadow-inner">
                            <div className="h-full bg-cyan-500 dark:bg-cyan-600 transition-all duration-1000 ease-out flex items-center justify-end px-3" style={{ width: `${overallAccuracy}%` }}>{overallAccuracy > 10 && <span className="text-xs font-bold text-white">正確</span>}</div>
                            <div className="h-full bg-red-500 dark:bg-red-600 transition-all duration-1000 ease-out flex items-center justify-start px-3" style={{ width: `${100 - overallAccuracy}%` }}>{(100 - overallAccuracy) > 10 && <span className="text-xs font-bold text-white">錯誤</span>}</div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 flex-1 min-h-0">
                        <div className="xl:col-span-2 bg-white dark:bg-dark-card p-5 rounded-xl border border-slate-200 dark:border-gray-700 shadow-sm flex flex-col min-h-0">
                            <h3 className="font-bold text-slate-800 dark:text-white flex items-center gap-2 mb-4 shrink-0"><TrendingUp size={18} className="text-green-500"/> 即時戰力排行榜</h3>
                            <div className={`overflow-y-auto space-y-3 pr-2 ${isFullScreen ? 'max-h-[50vh]' : 'max-h-80'}`}>
                                {studentScores.map((student, idx) => (
                                    <div key={student.studentId} className={`flex items-center gap-4 p-3 md:p-4 rounded-xl border transition-all animate-item ${idx===0?'bg-amber-50 dark:bg-amber-900/20 border-amber-200':idx===1?'bg-slate-50 dark:bg-slate-800/60 border-slate-300':idx===2?'bg-orange-50 dark:bg-orange-900/20 border-orange-200':'bg-slate-100 dark:bg-gray-800 border-slate-100 dark:border-gray-800'}`} style={{animationDelay:`${idx*0.05}s`}}>
                                        <div className="flex items-center justify-center w-8 h-8 font-black text-lg">{idx < 3 ? <Award size={24} className={idx===0?'text-amber-500':idx===1?'text-slate-400':'text-orange-500'}/> : idx + 1}</div>
                                        <div className="flex-1 min-w-0"><div className="font-bold text-slate-800 dark:text-white truncate">{student.studentName}</div><div className="flex items-center gap-2 mt-1"><div className="h-1.5 w-full max-w-[150px] bg-red-100 dark:bg-red-900/30 rounded-full overflow-hidden"><div className="h-full bg-cyan-500" style={{width:`${student.accuracy||0}%`}}></div></div><span className="text-[10px] font-mono">{student.accuracy||0}%</span></div></div>
                                        <div className="text-right shrink-0"><div className="text-xl font-black text-cyan-600 dark:text-neon-cyan font-mono">{student.score}</div><div className="text-[10px] text-slate-400 font-bold">PTS</div></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-red-50 dark:bg-red-900/10 p-5 rounded-xl border border-red-100 dark:border-red-900/30 shadow-sm flex flex-col min-h-0">
                            <h3 className="font-bold text-red-600 dark:text-red-400 flex items-center gap-2 mb-4 shrink-0"><Flame size={18} className="animate-pulse"/> 錯題熱點 (點擊放大)</h3>
                            <div className="grid grid-cols-1 gap-4 overflow-y-auto pr-2 pb-2">
                                {mistakeStats.length === 0 ? <div className="text-center text-red-400 text-sm mt-6">無錯題記錄</div> : mistakeStats.map((stat, idx) => (
                                    <div key={idx} onClick={() => setSelectedMistake(stat)} className="bg-white dark:bg-dark-main p-4 rounded-xl border border-red-100 flex flex-col justify-between animate-item shadow-sm cursor-pointer hover:border-red-400 transition-all group active:scale-95" style={{animationDelay:`${idx*0.1}s`}}>
                                        <div className="text-sm font-bold text-slate-800 dark:text-gray-200 line-clamp-3 leading-snug group-hover:text-red-500 mb-3">{stat.question}</div>
                                        <div className="flex justify-between items-center border-t border-slate-100 pt-3 mt-auto"><span className="text-[10px] text-slate-500 flex items-center gap-1 font-bold"><BarChart3 size={12}/> 解析</span><div className="text-xs font-bold text-red-600 flex items-center gap-1 bg-red-100 px-2 py-1 rounded-md"><Users size={14}/> {stat.count} 人答錯</div></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </>
            );

            return (
                <>
                    {isFullScreen ? (
                        <ModalPortal>
                            <div className="fixed inset-0 z-[110] bg-slate-50 dark:bg-dark-main overflow-y-auto p-4 md:p-8 flex flex-col fade-in">
                                <div className="max-w-7xl mx-auto w-full flex-1 flex flex-col gap-6">
                                    <div className="flex justify-between items-center shrink-0 bg-white dark:bg-dark-card p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="flex items-center gap-4"><div className="p-3 bg-cyan-100 dark:bg-cyan-900/40 rounded-xl"><Activity className="text-cyan-600" size={28}/></div><div><h2 className="text-2xl font-black text-slate-800 dark:text-white">{exam.title}</h2><p className="text-sm text-slate-500 font-bold mt-1">即時戰情室 (投影模式)</p></div></div>
                                        <button onClick={() => setIsFullScreen(false)} className="bg-red-50 text-red-500 p-4 rounded-full transition shadow-sm border border-red-100"><X size={28}/></button>
                                    </div>
                                    {renderInnerContent()}
                                </div>
                            </div>
                        </ModalPortal>
                    ) : (
                        <div className="flex flex-col gap-6 fade-in relative pb-10 h-full">{renderInnerContent()}</div>
                    )}

                    {selectedMistake && (
                        <ModalPortal>
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-2 bg-slate-900/90 dark:bg-black/90 backdrop-blur-md fade-in">
                                <div className="bg-white dark:bg-dark-card w-[96vw] h-[96vh] rounded-3xl shadow-2xl border border-slate-200 flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                                    <div className="px-6 py-6 border-b border-slate-200 flex justify-between items-center bg-slate-50 dark:bg-gray-800/50 shrink-0">
                                        <h3 className="text-2xl font-bold text-slate-800 dark:text-white flex items-center gap-3"><Flame className="text-red-500" size={32}/> 錯題深度解析</h3>
                                        <div className="flex items-center gap-6">
                                            <div className="flex bg-slate-200 dark:bg-gray-700 rounded-lg p-1 shadow-inner">
                                                {['small', 'medium', 'large'].map(sz => <button key={sz} onClick={() => setMistakeFontSize(sz)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${mistakeFontSize===sz ? 'bg-white dark:bg-gray-600 shadow-sm text-cyan-600' : 'text-slate-500'}`}>{sz==='small'?'小':sz==='large'?'大':'中'}</button>)}
                                            </div>
                                            <button onClick={() => setSelectedMistake(null)} className="text-slate-400 hover:text-slate-700 transition bg-slate-200 p-3 rounded-full shadow-sm"><X size={32}/></button>
                                        </div>
                                    </div>
                                    <div className="p-6 md:p-12 overflow-y-auto flex-1 flex flex-col">
                                        <div className={`text-center shrink-0 transition-all duration-300 ${mistakeFontSize==='small'?'mb-6':mistakeFontSize==='large'?'mb-16':'mb-10'}`}>
                                            <div className={`inline-flex items-center gap-2 text-red-500 bg-red-50 px-6 py-2 rounded-full font-bold mb-6 border border-red-100 ${mistakeFontSize==='small'?'text-sm':mistakeFontSize==='large'?'text-xl':'text-lg'}`}><Users size={24}/> 共有 {selectedMistake.count} 名學生在此題陣亡</div>
                                            <h2 className={`${mistakeFontSize==='small'?'text-3xl':mistakeFontSize==='large'?'text-7xl':'text-5xl'} font-black text-slate-800 dark:text-white leading-relaxed transition-all duration-300`}>{selectedMistake.question}</h2>
                                        </div>
                                        <div className={`grid grid-cols-1 md:grid-cols-2 flex-1 transition-all duration-300 ${mistakeFontSize==='small'?'gap-3':mistakeFontSize==='large'?'gap-8':'gap-6'}`}>
                                            {selectedMistake.options.map((opt, i) => {
                                                const isCorrect = opt === selectedMistake.correctText;
                                                const pickCount = selectedMistake.selections[opt] || 0;
                                                const cardPadding = mistakeFontSize==='small'?'p-4':mistakeFontSize==='large'?'p-10':'p-8';
                                                const minH = mistakeFontSize==='small'?'min-h-[100px]':mistakeFontSize==='large'?'min-h-[160px]':'min-h-[120px]';
                                                const txtSz = mistakeFontSize==='small'?'text-xl':mistakeFontSize==='large'?'text-4xl':'text-2xl';
                                                return (
                                                    <div key={i} className={`relative rounded-3xl transition-all duration-300 flex flex-col justify-center font-bold ${cardPadding} ${minH} ${txtSz} ${isCorrect?'bg-green-50 border-green-500 text-green-700 border-4 z-10 shadow-lg':pickCount>0?'bg-red-50 border-red-300 text-red-800 border-2':'bg-slate-50 border-slate-200 text-slate-700 border-2'}`}>
                                                        <div className="flex items-start gap-4 pr-32"><span className="opacity-50 mt-1">{String.fromCharCode(65+i)}.</span><span className="flex-1 leading-snug">{opt}</span></div>
                                                        <div className="absolute top-1/2 -translate-y-1/2 right-8 flex items-center gap-3">{isCorrect && <CheckCircle2 className={`text-green-500 drop-shadow-lg ${mistakeFontSize==='small'?'w-10 h-10':'w-16 h-16'}`} />}{!isCorrect && pickCount > 0 && <div className={`bg-red-500 text-white rounded-full flex items-center gap-2 font-black shadow-lg animate-pulse ${mistakeFontSize==='small'?'px-3 py-1 text-sm':'px-5 py-3 text-xl'}`}><Users size={24}/> {pickCount} 人</div>}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="px-6 py-5 bg-slate-50 border-t border-slate-200 flex justify-center md:justify-end shrink-0"><button onClick={() => setSelectedMistake(null)} className="w-full md:w-auto px-12 py-4 rounded-2xl bg-slate-800 text-white font-bold shadow-lg transition text-xl tracking-widest">結束解析</button></div>
                                </div>
                            </div>
                        </ModalPortal>
                    )}
                </>
            );
        };

        const ExamTabButton = ({ id, currentTab, setTab, icon: Icon, label }) => (
            <button onClick={() => setTab(id)} className={`pb-3 font-bold text-sm md:text-base flex items-center gap-2 transition shrink-0 px-2 ${currentTab === id ? 'text-cyan-600 dark:text-neon-cyan border-b-2 border-cyan-600' : 'text-slate-500 hover:text-slate-700'}`}><Icon size={18}/> {label}</button>
        );

        // 🌟 登入與註冊介面 (已補回)
        const AuthScreen = ({ isDarkMode, toggleTheme }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [isResetModalOpen, setIsResetModalOpen] = useState(false);
            const [resetEmail, setResetEmail] = useState('');
            const [resetLoading, setResetLoading] = useState(false);
            const showToast = useToast();

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                        showToast("系統登入成功，歡迎指揮官", "success");
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        showToast("系統註冊完成，核心權限已開通", "success");
                    }
                } catch (error) {
                    showToast(error.message, "error");
                }
                setLoading(false);
            };

            const handlePasswordReset = async () => {
                if (!resetEmail.trim()) { showToast("請輸入您註冊的 Email", "error"); return; }
                setResetLoading(true);
                try {
                    await sendPasswordResetEmail(auth, resetEmail);
                    showToast("密碼重設信件已發送，請至信箱收信並重設密碼", "success");
                    setIsResetModalOpen(false); setResetEmail('');
                } catch (error) { showToast("發送失敗: " + error.message, "error"); }
                setResetLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative">
                    <button onClick={toggleTheme} className="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-200 dark:hover:bg-gray-800 transition text-slate-600 dark:text-gray-400">
                        {isDarkMode ? <Sun size={24} className="hover:text-yellow-400" /> : <Moon size={24} className="hover:text-indigo-600" />}
                    </button>
                    <div className="glass-card p-10 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 dark:via-neon-cyan to-transparent opacity-50"></div>
                        <div className="text-center mb-10">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-100 dark:bg-dark-card border border-cyan-500/30 dark:border-neon-cyan/30 shadow-md dark:shadow-neon-cyan mb-4"><Zap className="text-cyan-600 dark:text-neon-cyan" size={40} /></div>
                            <h1 className="text-3xl font-black tracking-widest text-slate-900 dark:text-white">智慧測驗系統</h1>
                            <p className="text-cyan-700 dark:text-cyan-500/80 mt-2 font-mono text-sm uppercase tracking-widest">Teacher Terminal</p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-6">
                            <div><label className="block text-sm font-medium text-slate-600 dark:text-gray-400 mb-2">管理員信箱 (Email)</label><input type="email" required className="w-full bg-slate-50 dark:bg-dark-card/50 border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" value={email} onChange={e => setEmail(e.target.value)} /></div>
                            <div><label className="block text-sm font-medium text-slate-600 dark:text-gray-400 mb-2">存取金鑰 (Password)</label><input type="password" required className="w-full bg-slate-50 dark:bg-dark-card/50 border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 dark:focus:border-neon-cyan transition" value={password} onChange={e => setPassword(e.target.value)} /></div>
                            {isLogin && <div className="text-right mt-1"><button type="button" onClick={() => { setResetEmail(email); setIsResetModalOpen(true); }} className="text-xs text-cyan-600 dark:text-cyan-400 hover:underline">忘記存取金鑰？</button></div>}
                            <button type="submit" disabled={loading} className="w-full bg-cyan-600 hover:bg-cyan-700 dark:bg-cyan-600 dark:hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all duration-300 flex justify-center items-center mt-2">{loading ? <span className="animate-pulse">連線中...</span> : (isLogin ? '啟動系統' : '註冊權限')}</button>
                        </form>
                        <div className="mt-6 text-center"><button onClick={() => setIsLogin(!isLogin)} className="text-sm text-slate-500 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-neon-cyan transition">{isLogin ? '尚未擁有權限？點此註冊' : '已有管理權限？點此登入'}</button></div>
                    </div>
                    <BaseModal isOpen={isResetModalOpen} onClose={() => setIsResetModalOpen(false)} title="重設存取金鑰" icon={Key} confirmText={resetLoading ? '發送中...' : '發送重設信'} onConfirm={handlePasswordReset} isConfirmDisabled={resetLoading}><p className="text-sm text-slate-600 dark:text-gray-400">請輸入您註冊時使用的 Email，系統將發送密碼重設連結至您的信箱。</p><div><label className="block text-sm font-bold text-slate-700 dark:text-gray-300 mb-2">管理員信箱</label><input type="email" value={resetEmail} onChange={e => setResetEmail(e.target.value)} className="w-full bg-slate-50 dark:bg-dark-main border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 transition" placeholder="example@email.com" /></div></BaseModal>
                </div>
            );
        };

        const ClassManager = ({ user }) => {
            const [classes, setClasses] = useState([]);
            const [students, setStudents] = useState([]);
            const [newClassName, setNewClassName] = useState('');
            const [selectedClass, setSelectedClass] = useState(null);
            const [editingStudent, setEditingStudent] = useState(null);
            const showToast = useToast();

            useEffect(() => {
                const q = query(collection(db, 'classes'), where('teacherId', '==', user.uid));
                const unsub = onSnapshot(q, snap => setClasses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b)=>b.createdAt - a.createdAt)));
                return () => unsub();
            }, [user.uid]);

            useEffect(() => {
                if (!selectedClass) { setStudents([]); return; }
                const q = query(collection(db, 'students'), where('classId', '==', selectedClass.id));
                const unsub = onSnapshot(q, snap => {
                    let list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStudents(list.sort((a,b) => parseInt(a.seatNo) - parseInt(b.seatNo)));
                });
                return () => unsub();
            }, [selectedClass]);

            const addClass = async () => { if (!newClassName.trim()) return; await addDoc(collection(db, 'classes'), { name: newClassName, teacherId: user.uid, createdAt: Date.now() }); setNewClassName(''); showToast("班級建立成功"); };
            const deleteClass = async (id) => { if (!confirm("警告：此操作將刪除所有相關學生與成績紀錄，確定嗎？")) return; await deleteDoc(doc(db, 'classes', id)); if(selectedClass?.id === id) setSelectedClass(null); showToast("已徹底刪除"); };
            const deleteStudent = async (id) => { await deleteDoc(doc(db, 'students', id)); showToast("學生已刪除"); };
            const saveEditStudent = async () => { await updateDoc(doc(db, 'students', editingStudent.id), { seatNo: editingStudent.seatNo, name: editingStudent.name }); setEditingStudent(null); showToast("資料已更新"); };
            const handleCSV = e => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async event => {
                    const lines = event.target.result.split('\n').filter(l => l.trim() !== '');
                    for (let i = 1; i < lines.length; i++) {
                        const [seatNo, name] = lines[i].split(',').map(s => s.trim());
                        if (seatNo && name) await addDoc(collection(db, 'students'), { classId: selectedClass.id, teacherId: user.uid, seatNo, name, createdAt: Date.now() });
                    }
                    showToast("匯入完成"); e.target.value = '';
                };
                reader.readAsText(file);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                    <div className="glass-card p-6 rounded-2xl flex flex-col h-full border-t-4 border-t-blue-500"><h2 className="text-xl font-bold flex items-center gap-2 mb-6"><Users className="text-blue-600" /> 班級中樞</h2><div className="flex gap-2 mb-6"><input type="text" placeholder="班級名稱" className="flex-1 bg-slate-50 border rounded-lg px-3 py-2 outline-none" value={newClassName} onChange={e=>setNewClassName(e.target.value)} /><button onClick={addClass} className="bg-blue-100 text-blue-700 px-4 rounded-lg font-bold">新增</button></div><div className="flex-1 overflow-y-auto space-y-3">{classes.map(c => <div key={c.id} onClick={() => setSelectedClass(c)} className={`p-4 rounded-xl cursor-pointer transition flex justify-between items-center border group ${selectedClass?.id === c.id ? 'bg-blue-50 border-blue-400' : 'bg-white'}`}><span className="font-bold">{c.name} 班</span><button onClick={e => { e.stopPropagation(); deleteClass(c.id); }} className="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100"><Trash2 size={18} /></button></div>)}</div></div>
                    <div className="lg:col-span-2 glass-card p-6 rounded-2xl flex flex-col h-full">{!selectedClass ? <div className="flex-1 flex flex-col items-center justify-center text-slate-400"><Users size={60} className="mb-4 opacity-20" /><p>請選擇班級以管理學生</p></div> : <div className="flex flex-col h-full"><div className="flex justify-between items-center mb-6"><h2 className="text-xl font-bold">{selectedClass.name} 班</h2><div className="flex gap-3"><label className="bg-cyan-100 text-cyan-700 px-3 py-2 rounded-lg cursor-pointer transition"><Upload size={16} className="inline mr-1"/> 匯入<input type="file" accept=".csv" className="hidden" onChange={handleCSV} /></label></div></div><div className="bg-white rounded-xl border flex-1 overflow-hidden flex flex-col"><div className="grid grid-cols-4 bg-slate-100 p-4 text-sm font-bold"><div>座號</div><div className="col-span-2">姓名</div><div className="text-right">操作</div></div><div className="flex-1 overflow-y-auto">{students.map(s => <div key={s.id} className="grid grid-cols-4 p-4 border-b items-center hover:bg-slate-50 transition"><div>{s.seatNo}</div><div className="col-span-2 font-medium">{s.name}</div><div className="text-right flex justify-end gap-2"><button onClick={()=>setEditingStudent({...s})} className="text-slate-400 hover:text-blue-600"><Edit size={18}/></button><button onClick={()=>deleteStudent(s.id)} className="text-slate-400 hover:text-red-500"><Trash2 size={18}/></button></div></div>)}</div></div></div>}
                        <BaseModal isOpen={!!editingStudent} onClose={() => setEditingStudent(null)} title="編輯學生" icon={Edit} iconColor="text-blue-600" onConfirm={saveEditStudent}><div><label className="block text-sm font-bold mb-2">座號</label><input type="text" value={editingStudent?.seatNo || ''} onChange={e => setEditingStudent({...editingStudent, seatNo: e.target.value})} className="w-full bg-slate-50 border rounded-lg px-4 py-2" /></div><div><label className="block text-sm font-bold mb-2">姓名</label><input type="text" value={editingStudent?.name || ''} onChange={e => setEditingStudent({...editingStudent, name: e.target.value})} className="w-full bg-slate-50 border rounded-lg px-4 py-2" /></div></BaseModal>
                    </div>
                </div>
            );
        };

        const ExamFactory = ({ user }) => {
            const [exams, setExams] = useState([]);
            const [newExamTitle, setNewExamTitle] = useState('');
            const [selectedExam, setSelectedExam] = useState(null);
            const [examTab, setExamTab] = useState('warroom');
            const [pasteText, setPasteText] = useState('');
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            const [editTitleValue, setEditTitleValue] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editIndex, setEditIndex] = useState(null);
            const [modalData, setModalData] = useState({ question: '', correct: '', options: ['', '', '', ''] });
            const showToast = useToast();

            useEffect(() => {
                const q = query(collection(db, 'exams'), where('teacherId', '==', user.uid));
                const unsub = onSnapshot(q, snap => setExams(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b)=>b.createdAt - a.createdAt)));
                return () => unsub();
            }, [user.uid]);

            const createExam = async () => { if (!newExamTitle.trim()) return; await addDoc(collection(db, 'exams'), { title: newExamTitle, teacherId: user.uid, isPublished: false, drawCount: 20, allowMultipleAttempts: true, timeLimit: 30, questions: [], createdAt: Date.now() }); setNewExamTitle(''); showToast("試卷已建立"); };
            const deleteExam = async (id) => { if(!confirm("確定刪除？")) return; await deleteDoc(doc(db, 'exams', id)); if(selectedExam?.id === id) setSelectedExam(null); showToast("已刪除"); };
            const togglePublish = async (ex) => { await updateDoc(doc(db, 'exams', ex.id), { isPublished: !ex.isPublished }); showToast(ex.isPublished ? "已下架" : "已派送"); };
            const updateSetting = async (field, val) => { await updateDoc(doc(db, 'exams', selectedExam.id), { [field]: val }); showToast("設定已儲存"); };
            const saveTitle = async () => { await updateDoc(doc(db, 'exams', selectedExam.id), { title: editTitleValue.trim() }); setIsEditingTitle(false); showToast("名稱已更新"); };
            
            const handleExcel = async (overwrite) => {
                const lines = pasteText.trim().split('\n'); const newQs = [];
                for (let l of lines) {
                    let cols = l.split('\t').map(s => s.trim()); if (cols.length < 6) cols = l.split(',').map(s => s.trim());
                    if (cols.length >= 6 && cols[0] !== '題目') newQs.push({ question: cols[0], correct: cols[1], options: [cols[2], cols[3], cols[4], cols[5]] });
                }
                const final = overwrite ? newQs : [...(selectedExam.questions || []), ...newQs];
                await updateDoc(doc(db, 'exams', selectedExam.id), { questions: final }); setPasteText(''); showToast("匯入成功");
            };
            
            const openModal = (idx = null, data = null) => { if(idx!==null) {setEditIndex(idx); setModalData({...data});} else {setEditIndex(null); setModalData({question:'',correct:'',options:['','','','']});} setIsModalOpen(true); };
            
            const saveSingle = async () => {
                const qs = [...(selectedExam.questions || [])]; if (editIndex!==null) qs[editIndex] = modalData; else qs.push(modalData);
                await updateDoc(doc(db, 'exams', selectedExam.id), { questions: qs }); setIsModalOpen(false); showToast("儲存成功");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full relative">
                    <div className="glass-card p-6 rounded-2xl flex flex-col h-full border-t-4 border-t-cyan-500">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-6"><BookOpen className="text-cyan-600" /> 試卷庫</h2>
                        <div className="flex gap-2 mb-6">
                            <input type="text" placeholder="名稱" className="flex-1 bg-slate-50 border rounded-lg px-3 py-2 outline-none" value={newExamTitle} onChange={e=>setNewExamTitle(e.target.value)} />
                            <button onClick={createExam} className="bg-cyan-100 text-cyan-700 px-4 rounded-lg font-bold">建立</button>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-3">
                            {exams.map(ex => (
                                <div key={ex.id} onClick={() => setSelectedExam(ex)} className={`p-4 rounded-xl cursor-pointer transition flex flex-col gap-2 border group ${selectedExam?.id === ex.id ? 'bg-cyan-50 border-cyan-400' : 'bg-white'}`}>
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold truncate">{ex.title}</span>
                                        <button onClick={e => { e.stopPropagation(); deleteExam(ex.id); }} className="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100"><Trash2 size={16} /></button>
                                    </div>
                                    <div className="text-xs text-slate-500">{ex.isPublished ? '已派送' : '草稿'} | {ex.questions?.length || 0} 題</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="lg:col-span-2 glass-card p-6 rounded-2xl flex flex-col h-full relative">
                        {!selectedExam ? (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400">
                                <Settings size={60} className="mb-4 opacity-20" />
                                <p>請選擇試卷進入控制中心</p>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full">
                                <div className="flex justify-between items-center mb-6 pb-4 border-b">
                                    {isEditingTitle ? (
                                        <div className="flex items-center gap-2">
                                            <input type="text" value={editTitleValue} onChange={e=>setEditTitleValue(e.target.value)} className="bg-slate-50 border border-cyan-500 rounded-lg px-3 py-1 font-bold text-xl"/>
                                            <button onClick={saveTitle} className="text-green-600"><CheckCircle2/></button>
                                        </div>
                                    ) : (
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-2xl font-bold cursor-pointer" onClick={()=>{setEditTitleValue(selectedExam.title); setIsEditingTitle(true);}}>{selectedExam.title}</h2>
                                            <button onClick={()=>{setEditTitleValue(selectedExam.title); setIsEditingTitle(true);}} className="text-slate-400"><Edit size={18}/></button>
                                        </div>
                                    )}
                                    <button onClick={() => togglePublish(selectedExam)} className={`px-6 py-2 rounded-lg font-bold text-sm ${selectedExam.isPublished ? 'border border-slate-400 text-slate-600' : 'bg-cyan-600 text-white'}`}>
                                        {selectedExam.isPublished ? '停止派送' : '🚀 立即派送'}
                                    </button>
                                </div>
                                <div className="flex gap-4 border-b mb-6">
                                    <ExamTabButton id="warroom" currentTab={examTab} setTab={setExamTab} icon={Activity} label="📡 戰情室" />
                                    <ExamTabButton id="settings" currentTab={examTab} setTab={setExamTab} icon={Settings} label="邏輯設定" />
                                    <ExamTabButton id="questions" currentTab={examTab} setTab={setExamTab} icon={Clipboard} label="題庫管理" />
                                </div>
                                <div className="flex-1 overflow-y-auto">
                                    {examTab === 'warroom' ? (
                                        <WarRoom exam={selectedExam} />
                                    ) : examTab === 'settings' ? (
                                        <div className="grid gap-6 fade-in">
                                            <div className="bg-slate-50 p-5 rounded-xl">
                                                <h3 className="font-bold flex items-center gap-2"><Settings size={18}/> 動態測驗邏輯</h3>
                                                <div className="mt-4 flex flex-col gap-2"><label className="text-sm font-bold flex justify-between"><span>隨機抽題數量</span><span className="text-cyan-700 bg-cyan-100 px-2 rounded-full">{selectedExam.drawCount} 題</span></label><input type="range" min="1" max="100" value={selectedExam.drawCount} onChange={e=>updateSetting('drawCount',parseInt(e.target.value))} className="w-full" /></div>
                                                <div className="mt-4 border-t pt-4 flex flex-col gap-2"><label className="text-sm font-bold flex justify-between"><span>答題秒數 (Time Limit)</span><span className="text-cyan-700 bg-cyan-100 px-2 rounded-full">{selectedExam.timeLimit||30} 秒</span></label><input type="range" min="5" max="120" step="5" value={selectedExam.timeLimit||30} onChange={e=>updateSetting('timeLimit',parseInt(e.target.value))} className="w-full" /></div>
                                            </div>
                                            <div className="bg-slate-50 p-5 rounded-xl flex justify-between items-center">
                                                <div><h3 className="font-bold">無限刷題</h3><p className="text-xs text-slate-500">開啟則允許學生重複挑戰</p></div>
                                                <button onClick={()=>updateSetting('allowMultipleAttempts', !selectedExam.allowMultipleAttempts)} className={`w-14 h-7 rounded-full flex items-center transition-colors duration-300 shrink-0 ${selectedExam.allowMultipleAttempts?'bg-cyan-500':'bg-slate-300'}`}><div className={`w-5 h-5 bg-white rounded-full shadow-md transform transition-transform ${selectedExam.allowMultipleAttempts?'translate-x-8':'translate-x-1'}`}></div></button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-6 fade-in">
                                            <div className="bg-slate-50 p-5 rounded-xl">
                                                <h4 className="font-bold flex items-center gap-2"><Clipboard size={18}/> Excel 快速貼上</h4>
                                                <p className="text-xs text-slate-500 mb-2">依序框選：題目、正確答案、選項1~4</p>
                                                <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="題目 正確答案 選項..." className="w-full h-20 border rounded-lg p-2"></textarea>
                                                <div className="flex justify-end gap-2 mt-2"><button onClick={()=>handleExcel(true)} className="px-3 py-1 bg-slate-200 rounded font-bold text-sm">覆寫</button><button onClick={()=>handleExcel(false)} className="px-3 py-1 bg-cyan-600 text-white rounded font-bold text-sm">附加</button></div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-center border-t pt-4 mb-4">
                                                    <h4 className="font-bold flex items-center gap-2"><BookOpen size={18}/> 試卷內容檢視</h4>
                                                    <button onClick={()=>openModal()} className="text-blue-600 font-bold bg-blue-100 px-3 py-1 rounded-lg text-sm">+ 新增單題</button>
                                                </div>
                                                <div className="space-y-3">
                                                    {selectedExam.questions?.map((q,i)=>(
                                                        <div key={i} className="bg-white border p-4 rounded-xl relative group">
                                                            <div className="flex justify-between">
                                                                <strong className="pr-12 text-lg"><span className="text-cyan-600 mr-2">{i+1}.</span>{q.question}</strong>
                                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 absolute top-4 right-4 bg-white pl-2">
                                                                    <button onClick={()=>openModal(i,q)} className="text-slate-400 hover:text-blue-600"><Edit size={16}/></button>
                                                                    <button onClick={()=>deleteSingleQuestion(i)} className="text-slate-400 hover:text-red-500"><Trash2 size={16}/></button>
                                                                </div>
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-2 mt-2 text-sm text-slate-600">
                                                                {q.options.map((o,oi)=>(
                                                                    <div key={oi} className={`p-2 rounded-lg border ${String(q.correct)===String(oi+1)||q.correct===o?'bg-cyan-50 font-bold border-cyan-200 text-cyan-800':'bg-slate-50 border-transparent'}`}>{oi+1}. {o}</div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        <BaseModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} title={editIndex!==null?"編輯題目":"單題新增"} icon={Clipboard} onConfirm={saveSingleQuestion} maxWidth="max-w-2xl">
                            <div><label className="block font-bold text-sm mb-2">題目</label><textarea value={modalData.question} onChange={e=>setModalData({...modalData,question:e.target.value})} className="w-full border rounded p-2 h-20"/></div>
                            <div><label className="block font-bold text-sm mb-2">答案 (1~4 或文字)</label><input value={modalData.correct} onChange={e=>setModalData({...modalData,correct:e.target.value})} className="w-full border rounded p-2"/></div>
                            <div className="grid grid-cols-2 gap-4">
                                {modalData.options.map((o,i)=>(
                                    <div key={i}><label className="block font-bold text-xs text-slate-500 mb-1">選項 {i+1}</label><input value={o} onChange={e=>{const n=[...modalData.options];n[i]=e.target.value;setModalData({...modalData,options:n});}} className="w-full border rounded p-2"/></div>
                                ))}
                            </div>
                        </BaseModal>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, isDarkMode, toggleTheme }) => {
            const [view, setView] = useState('classes');
            const [isPwdModalOpen, setIsPwdModalOpen] = useState(false);
            const [newPassword, setNewPassword] = useState('');
            const showToast = useToast();

            const handleUpdatePassword = async () => {
                if(newPassword.length < 6) return showToast("至少 6 字元", "error");
                try {
                    await updatePassword(user, newPassword);
                    setIsPwdModalOpen(false);
                    showToast("更新成功");
                } catch (error) {
                    if (error.code === 'auth/requires-recent-login') showToast("安全考量：若登入已久請先登出再登入後修改", "error");
                    else showToast("密碼更新失敗：" + error.message, "error");
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass-card px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3"><Zap className="text-cyan-600" /> <h1 className="text-xl font-bold">系統中控台</h1></div>
                        <div className="flex items-center gap-4">
                            <a href="readme.html" target="_blank" className="p-2 rounded-full hover:bg-slate-200"><HelpCircle size={20} /></a>
                            <button onClick={toggleTheme} className="p-2 rounded-full">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                            <span className="hidden md:inline text-sm">{user.email}</span>
                            <button onClick={()=>setIsPwdModalOpen(true)} className="flex items-center gap-1 text-sm"><Key size={16}/>密碼</button>
                            <button onClick={()=>signOut(auth)} className="text-sm text-red-500"><LogOut size={16}/></button>
                        </div>
                    </header>
                    <main className="flex-1 container mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6">
                        <aside className="w-full md:w-56 flex flex-col gap-2">
                            <button onClick={()=>setView('classes')} className={`p-4 rounded-xl flex items-center gap-3 font-bold ${view==='classes'?'bg-blue-100 text-blue-700':'hover:bg-slate-100'}`}><Users size={20}/> 班級管理</button>
                            <button onClick={()=>setView('exams')} className={`p-4 rounded-xl flex items-center gap-3 font-bold ${view==='exams'?'bg-cyan-100 text-cyan-700':'hover:bg-slate-100'}`}><BookOpen size={20}/> 試卷兵工廠</button>
                        </aside>
                        <section className="flex-1 min-h-0">{view === 'classes' ? <ClassManager user={user} /> : <ExamFactory user={user} />}</section>
                    </main>
                    <BaseModal isOpen={isPwdModalOpen} onClose={()=>setIsPwdModalOpen(false)} title="修改密碼" icon={Key} onConfirm={handleUpdatePassword}>
                        <div className="bg-amber-50 text-amber-700 p-3 rounded mb-4 text-xs">安全考量：若登入已久請先登出再登入後修改</div>
                        <input type="password" value={newPassword} onChange={e=>setNewPassword(e.target.value)} placeholder="新密碼" className="w-full border rounded p-2"/>
                    </BaseModal>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [checking, setChecking] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(false);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);
            useEffect(() => { const unsub = onAuthStateChanged(auth, u => { setUser(u); setChecking(false); }); return () => unsub(); }, []);

            if (checking) return <div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-16 w-16 border-t-4 border-cyan-600"></div></div>;
            return <ToastProvider>{user ? <Dashboard user={user} isDarkMode={isDarkMode} toggleTheme={()=>setIsDarkMode(!isDarkMode)} /> : <AuthScreen isDarkMode={isDarkMode} toggleTheme={()=>setIsDarkMode(!isDarkMode)} />}</ToastProvider>;
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
